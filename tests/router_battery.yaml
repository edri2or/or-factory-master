# Stage 51c — labeled routing battery for the Agent Router intent classifier.
#
# 250 cases, 50 per intent (ops / code / research / infra / unknown).
# ~60% Hebrew, ~40% English. ~20% adversarial / out-of-scope (the vague "unknown"
# cases + intent-flavoured distractors such as "explain this Terraform" -> code,
# "benefits of IaC" -> research). Out-of-scope / ambiguous text is labeled unknown.
#
# Consumed by scripts/eval_router.py to compute Macro-F1 (threshold 0.85). The
# script runs each `text` through the REAL classifier prompt+model from
# templates/system/workflows/n8n/agent-router.json. Stable in Git — changes go
# through a PR (the gate re-scores on any edit here).

