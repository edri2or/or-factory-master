# Self-test table for scripts/agent-classify.sh, exercised by pipeline-tests.yml on every
# PR. Each row: a task, the worker it's routed to, and the EFFECTIVE tier the classifier must
# return (after the capability-aware cap). Proves Fix 1 (capability-aware risk cap).
#
# Driven against tests/agent-classify-policy.yml (the test-only policy fixture), where
# `worker-readonly` is READ-ONLY (red→yellow cap) and `worker-alwaysred` is in always_red_workers.
# A worker absent from that map (or no worker at all) defaults to write → no cap.

# THE INCIDENT pattern: a task that DESCRIBES the red-pattern list has red content — but routed
# to a read-only worker it MUST be capped to yellow (no false RED gate on Or).
- task: "design + safety proof for a builder soldier; note red includes deploy/provision/secret/.github/ and cross-repo"
  worker: "worker-readonly"
  expected_tier: yellow

# Same red-content task routed to a worker NOT in the map → write default → stays red (gate kept).
- task: "design + safety proof for a builder soldier; note red includes deploy/provision/secret/.github/ and cross-repo"
  worker: "future-worker"
  expected_tier: red

# An explicit red ACTION, read-only worker → capped to yellow (the worker can't act on it).
- task: "delete the production secret and force-push to main"
  worker: "worker-readonly"
  expected_tier: yellow

# Green content (pure read/summary) is unaffected by the cap.
- task: "summarise the readme and list the main modules"
  worker: "worker-readonly"
  expected_tier: green

# Yellow content (self-write class) stays yellow on a read-only worker (cap only lowers red).
- task: "open a pull request that refactors the parser"
  worker: "worker-readonly"
  expected_tier: yellow

# Backward compatibility: NO worker passed → write default → no cap → red stays red.
- task: "deploy to railway now"
  worker: ""
  expected_tier: red

# always_red_workers: a benign-sounding task with NO red/yellow keyword is STILL forced to red —
# a cross-repo write is red by construction → Or's Telegram ✅ on every run.
- task: "add a notes folder and a readme"
  worker: "worker-alwaysred"
  expected_tier: red

# always_red_workers, owner/repo form, green-content task → still red (the always-red override wins).
- task: "summarise then create the initial scaffold"
  worker: "edri2or/worker-alwaysred"
  expected_tier: red
