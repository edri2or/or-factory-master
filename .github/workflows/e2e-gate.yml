name: E2E Gate

# The enforceable E2E verification gate for the factory repo. The job NAME
# ("E2E verification gate") is a required status check in the protect-main
# ruleset — a change to behavior-bearing template files
# (templates/system/workflows/n8n/*.json or the system
# configure-agent-router.yml) cannot merge without a fresh, real E2E proof in the
# same diff. No-op for changes that touch no behavior-bearing file.
#
# Cloud-free: it cross-checks the proof's producing run + artifact via the GitHub
# API using the read-only GITHUB_TOKEN (no WIF/id-token in this PR-triggered job).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read   # read the e2e-verify run + download its proof artifact

jobs:
  e2e-gate:
    name: E2E verification gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # check-e2e-proof.sh reads `git diff HEAD~1 HEAD` (the PR/merge diff).
          fetch-depth: 2

      - name: Check E2E proof
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/check-e2e-proof.sh
