name: Verify Observability Secrets (one-shot)

# One-shot check: confirms the broker SA can read the two new SM secrets
# (axiom-api-key, better-stack-api-key) that the operator created manually,
# plus the four pre-existing ones the emitter will use. If this fails, the
# operator needs to grant secretmanager.secretAccessor to the broker SA on
# the failing secrets. Deleted in the Phase A foundation PR once it has
# done its job.

on:
  workflow_dispatch:

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Check read access (length only, never the value)
        run: |
          set -uo pipefail
          PROJECT="or-factory-master-control"
          STATUS=0
          for secret in axiom-api-key better-stack-api-key linear-api-key linear-team-id telegram-bot-token telegram-chat-id; do
            if val=$(gcloud secrets versions access latest --secret="$secret" --project="$PROJECT" 2>&1); then
              # Mask the value the instant it lands in a shell var, then NEVER
              # print it — only its length, as a sanity check.
              echo "::add-mask::${val}"
              len=${#val}
              echo "PASS: $secret (length=$len)"
            else
              # On failure $val holds gcloud's error text (no secret value).
              echo "FAIL: $secret — $val" >&2
              STATUS=1
            fi
          done
          if [ "$STATUS" -ne 0 ]; then
            echo "" >&2
            echo "One or more secrets are unreadable by the broker SA." >&2
            echo "Operator must grant roles/secretmanager.secretAccessor on the failing secrets to:" >&2
            echo "  factory-master-broker@or-factory-master-control.iam.gserviceaccount.com" >&2
            exit 1
          fi
          echo "PASS: all six observability secrets readable."
