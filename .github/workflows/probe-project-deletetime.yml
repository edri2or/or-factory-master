name: Probe project deleteTime (read-only diagnostic)

# ONE-OFF READ-ONLY diagnostic. For two soft-deleted "probe" projects it compares
# three sources of the deletion timestamp so we can decide how the MCP quota tool
# should source deleteTime:
#   [1] Cloud Resource Manager v3 projects.get   (authoritative per-resource field)
#   [2] Cloud Resource Manager v3 projects:search (what the live MCP tool uses today)
#   [3] DeleteProject Admin Activity audit log    (ground truth, version-independent)
# Touches NOTHING — no create, delete, undelete, or write of any kind.
# Authenticates as the broker SA via WIF, so it MUST run on main. Self-runs once on
# merge (push path-filter on this file) so no operator click is needed; also dispatchable.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/probe-project-deletetime.yml

permissions: {}

jobs:
  probe:
    name: Probe deleteTime sources
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Probe deleteTime for two soft-deleted projects
        env:
          ORG_ID: "905978345393"
          SYSTEMS_FOLDER: "123180924297"
        run: |
          set -euo pipefail
          TOKEN="$(gcloud auth print-access-token)"

          for PID in factory-test-23 v2-test-1; do
            echo "=================================================================="
            echo "PROJECT: ${PID}"
            echo "=================================================================="

            echo "--- [1] v3 projects.get (authoritative per-resource field) ---"
            curl -fsS -H "Authorization: Bearer ${TOKEN}" \
              "https://cloudresourcemanager.googleapis.com/v3/projects/${PID}" \
              || echo "(get failed)"
            echo ""

            echo "--- [2] v3 projects:search (what the live MCP tool uses) ---"
            curl -fsS -H "Authorization: Bearer ${TOKEN}" \
              "https://cloudresourcemanager.googleapis.com/v3/projects:search?query=projectId:${PID}" \
              || echo "(search failed)"
            echo ""

            echo "--- [3a] DeleteProject audit log @ Systems folder scope ---"
            gcloud logging read \
              "protoPayload.methodName:DeleteProject AND resource.labels.project_id=\"${PID}\"" \
              --folder="${SYSTEMS_FOLDER}" \
              --limit=3 \
              --freshness=400d \
              --format='value(timestamp,protoPayload.methodName,protoPayload.authenticationInfo.principalEmail)' \
              || echo "(folder-scope logging read failed — SA may lack roles/logging.viewer on the folder)"
            echo ""

            echo "--- [3b] DeleteProject audit log @ org scope ---"
            gcloud logging read \
              "protoPayload.methodName:DeleteProject AND resource.labels.project_id=\"${PID}\"" \
              --organization="${ORG_ID}" \
              --limit=3 \
              --freshness=400d \
              --format='value(timestamp,protoPayload.methodName,protoPayload.authenticationInfo.principalEmail)' \
              || echo "(org-scope logging read failed — SA may lack roles/logging.viewer on the org)"
            echo ""
          done
