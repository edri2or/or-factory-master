name: E2E Verify

# Produces the behavioral E2E proof the factory's "E2E verification gate"
# requires for a behavior-bearing TEMPLATE change. It drives a REAL message
# through a LIVE test system's inbound path (telegram-in/inbound -> Caddy ->
# tg-inbound -> agent-router) via scripts/e2e-verify-inbound.sh, asserts on the
# actual reply, and ONLY on a real pass writes a signed e2e-proofs/<slug>.json
# (content_hash over the FACTORY templates on target_ref), commits it to that
# branch, and uploads it as the `e2e-proof` artifact.
#
# Precondition (live-test-loop): the named test system must already be running
# the branch's templates — apply them first with prove-on-test-system.yml.
#
# WIF note: the broker WIF CEL pins ref=refs/heads/main, so dispatch this on main
# (github.ref = refs/heads/main, for auth) while it checks out target_ref's content.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: The live TEST system to drive (its repo/subdomain name).
        required: true
      gcp_project:
        description: GCP project holding that system's secrets.
        required: false
        default: factory-test-25
      target_ref:
        description: The factory branch whose templates to prove and commit the proof onto.
        required: true
      slug:
        description: Dev slug — the proof is written to e2e-proofs/<slug>.json.
        required: true
      expect_substr:
        description: Optional substring the bot's reply MUST contain (stronger assert).
        required: false
        default: ""

concurrency:
  group: e2e-verify-${{ github.event.inputs.target_ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  verify:
    name: E2E verify (live test system)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # commit + push the proof onto target_ref
      id-token: write    # WIF OIDC token (workflow_dispatch only — never on PR)
    steps:
      - name: Checkout the branch under proof
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ github.event.inputs.target_ref }}
          fetch-depth: 2
          # Do NOT persist the ambient GITHUB_TOKEN in git's http.extraheader — the
          # proof commit is pushed under the broker App below, and a persisted
          # GITHUB_TOKEN would override that App credential on push.
          persist-credentials: false

      - name: Authenticate to GCP via WIF (broker)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Drive the live inbound E2E and assert on the reply
        id: drive
        env:
          # Stage-6 note: the broker SA must have secretAccessor on these secrets in
          # the test system's project (factory-test-25 for reuse systems). Granted /
          # validated during the live-test stage; surfaced loudly here if missing.
          PROJECT_ID: ${{ github.event.inputs.gcp_project }}
          SYSTEM_NAME: ${{ github.event.inputs.system_name }}
          EXPECT_SUBSTR: ${{ github.event.inputs.expect_substr }}
        run: |
          set -euo pipefail
          _sm() { gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null; }

          N8N_WEBHOOK_SECRET=$(_sm n8n-telegram-webhook-secret) || true
          N8N_CHAT_ID=$(_sm n8n-telegram-chat-id) || true
          N8N_API_KEY=$(_sm n8n-api-key) || true
          for v in N8N_WEBHOOK_SECRET N8N_CHAT_ID N8N_API_KEY; do
            [ -n "${!v}" ] || { echo "FAIL: $v missing/empty in $PROJECT_ID SM (broker secretAccessor?)" >&2; exit 1; }
            echo "::add-mask::${!v}"
          done
          export N8N_WEBHOOK_SECRET N8N_CHAT_ID N8N_API_KEY SYSTEM_NAME EXPECT_SUBSTR
          export E2E_RESULT_FILE="${RUNNER_TEMP}/e2e-result.json"
          bash scripts/e2e-verify-inbound.sh

      - name: Build and sign the proof
        id: proof
        env:
          PROJECT_ID: ${{ github.event.inputs.gcp_project }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source scripts/lib.sh
          CONTENT_HASH=$(e2e_behavior_hash)
          DRIVE=$(cat "${RUNNER_TEMP}/e2e-result.json")

          mkdir -p e2e-proofs
          NOSIG="${RUNNER_TEMP}/proof-nosig.json"
          jq -n \
            --arg schema "e2e-proof/v1" \
            --arg slug "$SLUG" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg chash "$CONTENT_HASH" \
            --argjson d "$DRIVE" \
            '{schema:$schema, slug:$slug, repo:$repo, run_id:$run_id,
              content_hash:$chash, system:($d.system), domain:($d.domain),
              execution_id:($d.execution_id), reply_excerpt:($d.reply_excerpt),
              result:($d.result), executed_at:($d.executed_at)}' > "$NOSIG"

          # HMAC-SHA256 over the canonical (sorted, no-signature) payload, with the
          # control signing key. Defense-in-depth for offline audit; the gate's
          # binding is the GitHub run+artifact cross-check. Key never logged.
          KEY=$(gcloud secrets versions access latest --secret=mcp-server-bearer-signing-key --project="or-factory-master-control" 2>/dev/null) || true
          if [ -n "$KEY" ]; then
            echo "::add-mask::${KEY}"
            CANON=$(jq -Sc 'del(.signature)' "$NOSIG")
            SIG=$(printf '%s' "$CANON" | openssl dgst -sha256 -hmac "$KEY" -hex | awk '{print $NF}')
            jq --arg s "hmac-sha256:${SIG}" '.signature=$s' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          else
            jq '.signature="unsigned"' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          fi
          echo "proof_path=e2e-proofs/${SLUG}.json" >> "$GITHUB_OUTPUT"
          echo "Proof written:"; jq . "e2e-proofs/${SLUG}.json"

      - name: Upload the proof artifact (the gate cross-checks this)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-proof
          path: ${{ steps.proof.outputs.proof_path }}
          if-no-files-found: error

      - name: Commit the proof onto the branch
        env:
          TARGET_REF: ${{ github.event.inputs.target_ref }}
          SLUG: ${{ github.event.inputs.slug }}
          CONTROL_PROJECT: or-factory-master-control
        run: |
          set -euo pipefail
          git config user.name "e2e-verify[bot]"
          git config user.email "actions@github.com"
          git add "e2e-proofs/${SLUG}.json"
          if git diff --cached --quiet; then
            echo "Proof unchanged — nothing to commit."
            exit 0
          fi
          git commit -q -m "e2e: proof for ${SLUG} (run ${GITHUB_RUN_ID})"

          # Push as the broker App, NOT the ambient GITHUB_TOKEN: GitHub does not
          # re-trigger workflows on commits pushed with the automatic GITHUB_TOKEN,
          # so a GITHUB_TOKEN push would leave the PR's required checks un-run on the
          # new head (needing a manual re-trigger). An App-token push fires a fresh
          # 'synchronize' event on the open PR → the checks re-run automatically.
          # Pattern mirrors refresh-system-agents.yml; the job already WIF-auths as broker.
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT" 2>/dev/null || true)
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT" 2>/dev/null || true)
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/broker-key.pem 2>/dev/null || true
          TOKEN=""
          if [ -s /tmp/broker-key.pem ] && [ -n "$APP_ID" ] && [ -n "$INSTALL_ID" ]; then
            TOKEN=$(bash scripts/generate-app-token.sh /tmp/broker-key.pem "$APP_ID" "$INSTALL_ID" "" '{"contents":"write"}' '["or-factory-master"]' 2>/dev/null || true)
          fi
          rm -f /tmp/broker-key.pem
          [ -n "$TOKEN" ] || { echo "FAIL: could not mint a broker App token to push the proof" >&2; exit 1; }
          echo "::add-mask::$TOKEN"
          if ! perr=$(git push "https://x-access-token:${TOKEN}@github.com/edri2or/or-factory-master.git" "HEAD:${TARGET_REF}" 2>&1); then
            echo "FAIL: proof push failed: $(printf '%s' "$perr" | sed "s/${TOKEN}/***/g")" >&2; exit 1
          fi
          echo "Proof pushed to ${TARGET_REF} as the broker App — the PR's required checks will re-run."
