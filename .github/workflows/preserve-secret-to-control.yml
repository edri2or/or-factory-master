name: Preserve System Secret to Control (system -> control SM, value copy)

# Manual dispatch only. Copies the LATEST version of ONE Secret Manager secret
# FROM a system's GCP project INTO or-factory-master-control, server-side, as the
# broker SA via WIF. The value is piped directly between gcloud calls — never
# echoed, stored in a shell variable, or written to logs.
#
# Why this exists: the exact reverse of mirror-secret-to-system.yml. When a system
# is about to be torn down / re-provisioned, a runtime value that lives ONLY in
# that system's SM (e.g. an n8n Telegram bot token set live, never re-derivable
# from control) would be lost forever. This makes a durable, independent copy in
# control SM BEFORE teardown, so the NEXT system can be seeded from it (via
# mirror-secret-to-system.yml). Idempotent: re-running adds another (identical)
# version to the dest.
#
# Safety: the destination secret name MUST start with "preserved-" so this
# workflow can never clobber an existing control credential, and control
# super-credentials are refused outright. Read-only against the source except a
# self-grant of secretAccessor so the broker (which manages the system project)
# can read its own system's secret.

on:
  workflow_dispatch:
    inputs:
      source_project:
        description: "Source system GCP project to read FROM (e.g. factory-test-21). Never a control project."
        required: true
        type: string
      secret_name:
        description: "Secret id to read from the source project (e.g. n8n-telegram-bot-token)."
        required: true
        type: string
      dest_secret:
        description: "Destination secret id in control SM. MUST start with 'preserved-' (e.g. preserved-n8n-telegram-bot-token-or-edri-4)."
        required: true
        type: string

permissions: {}

jobs:
  preserve:
    name: Preserve secret value system -> control
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - name: Validate inputs
        env:
          SOURCE_PROJECT: ${{ inputs.source_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          DEST_SECRET: ${{ inputs.dest_secret }}
        run: |
          set -euo pipefail
          # Guard: the source is a SYSTEM project, never a control project (which
          # holds the broker's own keys — preserving out of control is meaningless
          # and would risk reading a super-credential).
          case "$SOURCE_PROJECT" in
            or-factory-master-control|factory-control-9piybr)
              echo "FAIL: source_project must not be a control project" >&2; exit 1 ;;
          esac
          if ! [[ "$SOURCE_PROJECT" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: source_project '$SOURCE_PROJECT' is not a valid GCP project id (6-30 chars)" >&2
            exit 1
          fi
          if ! [[ "$SECRET_NAME" =~ ^[a-zA-Z0-9_-]{1,255}$ ]]; then
            echo "FAIL: secret_name '$SECRET_NAME' is not a valid secret id" >&2
            exit 1
          fi
          # The destination MUST be namespaced under "preserved-" so this workflow
          # can never overwrite an existing control secret/credential.
          if ! [[ "$DEST_SECRET" =~ ^preserved-[a-zA-Z0-9_-]{1,243}$ ]]; then
            echo "FAIL: dest_secret '$DEST_SECRET' must start with 'preserved-' (guards against clobbering control credentials)" >&2
            exit 1
          fi
          # Belt-and-suspenders: never let the dest match a control super-credential.
          EXCLUDE='^(factory-master-broker-app-.*|.*-management-key|.*-provisioning-key|.*-master-key)$'
          if [[ "$DEST_SECRET" =~ $EXCLUDE ]]; then
            echo "FAIL: dest_secret '$DEST_SECRET' matches a control-only super-credential pattern — refusing" >&2
            exit 1
          fi
          echo "INFO: will preserve '$SECRET_NAME' from $SOURCE_PROJECT -> or-factory-master-control/$DEST_SECRET"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Preserve the secret value
        env:
          SOURCE_PROJECT: ${{ inputs.source_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          DEST_SECRET: ${{ inputs.dest_secret }}
        run: |
          set -euo pipefail
          DEST_PROJECT="or-factory-master-control"
          BROKER_SA="factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

          # The broker manages the system project, so it can grant itself read on
          # this one secret. Idempotent; harmless if the broker already has access.
          gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
            --project="$SOURCE_PROJECT" \
            --role="roles/secretmanager.secretAccessor" \
            --member="serviceAccount:${BROKER_SA}" \
            --quiet >/dev/null 2>&1 || true

          # Wait until the source version is actually readable (IAM propagation
          # ~5-30s). No value is ever printed — output is discarded.
          ok=""
          for attempt in $(seq 1 12); do
            if gcloud secrets versions access latest \
                 --secret="$SECRET_NAME" --project="$SOURCE_PROJECT" >/dev/null 2>&1; then
              ok=1
              break
            fi
            echo "INFO: source '$SECRET_NAME' not readable yet (attempt ${attempt}/12) — waiting 10s for IAM propagation..."
            sleep 10
          done
          if [ -z "$ok" ]; then
            echo "FAIL: '$SECRET_NAME' has no accessible version in $SOURCE_PROJECT (after grant + retry)" >&2
            exit 1
          fi

          # Create the dest secret in control if missing (idempotent).
          if ! gcloud secrets describe "$DEST_SECRET" --project="$DEST_PROJECT" >/dev/null 2>&1; then
            gcloud secrets create "$DEST_SECRET" \
              --project="$DEST_PROJECT" \
              --replication-policy=automatic \
              --labels="preserved-by=or-factory-master,source-project=${SOURCE_PROJECT}" \
              --quiet
            echo "PASS: created $DEST_SECRET in $DEST_PROJECT"
          else
            echo "INFO: $DEST_SECRET already exists in $DEST_PROJECT"
          fi

          # Copy the value server-side. The pipe keeps it off the logs and out of
          # any shell variable.
          gcloud secrets versions access latest \
            --secret="$SECRET_NAME" --project="$SOURCE_PROJECT" \
          | gcloud secrets versions add "$DEST_SECRET" \
            --project="$DEST_PROJECT" --data-file=- --quiet
          echo "PASS: preserved latest $SECRET_NAME ($SOURCE_PROJECT) -> $DEST_SECRET ($DEST_PROJECT)"

          COUNT=$(gcloud secrets versions list "$DEST_SECRET" \
            --project="$DEST_PROJECT" --filter="state=ENABLED" \
            --format="value(name)" | wc -l)
          echo "PASS: $DEST_SECRET now has ${COUNT} enabled version(s) in $DEST_PROJECT."
