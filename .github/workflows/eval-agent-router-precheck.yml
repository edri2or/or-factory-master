name: Agent Router eval — PR precheck

# Deterministic, secret-free gate. Runs on every PR that touches the classifier,
# the battery, or the eval script. Validates the battery (250 cases, 50/class,
# allowlist, valid YAML) AND asserts the classifier prompt still carries its
# JSON-output instruction — so a PR that strips that instruction goes red here.
#
# NO id-token in this file: a pull_request-triggered workflow must never request a
# WIF-capable token (enforced by scripts/check-no-privileged-pr-workflows.sh). The
# LLM-backed Macro-F1 eval needs WIF and therefore lives in a SEPARATE file
# (eval-agent-router.yml), which runs only on workflow_dispatch / push to main.

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - "templates/system/workflows/n8n/agent-router.json"
      - "tests/router_battery.yaml"
      - "scripts/eval_router.py"
      - ".github/workflows/eval-agent-router.yml"
      - ".github/workflows/eval-agent-router-precheck.yml"

permissions: {}

jobs:
  precheck:
    name: Battery + prompt precheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Install pyyaml
        run: python3 -m pip install --quiet pyyaml

      - name: Validate battery + classifier prompt (offline, no secret)
        run: python3 scripts/eval_router.py --check
