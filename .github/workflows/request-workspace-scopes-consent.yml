name: Request workspace scopes consent (shared Google identity)

# Opens a fresh consent for the SHARED Google identity's FULL Workspace scope set
# (all 12 tool groups: Gmail, Calendar, Drive, Docs, Sheets, Slides, Forms, Tasks,
# Chat, Contacts, Search, Apps Script) and Telegrams Or the one-click link.
#
# The consent door now lives in the GATEWAY (the permanent home), not on
# or-adhd-agent's n8n. This workflow: auths as the broker SA (WIF), resolves the
# live gateway URL, reads mcp-server-admin-secret from control SM (masked,
# in-step), calls the gateway's admin-gated /workspace/consent/start to obtain the
# accounts.google.com consent URL (a 302 Location — the workflow never follows
# it), and sends Or that link via the factory Telegram bot. When Or clicks Allow,
# Google redirects to the gateway's /workspace/consent/callback, which captures
# the fresh refresh_token (the full Workspace scope set) and writes it to control SM
# (gmail-oauth-refresh-token, new version; the old one stays as rollback).
#
# After Or clicks, redeploy/restart the gateway so the Workspace-MCP sidecar
# loads the new token (deploy-mcp-server.yml), then verify with google-mcp-smoke.
# No n8n, no per-system repo, no or-adhd-agent involvement — so this keeps working
# after or-adhd-agent is decommissioned.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "consent" to confirm re-opening the shared Google consent (full Workspace scope set).'
        required: true
        type: string

permissions: {}

jobs:
  request-consent:
    name: Get the gateway consent link + send it to Or
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: "or-factory-master-control"
      GCP_REGION: "me-west1"
      SERVICE: "factory-master-actions-mcp"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - name: Validate confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          [ "$CONFIRM" = "consent" ] || { echo "FAIL: type 'consent' to confirm" >&2; exit 1; }
          echo "PASS: confirmed"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Fetch the gateway consent link and send it to Or
        run: |
          set -euo pipefail
          # Resolve the live gateway URL + read the admin secret IN-STEP so the
          # secret stays in this shell only (masked, never written to GITHUB_ENV).
          GATEWAY_URL=$(gcloud run services describe "${SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.url)')
          [ -n "$GATEWAY_URL" ] || { echo "FAIL: could not resolve gateway URL" >&2; exit 1; }

          ADMIN_SECRET=$(gcloud secrets versions access latest \
            --secret="mcp-server-admin-secret" --project="${GCP_PROJECT}" | tr -d '\r\n')
          echo "::add-mask::${ADMIN_SECRET}"
          [ -n "$ADMIN_SECRET" ] || { echo "FAIL: could not read mcp-server-admin-secret" >&2; exit 1; }

          TG_BOT_TOKEN=$(gcloud secrets versions access latest \
            --secret="telegram-bot-token" --project="${GCP_PROJECT}" | tr -d '\r\n')
          TG_CHAT_ID=$(gcloud secrets versions access latest \
            --secret="telegram-chat-id" --project="${GCP_PROJECT}" | tr -d '\r\n')
          [ -n "$TG_BOT_TOKEN" ] && echo "::add-mask::${TG_BOT_TOKEN}" \
            || echo "WARN: factory bot token unreadable — the link will appear only in the step summary."

          # Ask the gateway's admin-gated consent-start for the Google consent URL.
          # It replies 302 with Location = accounts.google.com/...; -w redirect_url
          # captures that target WITHOUT following it (no n8n session needed — the
          # link itself is session-exempt; the gateway's one-time state validates).
          AUTH_URL=$(curl -sS -o /dev/null -w '%{redirect_url}' --max-time 20 \
            -H "X-Admin-Secret: ${ADMIN_SECRET}" \
            "${GATEWAY_URL}/workspace/consent/start" || echo "")
          case "$AUTH_URL" in
            https://accounts.google.com/*)
              echo "PASS: got the direct Google consent URL from the gateway (not echoed)." ;;
            *)
              echo "FAIL: gateway did not return a Google consent URL (got: $(printf '%s' "$AUTH_URL" | head -c 60)). Check the admin secret / that the gateway is deployed with the consent door." >&2
              exit 1 ;;
          esac

          MSG=$'🔐 חידוש חיבור Google המשותף — נדרש קליק אחד:\n'"${AUTH_URL}"$'\n\nמה זה עושה: מאשר מחדש את חשבון Google המשותף עם כל הרשאות ה-Workspace (Gmail, יומן, Drive, Docs, Sheets, מצגות, טפסים, משימות, Chat, אנשי-קשר, Search, Apps Script). הטוקן החדש נלכד ונשמר אוטומטית במקום הקבוע. ייתכן שתראה אזהרת "אפליקציה לא מאומתת" — זה תקין לחשבון פרטי, פשוט אשר.'
          if [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
            curl -sS -o /dev/null --max-time 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" --data-urlencode "text=${MSG}" \
              && echo "PASS: consent link sent to Or via the factory bot." \
              || echo "WARN: Telegram send failed — use the step-summary link."
          fi

          {
            echo "## 🔐 Shared Google consent requested (gateway door)"
            echo ""
            echo "[One-click consent link](${AUTH_URL}) — Or clicks Allow; the gateway captures the fresh refresh token (full Workspace scope set) into control SM."
            echo ""
            echo "Next: redeploy the gateway (deploy-mcp-server.yml) to load the new token, then verify with google-mcp-smoke."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "DONE"
