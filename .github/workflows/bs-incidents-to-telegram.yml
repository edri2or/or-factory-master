name: Better Stack incidents → Telegram

# Free-tier path for fast downtime → Telegram. Better Stack outgoing webhooks are
# paid, but its incidents READ API works on Free. This polls that API every ~5 min
# and relays new/resolved incidents to Telegram (the per-system monitors already
# detect downtime sub-minute from multiple regions; this just gets it to Telegram
# faster than the 6h system-runtime-audit). Dedup is via a Secret Manager
# watermark (bs-telegram-watermark) so each incident alerts once regardless of
# GitHub's schedule jitter. Soft-fail: never breaks; one [bs-incidents] line per run.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  forward:
    name: Poll Better Stack incidents and relay to Telegram
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: "or-factory-master-control"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Poll incidents + relay
        run: |
          set -uo pipefail
          NL=$'\n'

          BS=$(gcloud secrets versions access latest --secret=better-stack-api-key --project="$GCP_PROJECT" 2>/dev/null) || BS=""
          [ -n "$BS" ] && echo "::add-mask::${BS}"
          TG_TOKEN=$(gcloud secrets versions access latest --secret=telegram-bot-token --project="$GCP_PROJECT" 2>/dev/null) || TG_TOKEN=""
          [ -n "$TG_TOKEN" ] && echo "::add-mask::${TG_TOKEN}"
          TG_CHAT=$(gcloud secrets versions access latest --secret=telegram-chat-id --project="$GCP_PROJECT" 2>/dev/null) || TG_CHAT=""
          [ -n "$TG_CHAT" ] && echo "::add-mask::${TG_CHAT}"

          if [ -z "$BS" ] || [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "[bs-incidents] action='skipped' reason='missing-secret'"
            exit 0
          fi

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Watermark: stateless dedup. First run sets a baseline and alerts
          # nothing (so we don't replay the historical incident backlog).
          if gcloud secrets describe bs-telegram-watermark --project="$GCP_PROJECT" >/dev/null 2>&1; then
            SINCE=$(gcloud secrets versions access latest --secret=bs-telegram-watermark --project="$GCP_PROJECT" 2>/dev/null) || SINCE=""
          else
            gcloud secrets create bs-telegram-watermark --project="$GCP_PROJECT" \
              --replication-policy=automatic --labels="owner=factory-master,purpose=bs-telegram-watermark" >/dev/null 2>&1 || true
            printf '%s' "$NOW" | gcloud secrets versions add bs-telegram-watermark --project="$GCP_PROJECT" --data-file=- >/dev/null 2>&1 || true
            echo "[bs-incidents] action='baseline' since='${NOW}' note='first run — no alerts'"
            exit 0
          fi
          [ -n "$SINCE" ] || SINCE="$NOW"
          since_epoch=$(date -d "$SINCE" +%s 2>/dev/null || echo 0)
          echo "[bs-incidents] since='${SINCE}'"

          body=$(mktemp)
          http=$(curl -sS -m 20 -o "$body" -w '%{http_code}' \
            -H "Authorization: Bearer ${BS}" \
            "https://uptime.betterstack.com/api/v2/incidents" 2>/dev/null) || http="000"
          case "$http" in
            2*) ;;
            *)
              detail=$(tr -d '\r' < "$body" | tr '\n' ' ' | cut -c1-200)
              echo "[bs-incidents] action='fetch_failed' http='${http}' detail='${detail}'"
              rm -f "$body"
              exit 0
              ;;
          esac

          send_tg() {
            local code
            code=$(curl -sS -m 10 -o /dev/null -w '%{http_code}' -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=$1" 2>/dev/null) || code="000"
            printf '%s' "$code"
          }

          count=0
          while IFS= read -r inc; do
            [ -n "$inc" ] || continue
            name=$(jq -r '.attributes.name // empty' <<<"$inc" 2>/dev/null) || name=""
            cause=$(jq -r '.attributes.cause // empty' <<<"$inc" 2>/dev/null) || cause=""
            url=$(jq -r '.attributes.url // empty' <<<"$inc" 2>/dev/null) || url=""
            started=$(jq -r '.attributes.started_at // empty' <<<"$inc" 2>/dev/null) || started=""
            resolved=$(jq -r '.attributes.resolved_at // empty' <<<"$inc" 2>/dev/null) || resolved=""

            st_epoch=0; [ -n "$started" ] && st_epoch=$(date -d "$started" +%s 2>/dev/null || echo 0)
            rs_epoch=0; [ -n "$resolved" ] && rs_epoch=$(date -d "$resolved" +%s 2>/dev/null || echo 0)

            if [ "$st_epoch" -gt "$since_epoch" ]; then
              text="🔴 Better Stack — downtime${NL}${name:-incident}"
              [ -n "$cause" ] && text="${text} — ${cause}"
              [ -n "$url" ] && text="${text}${NL}${url}"
              tg=$(send_tg "$text")
              echo "[bs-incidents] action='down' name='${name}' started='${started}' telegram_http='${tg}'"
              count=$((count + 1))
            fi
            if [ -n "$resolved" ] && [ "$rs_epoch" -gt "$since_epoch" ]; then
              text="🟢 Better Stack — recovered${NL}${name:-incident}"
              [ -n "$url" ] && text="${text}${NL}${url}"
              tg=$(send_tg "$text")
              echo "[bs-incidents] action='recovered' name='${name}' resolved='${resolved}' telegram_http='${tg}'"
              count=$((count + 1))
            fi
          done < <(jq -c '.data[]?' "$body" 2>/dev/null)
          rm -f "$body"

          printf '%s' "$NOW" | gcloud secrets versions add bs-telegram-watermark --project="$GCP_PROJECT" --data-file=- >/dev/null 2>&1 || true
          echo "[bs-incidents] action='done' alerts='${count}' watermark='${NOW}'"
