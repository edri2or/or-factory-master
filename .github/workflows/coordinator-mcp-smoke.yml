name: coordinator MCP smoke

# Proves the narrow coordinator MCP (/coordinator/<repo>/mcp) end to end: mint an
# admin bearer, run the MCP handshake, list EXACTLY the scoped tool set (asserting
# the broad dispatch_workflow is ABSENT), fire ONE real route_to_agent propose
# dispatch to an allowlisted worker, and verify the walls (non-allowlisted worker
# refused; unknown coordinator path -> 404; no token -> 401). The admin secret is
# read from Secret Manager via WIF inside the run step (masked, never persisted) —
# it never enters a Claude session. Manual only.
#
# NOTE: step 4 fires ONE real agent-action.yml propose run (the worker runs a
# short read-only Claude pass on a no-op task), so this is a low- but non-zero-cost
# smoke — run it on demand, not on a schedule.

on:
  workflow_dispatch:
    inputs:
      requester:
        description: "Coordinator (requester) repo to smoke (must be on COORDINATOR_REQUESTER_REPOS)"
        required: false
        default: "nuriel"
        type: string
      worker:
        description: "Allowlisted worker to dispatch the no-op probe to"
        required: false
        default: "natan-research"
        type: string

concurrency:
  group: coordinator-mcp-smoke
  cancel-in-progress: false

permissions: {}

jobs:
  smoke:
    name: Prove the narrow coordinator dispatch surface
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: "or-factory-master-control"
      GCP_REGION: "me-west1"
      SERVICE: "factory-master-actions-mcp"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Run the coordinator smoke
        env:
          SMOKE_REQUESTER: ${{ inputs.requester }}
          SMOKE_WORKER: ${{ inputs.worker }}
          SMOKE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Resolve the live gateway URL and read the admin secret IN-STEP so the
          # secret stays in this shell only (masked, never written to GITHUB_ENV).
          GATEWAY_URL=$(gcloud run services describe "${SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.url)')
          ADMIN_SECRET=$(gcloud secrets versions access latest \
            --secret="mcp-server-admin-secret" --project="${GCP_PROJECT}" | tr -d '\r\n')
          echo "::add-mask::${ADMIN_SECRET}"
          export GATEWAY_URL ADMIN_SECRET
          python3 scripts/coordinator-mcp-smoke.py
