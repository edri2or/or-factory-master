name: Agent Router eval — Macro-F1 gate

# Authoritative LLM-backed Macro-F1 gate for the Agent Router classifier. Runs the
# 250-case battery (tests/router_battery.yaml) through the REAL classifier prompt +
# model read from templates/system/workflows/n8n/agent-router.json via OpenRouter,
# computes Macro-F1, and FAILS if it drops below 0.85.
#
# NOT triggered by pull-request events; this job needs id-token: write for WIF,
# and a pull-request workflow must never hold a WIF-capable token
# (scripts/check-no-privileged-pr-workflows.sh). The PR-time gate is the
# deterministic, secret-free eval-agent-router-precheck.yml. This file runs on
# explicit dispatch and on pushes to main that touch the classifier/battery/script.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "templates/system/workflows/n8n/agent-router.json"
      - "tests/router_battery.yaml"
      - "scripts/eval_router.py"
      - ".github/workflows/eval-agent-router.yml"

permissions: {}

jobs:
  macro_f1:
    name: Macro-F1 gate
    runs-on: ubuntu-latest
    # Broker WIF CEL pins ref=refs/heads/main; off-main refs cannot authenticate.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read    # actions/checkout
      id-token: write   # WIF OIDC token
    env:
      CONTROL_PROJECT: or-factory-master-control
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Install eval dependencies
        run: python3 -m pip install --quiet scikit-learn pyyaml requests

      - name: Read or mint the OpenRouter eval key, then run the Macro-F1 eval
        run: |
          set -euo pipefail

          # Soft-fail: a missing/unmintable eval key must not hard-fail the run —
          # write a Hebrew note and exit 0 (the gate has nothing to score).
          _soft() {
            {
              echo "## ⚠️ שער ה-Macro-F1 דולג"
              echo "${1}."
              echo "ה-eval לא רץ. אפשר להריץ מחדש (workflow_dispatch) לאחר תיקון מפתח ה-eval."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "WARN: macro-f1 eval skipped — ${1}" >&2
            exit 0
          }

          # 1. Reuse the dedicated eval key if present, else mint a small-budget
          #    inference key from the management key (mirrors provision's mint flow).
          KEY=$(gcloud secrets versions access latest --secret="openrouter-eval-key" \
                --project="$CONTROL_PROJECT" 2>/dev/null || echo "")
          if [ -n "$KEY" ]; then
            echo "::add-mask::${KEY}"
            echo "INFO: reusing existing openrouter-eval-key."
          else
            MGMT=$(gcloud secrets versions access latest --secret="openrouter-management-key" \
                   --project="$CONTROL_PROJECT" 2>/dev/null || echo "")
            [ -n "$MGMT" ] || _soft "openrouter-eval-key חסר ו-openrouter-management-key לא זמין ב-${CONTROL_PROJECT}"
            echo "::add-mask::${MGMT}"
            REQ=$(jq -cn '{name:"factory-master-eval", limit:5, limit_reset:"monthly", include_byok_in_limit:false}')
            set +e
            HTTP=$(curl -sS -o /tmp/eval-mint.json -w '%{http_code}' --max-time 30 \
              -X POST "https://openrouter.ai/api/v1/keys" \
              -H "Authorization: Bearer ${MGMT}" -H "Content-Type: application/json" -d "$REQ")
            CURL_RC=$?
            set -e
            KEY=$(jq -r '.key // empty' /tmp/eval-mint.json 2>/dev/null || echo "")
            HASH=$(jq -r '.data.hash // empty' /tmp/eval-mint.json 2>/dev/null || echo "")
            rm -f /tmp/eval-mint.json
            [ -n "$KEY" ] && echo "::add-mask::${KEY}"
            if [ "$CURL_RC" -ne 0 ] || { [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; } || [ -z "$KEY" ]; then
              _soft "מינטינג openrouter-eval-key נכשל (http=${HTTP})"
            fi
            # Best-effort persist for reuse (broker may lack SM-write on control;
            # the eval below uses the in-memory key regardless of persistence).
            gcloud secrets describe openrouter-eval-key --project="$CONTROL_PROJECT" >/dev/null 2>&1 \
              || gcloud secrets create openrouter-eval-key --project="$CONTROL_PROJECT" \
                   --replication-policy=automatic \
                   --labels="source=openrouter-mint,managed-by=or-factory-master,purpose=router-eval" \
                   --quiet 2>/dev/null || true
            printf '%s' "$KEY" | gcloud secrets versions add openrouter-eval-key \
              --project="$CONTROL_PROJECT" --data-file=- --quiet 2>/dev/null \
              || echo "WARN: could not persist openrouter-eval-key (will re-mint next run)." >&2
            gcloud secrets add-iam-policy-binding openrouter-eval-key --project="$CONTROL_PROJECT" \
              --role="roles/secretmanager.secretAccessor" \
              --member="serviceAccount:factory-master-broker@or-factory-master-control.iam.gserviceaccount.com" \
              --quiet >/dev/null 2>&1 || true
            echo "INFO: minted openrouter-eval-key (hash=${HASH})."
          fi

          # 2. Run the eval. It writes report.json and exits 1 if Macro-F1 < 0.85.
          set +e
          OPENROUTER_API_KEY="$KEY" python3 scripts/eval_router.py
          RC=$?
          set -e
          echo "INFO: eval_router.py exit=${RC}"
          exit "$RC"

      - name: Macro-F1 summary (Hebrew)
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f report.json ]; then
            echo "## ℹ️ דוח Macro-F1 לא נוצר (ראה אזהרה/שגיאה למעלה)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          F1=$(jq -r '.macro_f1' report.json)
          TH=$(jq -r '.threshold' report.json)
          TOTAL=$(jq -r '.total' report.json)
          MIS=$(jq -r '.misclassified | length' report.json)
          BAND=$(awk -v f="$F1" 'BEGIN{ if (f+0>=0.90) print "🟢 מצוין"; else if (f+0>=0.85) print "🟡 עובר עם אזהרה"; else print "🔴 נכשל" }')
          {
            echo "## שער Macro-F1 — Agent Router classifier"
            echo ""
            echo "| מדד | ערך |"
            echo "|---|---|"
            echo "| Macro-F1 | **${F1}** (סף ${TH}) |"
            echo "| תוצאה | ${BAND} |"
            echo "| סווגו שגוי | ${MIS} מתוך ${TOTAL} |"
            echo ""
            echo "### F1 לפי מחלקה"
            echo "| intent | precision | recall | F1 | n |"
            echo "|---|---|---|---|---|"
            jq -r '.per_class | to_entries[] | "| \(.key) | \(.value.precision) | \(.value.recall) | \(.value.f1) | \(.value.support) |"' report.json
            if [ "$MIS" -gt 0 ]; then
              echo ""
              echo "<details><summary>מקרים שסווגו שגוי (${MIS})</summary>"
              echo ""
              echo "| טקסט | צפוי | נחזה |"
              echo "|---|---|---|"
              jq -r '.misclassified[] | "| \(.text|gsub("[|]";"/")|.[0:80]) | \(.expected) | \(.predicted) |"' report.json
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report.json
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: router-eval-report
          path: report.json
          if-no-files-found: ignore
