name: Provision Agent-repo (GitHub-scaffold only)

# The agent-repo provisioner — the GitHub-scaffold half of provision-system.yml, with ALL
# GCP/n8n/Railway/Caddy dropped. Creates a new agent-repo from templates/agent-repo/:
#   1. create the private repo via the broker App (POST /orgs/edri2or/repos),
#   2. render templates/agent-repo/*.template (envsubst, the SAME allow-list the golden uses)
#      and push the scaffold to main (a fresh repo has no protection; direct push, masked token),
#   3. bind the new repo to the SHARED agent-repo WIF door (workloadIdentityUser on
#      agent-repo-runtime-sa) by reusing the idempotent scripts/bootstrap-agent-repo-identity.sh,
#      so the repo's agent-main.yml can auth and read anthropic-api-key with no standing secret.
#
# Runs as the broker SA (WIF, main-locked). Idempotent (re-provision = re-scaffold + re-bind).
# Reads/prints no secret values.
#
# MAIN PROTECTION (deferred, documented): strict PR+CI protection is NOT applied here. The
# broker writes results back to a requester agent-repo by committing results/<corr>.json
# directly to its main (contents) — strict PR-required protection would block that, and a
# broker-compatible protected-write path (e.g. a dedicated results ref or a 0-context broker
# PR) is a follow-up hardening. Agent-repos are PRIVATE; this is an explicit MVP tradeoff.
# NOT on the dispatch_workflow allowlist yet (added with the risk-gate in Stage 4).

on:
  workflow_dispatch:
    inputs:
      agent_repo_name:
        description: "New agent-repo name (lowercase, 4-40 chars). Becomes edri2or/<name>."
        required: true
        type: string
      agent_name:
        description: "Human-facing agent name shown in AGENTS.md (e.g. 'Nathan'). Defaults to the repo name."
        required: false
        default: ""
        type: string
      agent_purpose:
        description: "One-line purpose for AGENTS.md."
        required: false
        default: "TODO: describe this agent-repo's purpose."
        type: string
      template_dir:
        description: "Scaffold source: templates/agent-repo (read-only worker, default) or templates/agent-repo-builder (the write-capable builder-soldier)."
        required: false
        default: "templates/agent-repo"
        type: string

permissions: {}

jobs:
  provision:
    name: Provision a new agent-repo
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      CONTROL_PROJECT: or-factory-master-control
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Validate inputs
        env:
          NAME: ${{ inputs.agent_repo_name }}
          TEMPLATE_DIR: ${{ inputs.template_dir }}
        run: |
          set -euo pipefail
          printf '%s' "$NAME" | grep -Eq '^[a-z][a-z0-9-]{2,38}[a-z0-9]$' \
            || { echo "FAIL: agent_repo_name '$NAME' must match ^[a-z][a-z0-9-]{2,38}[a-z0-9]\$ (4-40 chars)" >&2; exit 1; }
          case "$NAME" in
            or-factory-master|or-factory-master-control|*-control|factory|factory-control-*)
              echo "FAIL: refusing to provision a control/factory repo name '$NAME'" >&2; exit 1 ;;
          esac
          # template_dir is an allow-listed enum (not free text) — refuse anything else so a
          # dispatch can never point the scaffold at an arbitrary path.
          case "$TEMPLATE_DIR" in
            templates/agent-repo|templates/agent-repo-builder) ;;
            *) echo "FAIL: template_dir must be templates/agent-repo or templates/agent-repo-builder (got '$TEMPLATE_DIR')" >&2; exit 1 ;;
          esac
          [ -d "$TEMPLATE_DIR" ] || { echo "FAIL: template_dir '$TEMPLATE_DIR' not found in checkout" >&2; exit 1; }
          echo "OK: will provision edri2or/${NAME} from ${TEMPLATE_DIR}"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Create repo + render & push scaffold (broker App)
        env:
          NAME: ${{ inputs.agent_repo_name }}
          AGENT_NAME_IN: ${{ inputs.agent_name }}
          AGENT_PURPOSE: ${{ inputs.agent_purpose }}
          TEMPLATE_DIR: ${{ inputs.template_dir }}
        run: |
          set -euo pipefail
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/bk.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"

          # --- create the repo (org operation; org-wide token) ---
          ORG_TOKEN=$(bash scripts/generate-app-token.sh /tmp/bk.pem "$APP_ID" "$INSTALL_ID")
          echo "::add-mask::$ORG_TOKEN"
          code=$(curl -sS -m 30 -o /tmp/cr.body -w '%{http_code}' -X POST "https://api.github.com/orgs/edri2or/repos" \
            -H "Authorization: Bearer ${ORG_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            --data "$(jq -cn --arg n "$NAME" '{name:$n, private:true, auto_init:true, description:"agent-repo (built by or-factory-master)"}')" || echo "000")
          case "$code" in
            201) echo "INFO: created edri2or/${NAME}." ;;
            422) echo "INFO: edri2or/${NAME} already exists (re-provision)." ;;
            *)   echo "FAIL: create ${NAME} HTTP ${code}: $(jq -r '.message // empty' /tmp/cr.body 2>/dev/null || true)" >&2; exit 1 ;;
          esac

          # --- mint a scoped token for the new repo (retry: a just-created repo can lag the
          #     org-wide installation by a few seconds) ---
          REPO_TOKEN=""
          for a in 1 2 3 4 5 6; do
            REPO_TOKEN=$(bash scripts/generate-app-token.sh /tmp/bk.pem "$APP_ID" "$INSTALL_ID" "" '{"contents":"write","workflows":"write"}' "[\"$NAME\"]" 2>/dev/null || true)
            [ -n "$REPO_TOKEN" ] && break
            echo "INFO: minting repo token (attempt ${a}/6; new repo may need a moment)…"; sleep 10
          done
          [ -n "$REPO_TOKEN" ] || { echo "FAIL: could not mint a scoped token for edri2or/${NAME}" >&2; exit 1; }
          echo "::add-mask::$REPO_TOKEN"

          # --- render the chosen template dir with the SAME allow-list the golden uses ---
          export AGENT_REPO_NAME="$NAME"
          export REPO_URL="https://github.com/edri2or/${NAME}"
          export ISO_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export GITHUB_RUN_ID="${GITHUB_RUN_ID}"
          export GITHUB_RUN_URL="https://github.com/edri2or/or-factory-master/actions/runs/${GITHUB_RUN_ID}"
          export AGENT_NAME="${AGENT_NAME_IN:-$NAME}"
          export AGENT_PURPOSE="$AGENT_PURPOSE"
          ALLOWLIST='${AGENT_REPO_NAME} ${REPO_URL} ${ISO_TIMESTAMP} ${GITHUB_RUN_ID} ${GITHUB_RUN_URL} ${AGENT_NAME} ${AGENT_PURPOSE}'
          SCAFFOLD=$(mktemp -d)
          cp -a "${TEMPLATE_DIR}/." "$SCAFFOLD/"
          while IFS= read -r -d '' t; do
            envsubst "$ALLOWLIST" < "$t" > "${t%.template}"
            rm -f "$t"
          done < <(find "$SCAFFOLD" -type f -name '*.template' -print0)

          # --- push the rendered scaffold to the new repo's main (fresh repo, no protection) ---
          CLONE=$(mktemp -d)
          if ! cerr=$(git clone --depth 1 "https://x-access-token:${REPO_TOKEN}@github.com/edri2or/${NAME}.git" "$CLONE" 2>&1); then
            echo "FAIL: clone edri2or/${NAME}: $(printf '%s' "$cerr" | sed "s/${REPO_TOKEN}/***/g")" >&2; exit 1
          fi
          cp -a "$SCAFFOLD/." "$CLONE/"
          git -C "$CLONE" config user.name "or-factory-master[bot]"
          git -C "$CLONE" config user.email "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
          git -C "$CLONE" add -A
          if git -C "$CLONE" diff --cached --quiet; then
            echo "INFO: edri2or/${NAME} scaffold already current — nothing to push."
          else
            git -C "$CLONE" commit -q -m "scaffold: agent-repo from or-factory-master ${TEMPLATE_DIR}"
            if ! perr=$(git -C "$CLONE" push "https://x-access-token:${REPO_TOKEN}@github.com/edri2or/${NAME}.git" HEAD:main 2>&1); then
              echo "FAIL: push scaffold: $(printf '%s' "$perr" | sed "s/${REPO_TOKEN}/***/g")" >&2; exit 1
            fi
            echo "PASS: scaffolded edri2or/${NAME} (CLAUDE.md, AGENTS.md, .mcp.json, agent-main.yml)."
          fi
          rm -f /tmp/bk.pem /tmp/cr.body

      - name: Bind the new agent-repo to the shared WIF door
        env:
          NAME: ${{ inputs.agent_repo_name }}
        run: |
          set -euo pipefail
          # Idempotent: re-asserts the door (pool/provider/SA + secretAccessor — no-ops if
          # present) and adds the per-repo workloadIdentityUser binding for edri2or/${NAME}.
          bash scripts/bootstrap-agent-repo-identity.sh factory-test-25 or-factory-master-control "$NAME"
          echo "PASS: edri2or/${NAME} bound to the agent-repo WIF door (can run Claude with no standing secret)."

      - name: Summary
        env:
          NAME: ${{ inputs.agent_repo_name }}
        run: |
          {
            echo "## Provisioned agent-repo: edri2or/${NAME}"
            echo ""
            echo "- Scaffold: CLAUDE.md (=@AGENTS.md), AGENTS.md, .mcp.json (factory), .github/workflows/agent-main.yml"
            echo "- Bound to the shared agent-repo WIF door (reads anthropic-api-key at run time; no standing secret)"
            echo "- Work is brokered via edri2or/or-factory-master :: agent-action.yml"
            echo "- Main protection: deferred (MVP) — see the workflow header."
          } >> "$GITHUB_STEP_SUMMARY"
