name: OIL Auto-fix — Set up approval environment

# Stage 4 of the OIL auto-fix loop. Creates (idempotently) the GitHub
# Environment `oil-autofix` on this repo and locks it down:
#   * prevent_self_review = true  — the actor who triggered a deployment (the
#     broker App that opened the draft PR) can NEVER approve its own run.
#   * deployment branch policy = main only.
# A GitHub App CANNOT be added as a required reviewer through the REST API (the
# `reviewers` field accepts only User/Team), so the ONE remaining step — adding
# `oil-autofix-approver` as the required reviewer — is a single operator click
# in the repo's Environments settings. This workflow does everything else and
# reports whether that click is still pending.
#
# Runs automatically once when this file lands on main (push trigger), and is
# re-runnable by hand (workflow_dispatch). Idempotent: if the environment
# already exists it is left untouched (so a reviewer added via the UI is never
# clobbered); only the main branch policy is ensured. It is a post-merge helper,
# not a required check — a failure here blocks nothing, it just means the
# environment was not created and needs a re-run.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/setup-oil-environment.yml'

permissions: {}

jobs:
  setup:
    name: Create oil-autofix environment (idempotent)
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      CONTROL_PROJECT: "or-factory-master-control"
      REPO: "or-factory-master"
      ENVIRONMENT: "oil-autofix"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Create / verify the oil-autofix environment + report reviewer
        run: |
          set -euo pipefail
          # Mint a short-lived broker-App token with administration:write on just
          # this repo (creating an environment needs the administration perm).
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/oil-env-key.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          APP_TOKEN=$(bash scripts/generate-app-token.sh /tmp/oil-env-key.pem "$APP_ID" "$INSTALL_ID" "" '{"administration":"write"}' "[\"$REPO\"]")
          shred -u /tmp/oil-env-key.pem 2>/dev/null || rm -f /tmp/oil-env-key.pem
          [ -n "$APP_TOKEN" ] || { echo "::error::could not mint broker App token" >&2; exit 1; }
          echo "::add-mask::$APP_TOKEN"

          API="https://api.github.com/repos/edri2or/${REPO}/environments/${ENVIRONMENT}"

          # Idempotency: if the environment already exists, do NOT re-PUT it —
          # that would wipe a required reviewer an operator added through the UI
          # (apps can only be added that way). Just confirm and ensure the policy.
          existing=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" "$API")
          if [ "$existing" = "200" ]; then
            # Already exists: do NOT re-PUT (that could wipe a UI-added app
            # reviewer). Just read back prevent_self_review and warn if it is off
            # (e.g. the env was auto-created by a job reference before this ran).
            psr=$(curl -sS \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" "$API" \
              | jq -r '.prevent_self_review // false' 2>/dev/null || echo false)
            echo "Environment ${ENVIRONMENT} already exists (prevent_self_review=${psr}) — leaving reviewers intact."
            if [ "$psr" != "true" ]; then
              echo "::warning::prevent_self_review is OFF on the existing ${ENVIRONMENT} environment. Enable it in repo Settings → Environments → ${ENVIRONMENT}."
            fi
          else
            # Create it: prevent self-review ON, no wait timer, custom branch
            # policy (pinned to main just below). reviewers deliberately omitted —
            # the app reviewer is added once via the UI (REST cannot add apps).
            BODY=$(jq -cn '{
              wait_timer: 0,
              prevent_self_review: true,
              deployment_branch_policy: {
                protected_branches: false,
                custom_branch_policies: true
              }
            }')
            resp=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X PUT \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$API" -d "$BODY")
            code=$(printf '%s' "$resp" | tail -1 | sed 's/HTTP_STATUS://')
            [ "$code" = "200" ] \
              || { echo "::error::create environment HTTP ${code}: $(printf '%s' "$resp" | sed '$d')" >&2; exit 1; }
            echo "PASS: environment ${ENVIRONMENT} created (prevent_self_review=true, main-only)."
          fi

          # Ensure the 'main' deployment branch policy exists (idempotent).
          POL="${API}/deployment-branch-policies"
          have_main=$(curl -sS \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" "$POL" \
            | jq -r '[.branch_policies[]?.name] | index("main") // empty' 2>/dev/null || true)
          if [ -n "$have_main" ]; then
            echo "Branch policy 'main' already present."
          else
            code=$(curl -sS -o /tmp/pol.json -w '%{http_code}' -X POST \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$POL" -d '{"name":"main","type":"branch"}')
            case "$code" in
              200|201) echo "PASS: 'main' branch policy added." ;;
              *) echo "::warning::could not add main branch policy HTTP ${code}: $(jq -r '.message // empty' /tmp/pol.json 2>/dev/null || true)" ;;
            esac
            rm -f /tmp/pol.json
          fi

          # Read back: is a required reviewer configured yet? (Apps appear as a
          # 'reviewer.slug'; users as 'reviewer.login'.) Reporting only.
          revs=$(curl -sS \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" "$API" \
            | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | .reviewers[]? | (.reviewer.slug // .reviewer.login)] | join(", ")' 2>/dev/null || true)

          {
            echo "## OIL auto-fix — approval environment"
            echo ""
            echo "Environment \`${ENVIRONMENT}\` on \`edri2or/${REPO}\` — prevent_self_review ON, main-only."
            if [ -n "$revs" ]; then
              echo ""
              echo "✅ Required reviewer(s) configured: \`${revs}\`"
            else
              echo ""
              echo "### ⚠ One operator click still needed"
              echo "The REST API cannot add a GitHub App as a required reviewer. Add it once:"
              echo ""
              echo "1. Repo **Settings → Environments → oil-autofix**."
              echo "2. Tick **Required reviewers**, search **oil-autofix-approver**, add it, **Save**."
              echo "3. Confirm **Prevent self-review** is ticked (this workflow set it)."
              echo ""
              echo "Until a reviewer is added the gate stays OPEN (a job referencing this"
              echo "environment proceeds without pausing). The gate only pauses once the"
              echo "approver App is the required reviewer."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
