name: Bootstrap Sandbox Tester (toy-key identity on factory-test-25)

# One-time, idempotent infra. Creates the sandbox "toy-key" identity on factory-test-25:
# a dedicated WIF pool + provider (factory repo, ANY ref) mapped to a minimal
# sandbox-tester-sa whose only power is reading the per-test github-app-* secrets. This is
# what lets a NON-main work branch apply-and-prove a change on a live test system BEFORE
# merging ("prove -> merge") without ever exposing the powerful broker SA to a branch.
#
# Runs as the broker (so it is main-locked, like all broker work) -- the identity it BUILDS
# is the weak one. Re-running repairs/updates the resources. Touches nothing outside
# factory-test-25 (the script hard-refuses any other project).

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "Shared test project to bootstrap the sandbox identity on. Must be factory-test-25."
        required: false
        default: "factory-test-25"
        type: string

permissions: {}

jobs:
  bootstrap:
    name: Bootstrap sandbox tester identity
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Bootstrap sandbox tester identity (idempotent)
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
        run: bash scripts/bootstrap-sandbox-tester.sh "$GCP_PROJECT"
