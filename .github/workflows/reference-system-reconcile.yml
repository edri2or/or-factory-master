name: Reference System Reconcile

# Scheduled drift detection for the standing reference system ("מכונית-ייחוס").
# Every 6h (and on manual dispatch) it reads reference-system/config.yml and,
# only once the system has actually been provisioned (Stage 0), checks two
# things and emits one event via scripts/emit-event.sh:
#   - mould drift: did templates/system/ or provision-system.yml change between
#     the commit the standing system was last built from (built_from_commit) and
#     current main? If so the live system is stale relative to today's output.
#   - liveness: does the public /healthz answer 2xx?
# In sync + healthy -> factory.reference_reconcile.ok (info -> Axiom).
# Otherwise        -> factory.reference_reconcile.drift (error + action_required
#                     -> Axiom + Telegram + Linear).
#
# ALERT ONLY — it never auto-rebuilds. Re-provision/redeploy is a costed move
# that stays human-gated (CLAUDE.md "the one rule"); the action_required event
# tells Or, who decides. Until provisioned (provisioned: false) it is a clean
# no-op: it reads the config, logs, and exits without touching GCP.
#
# cron staggered to :30 (factory-health :00, system-runtime :15).

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  reconcile:
    name: Reference system reconcile
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # Need history to diff built_from_commit..main on the mould paths.
          fetch-depth: 0

      - name: Read reference config
        id: cfg
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source scripts/reference-config.sh
          PROVISIONED="$(ref_config_get provisioned)"
          BUILT="$(ref_config_get built_from_commit)"
          HEALTH="$(ref_config_get health_url)"
          SYS="$(ref_config_get system_name)"
          {
            echo "provisioned=${PROVISIONED}"
            echo "built_from=${BUILT}"
            echo "health_url=${HEALTH}"
            echo "system_name=${SYS}"
          } >> "$GITHUB_OUTPUT"
          if [ "${PROVISIONED}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reference system not provisioned yet (provisioned=${PROVISIONED}) — reconcile is a no-op."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP via WIF
        if: steps.cfg.outputs.skip != 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Reconcile and emit
        if: steps.cfg.outputs.skip != 'true'
        env:
          HEAD_SHA: ${{ github.sha }}
          BUILT: ${{ steps.cfg.outputs.built_from }}
          HEALTH_URL: ${{ steps.cfg.outputs.health_url }}
          SYS: ${{ steps.cfg.outputs.system_name }}
        run: |
          set -uo pipefail
          # --- mould drift: did the system template move since built_from? ---
          VERSION="unknown"
          if [ -z "${BUILT}" ]; then
            VERSION="missing"
          elif ! git cat-file -e "${BUILT}^{commit}" 2>/dev/null; then
            VERSION="unknown"
          elif git diff --quiet "${BUILT}" "${HEAD_SHA}" -- templates/system .github/workflows/provision-system.yml; then
            VERSION="in_sync"
          else
            VERSION="stale_mould"
          fi

          # --- liveness ---
          code=$(curl -sS -m 15 -o /dev/null -w '%{http_code}' "${HEALTH_URL}" 2>/dev/null) || true
          code="${code:-000}"
          case "${code}" in
            2*) HEALTHY="true" ;;
            *)  HEALTHY="false" ;;
          esac

          BODY=$(jq -cn --arg v "${VERSION}" --arg b "${BUILT}" --arg h "${HEAD_SHA}" \
                   --arg c "${code}" --arg u "${HEALTH_URL}" \
                   '{version:$v, built_from:$b, main_head:$h, http:$c, endpoint:$u}')

          if [ "${VERSION}" = "in_sync" ] && [ "${HEALTHY}" = "true" ]; then
            echo "[reconcile] ${SYS}: in sync (health=${code})"
            bash scripts/emit-event.sh \
              --name="factory.reference_reconcile.ok" --severity="info" --layer="system" \
              --workflow="reference-system-reconcile.yml" --run-id="${GITHUB_RUN_ID}" \
              --system="${SYS}" --body="${BODY}" || true
            STATUS="✅ תואם (version=in_sync, health=${code})"
          else
            echo "[reconcile] ${SYS}: DRIFT (version=${VERSION}, health=${code})"
            bash scripts/emit-event.sh \
              --name="factory.reference_reconcile.drift" --severity="error" --layer="system" \
              --workflow="reference-system-reconcile.yml" --run-id="${GITHUB_RUN_ID}" \
              --system="${SYS}" --action-required="true" --body="${BODY}" || true
            STATUS="🚨 סטייה (version=${VERSION}, health=${code}) — דורש בדיקה (אין rebuild אוטומטי)"
          fi

          {
            echo "## Reference reconcile — $(date -u +%Y-%m-%dT%H:%MZ)"
            echo ""
            echo "| מדד | ערך |"
            echo "|---|---|"
            echo "| מערכת | ${SYS} |"
            echo "| גרסה (מולד) | ${VERSION} |"
            echo "| בריאות (HTTP) | ${code} |"
            echo "| סטטוס | ${STATUS} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Not-provisioned no-op summary
        if: steps.cfg.outputs.skip == 'true'
        run: |
          {
            echo "## Reference reconcile — no-op"
            echo ""
            echo "המערכת העומדת עדיין לא הוקמה (שלב 0). אין מה לבדוק; הבדיקה תתחיל לרוץ אחרי ההקמה."
          } >> "${GITHUB_STEP_SUMMARY}"
