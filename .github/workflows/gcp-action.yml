name: GCP Action (risk-gated)

# The consolidated GCP risk-gate (absorbed from edri2or/gcp-hands). Runs a gcloud
# command after classifying it green/yellow/red (scripts/gcp-classify.sh):
#
#   phase=propose (default):
#     green  -> run the read immediately as the broker SA + emit an audit event
#     yellow -> run + emit an audit event (reversible change)
#     red    -> DO NOT run; ask the MCP to send Or a Telegram ✅/❌ approval card
#               (/gcp-approval-register). The command is NOT executed here.
#   phase=execute:
#     dispatched by the MCP ONLY after Or taps ✅ on the Telegram card — runs the
#     approved command as the broker SA and reports back. The approval is the gate.
#
# Authenticates as the broker SA via WIF (pinned to factory main; off-main fails to
# auth). The command is charset-restricted to a shell-metacharacter-free set in BOTH
# the MCP bridge and here, so it is split into argv and exec'd without a shell
# re-parse — no injection surface. JIT/PAM is deferred (owner chose simplest-safe):
# the broker SA's existing standing roles on or-factory-master-control execute red
# ops; documented as an accepted tradeoff in devplans/consolidate-to-master.md.
# NOT on the dispatch_workflow allowlist — the execute phase is reachable only
# through the MCP approval path (like the repo-delete approval bridge).

on:
  workflow_dispatch:
    inputs:
      command:
        description: "gcloud command (args WITHOUT the leading 'gcloud'), e.g. 'secrets list --project=or-factory-master-control'"
        required: true
        type: string
      phase:
        description: "propose (classify + run green/yellow, card for red) | execute (run, post-approval)"
        required: false
        type: string
        default: "propose"
      correlation_id:
        description: "Short id correlating the approval card with the execute run."
        required: false
        type: string
        default: ""
      reason:
        description: "Free-text reason shown on the approval card."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  gcp-action:
    name: GCP risk-gated action
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches fails to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      CONTROL_PROJECT: or-factory-master-control
      MCP_URL: https://factory-master-actions-mcp-140345952904.me-west1.run.app

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.0

      - name: Validate inputs
        env:
          PHASE: ${{ inputs.phase }}
          COMMAND: ${{ inputs.command }}
          CORR: ${{ inputs.correlation_id }}
        run: |
          set -euo pipefail
          case "$PHASE" in
            propose|execute) ;;
            *) echo "FAIL: phase must be 'propose' or 'execute' (got '$PHASE')" >&2; exit 1 ;;
          esac
          # Charset allow-list — NO shell metacharacters (; | & $ ` ( ) < > newlines).
          # This is the same guard the MCP bridge applies; it lets us split COMMAND
          # into argv and exec gcloud without a shell re-parse.
          if [ -z "$COMMAND" ] || ! printf '%s' "$COMMAND" | grep -Eq '^[A-Za-z0-9 _.,:/=@-]+$'; then
            echo "FAIL: command is empty or contains disallowed characters" >&2; exit 1
          fi
          if [ -n "$CORR" ] && ! printf '%s' "$CORR" | grep -Eq '^[A-Za-z0-9-]{1,40}$'; then
            echo "FAIL: correlation_id has a bad shape" >&2; exit 1
          fi

      - name: Classify
        id: classify
        env:
          COMMAND: ${{ inputs.command }}
        run: |
          set -euo pipefail
          # The classifier matches the OPERATION SHAPE with exact token counts, so
          # flag tokens (e.g. --project=foo) must be stripped before classifying —
          # otherwise "secrets list --project=foo" (3 tokens) misses green
          # "secrets list" (2 tokens) and falls through to red. The FULL command is
          # preserved for execution (only the classification input is normalized).
          set -f
          read -ra toks <<< "$COMMAND"
          norm=()
          for t in "${toks[@]}"; do [[ "$t" == -* ]] || norm+=("$t"); done
          set +f
          NORM="${norm[*]}"
          OUT=$(bash scripts/gcp-classify.sh "$NORM")
          echo "classifier (normalized='$NORM'): $OUT"
          TIER=$(printf '%s' "$OUT" | sed -n 's/.*"tier":[[:space:]]*"\([^"]*\)".*/\1/p')
          [ -n "$TIER" ] || { echo "FAIL: classifier returned no tier" >&2; exit 1; }
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "INFO: command tiered '$TIER' (normalized: '$NORM')"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      # ---- red + propose: ask the MCP to send the Telegram approval card --------
      - name: Send Telegram approval card (red, propose)
        if: inputs.phase == 'propose' && steps.classify.outputs.tier == 'red'
        env:
          COMMAND: ${{ inputs.command }}
          CORR: ${{ inputs.correlation_id }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          CORR_VAL="${CORR:-run-${GITHUB_RUN_ID}}"
          MCP_ADMIN=$(gcloud secrets versions access latest --secret=mcp-server-admin-secret --project="$CONTROL_PROJECT" | tr -d '\r\n')
          echo "::add-mask::$MCP_ADMIN"
          REQ=$(jq -cn --arg cmd "$COMMAND" --arg corr "$CORR_VAL" --arg reason "$REASON" \
            '{command:$cmd, correlation_id:$corr, reason:$reason}')
          CODE=$(curl -sS -m 30 -o /tmp/gcp-reg.body -w '%{http_code}' \
            -X POST "${MCP_URL}/gcp-approval-register" \
            -H "X-Admin-Secret: ${MCP_ADMIN}" \
            -H "Content-Type: application/json" \
            --data "$REQ" || echo "000")
          echo "POST /gcp-approval-register -> HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            echo "FAIL: could not send approval card (HTTP ${CODE}): $(jq -r '.error // empty' /tmp/gcp-reg.body 2>/dev/null || true)" >&2
            rm -f /tmp/gcp-reg.body; exit 1
          fi
          rm -f /tmp/gcp-reg.body
          echo "PASS: RED command — approval card sent to Telegram (awaiting Or's ✅). Command NOT executed."

      # ---- green/yellow (propose) OR execute (post-approval): run the command ----
      - name: Run command (green/yellow or approved-execute)
        id: run
        if: >-
          (inputs.phase == 'propose' && (steps.classify.outputs.tier == 'green' || steps.classify.outputs.tier == 'yellow'))
          || inputs.phase == 'execute'
        env:
          COMMAND: ${{ inputs.command }}
          TIER: ${{ steps.classify.outputs.tier }}
          PHASE: ${{ inputs.phase }}
        run: |
          set -euo pipefail
          # Split into argv — COMMAND is charset-validated (no shell metacharacters),
          # so word-splitting here is safe and there is no shell re-parse of values.
          read -ra ARGS <<< "$COMMAND"
          echo "INFO: running (phase=$PHASE, tier=${TIER:-n/a}): gcloud ${ARGS[*]}"
          # Capture output for the audit trail; never print secret VALUES — the
          # green/yellow patterns are metadata reads + reversible ops, not value reads.
          set +e
          OUT=$(gcloud "${ARGS[@]}" 2>&1)
          RC=$?
          set -e
          printf '%s\n' "$OUT" | head -100
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"
          if [ "$RC" -ne 0 ]; then
            echo "FAIL: command exited $RC" >&2
            exit "$RC"
          fi

      - name: Audit event
        if: always() && steps.run.conclusion != 'skipped'
        continue-on-error: true
        env:
          COMMAND: ${{ inputs.command }}
          TIER: ${{ steps.classify.outputs.tier }}
          PHASE: ${{ inputs.phase }}
          RC: ${{ steps.run.outputs.exit_code }}
          CORR: ${{ inputs.correlation_id }}
        run: |
          set -uo pipefail
          bash scripts/emit-event.sh \
            --name="factory.gcp_action.ran" \
            --severity="info" \
            --layer="factory" \
            --workflow="gcp-action.yml" \
            --run-id="${GITHUB_RUN_ID}" \
            --body="$(jq -cn --arg t "${TIER:-}" --arg p "$PHASE" --arg rc "${RC:-}" --arg corr "${CORR:-}" \
              '{tier:$t, phase:$p, exit_code:$rc, correlation_id:$corr}')" || true

      - name: Telegram confirmation (execute phase)
        if: inputs.phase == 'execute' && success()
        continue-on-error: true
        env:
          TIER: ${{ steps.classify.outputs.tier }}
          CORR: ${{ inputs.correlation_id }}
        run: |
          set -uo pipefail
          BOT=$(gcloud secrets versions access latest --secret=telegram-bot-token --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          CHAT=$(gcloud secrets versions access latest --secret=telegram-chat-id --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          if [ -n "$BOT" ] && [ -n "$CHAT" ]; then
            echo "::add-mask::$BOT"
            MSG="✅ בוצע: פעולת GCP אדומה שאישרת (${CORR:-}) הורצה בהצלחה."
            curl -sS -m 20 -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              --data-urlencode "chat_id=${CHAT}" \
              --data-urlencode "text=${MSG}" >/dev/null || true
          fi
