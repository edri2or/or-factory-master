name: Archive retired repos (one-shot)

# One-shot, idempotent: archives the two retired repos consolidated into
# or-factory-master — edri2or/gcp-hands and edri2or/factory — making them
# read-only. Their GCP control projects were already soft-deleted, so their
# workflows can no longer authenticate; archiving is the final, reversible
# (unarchive) "this is retired" signal.
#
# Hardcoded to exactly those two repos (a guard refuses anything else, and the
# survivor itself can never be a target), so this workflow can only ever archive
# the intended pair. Auth: WIF as the broker SA only to read the broker App
# credentials from Secret Manager; the archive itself is a GitHub API PATCH as
# the org-wide broker App (administration:write — the same grant it uses for the
# protect-main ruleset). Re-running is a no-op (archiving an archived repo is
# accepted). NOT on the dispatch_workflow allowlist; operator/agent dispatch only.

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  archive:
    name: Archive retired repos
    runs-on: ubuntu-latest
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches fails to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      CONTROL_PROJECT: or-factory-master-control

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Archive the two retired repos (broker App)
        run: |
          set -euo pipefail
          # The ONLY repos this workflow may touch. A guard below refuses any other
          # value and hard-refuses the survivor, so the org-wide App token minted
          # here can never archive the live factory or a managed system.
          TARGETS="gcp-hands factory"
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/broker-key.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          TOKEN=$(bash scripts/generate-app-token.sh /tmp/broker-key.pem "$APP_ID" "$INSTALL_ID")
          rm -f /tmp/broker-key.pem
          echo "::add-mask::$TOKEN"

          FAILED=0
          for repo in $TARGETS; do
            case "$repo" in
              gcp-hands|factory) ;;
              *) echo "REFUSE: $repo is not an allowed archive target" >&2; FAILED=1; continue ;;
            esac
            if [ "$repo" = "or-factory-master" ]; then
              echo "REFUSE: never archive the survivor" >&2; FAILED=1; continue
            fi
            code=$(curl -sS -m 30 -o /tmp/arch.body -w '%{http_code}' \
              -X PATCH "https://api.github.com/repos/edri2or/${repo}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --data '{"archived":true}' || echo "000")
            archived=$(jq -r '.archived // empty' /tmp/arch.body 2>/dev/null || true)
            if [ "$code" = "200" ] && [ "$archived" = "true" ]; then
              echo "PASS: edri2or/${repo} archived."
            else
              echo "FAIL: edri2or/${repo} archive HTTP ${code}: $(jq -r '.message // empty' /tmp/arch.body 2>/dev/null || true)" >&2
              FAILED=1
            fi
            rm -f /tmp/arch.body
          done
          [ "$FAILED" -eq 0 ] || { echo "::error::one or more repos failed to archive" >&2; exit 1; }
          echo "PASS: both retired repos archived."
