name: Changelog Check

# Mirrors the CHANGELOG gate from edri2or/factory's documentation-check.yml.
# Fails PRs and merges that touch code (.sh / .json / .yml / .yaml) without
# adding a matching CHANGELOG.md entry, and fails when CHANGELOG.md grows
# past the size cap.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changelog:
    name: Changelog gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # check-changelog-updated.sh reads `git diff HEAD~1 HEAD`. On
          # push-to-main this is the merge commit (the full PR diff). On
          # pull_request this is the synthetic merge commit GitHub creates.
          # Both need at least 2 commits in history.
          fetch-depth: 2

      - name: Check changelog updated
        run: bash scripts/check-changelog-updated.sh

      - name: Check changelog size
        run: bash scripts/check-changelog-size.sh

      - name: Check skills mirror in sync
        run: bash scripts/check-skills-mirror.sh

      - name: Check devplan updated
        run: bash scripts/check-devplan-updated.sh

      - name: Check watchdog registry updated
        run: bash scripts/check-watchdog-registry-updated.sh

      - name: Check template golden in sync
        # Anti-drift twin: a templates/system/ change must also update the
        # committed golden (tests/golden/system/), and the envsubst allow-list
        # must stay byte-identical across the renderer, provision, and
        # validator. No-op when already in sync.
        run: bash scripts/check-golden-sync.sh
