name: Changelog Check

# Mirrors the CHANGELOG gate from edri2or/factory's documentation-check.yml.
# Fails PRs and merges that touch code (.sh / .json / .yml / .yaml) without
# adding a matching CHANGELOG.md entry, and fails when CHANGELOG.md grows
# past the size cap.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog:
    name: Changelog gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # check-changelog-updated.sh reads `git diff HEAD~1 HEAD`. On
          # push-to-main this is the merge commit (the full PR diff). On
          # pull_request this is the synthetic merge commit GitHub creates.
          # Both need at least 2 commits in history.
          fetch-depth: 2

      - name: Check changelog updated
        run: bash scripts/check-changelog-updated.sh

      - name: Check changelog size
        run: bash scripts/check-changelog-size.sh

      - name: Check skills mirror in sync
        run: bash scripts/check-skills-mirror.sh

      - name: Check devplan updated
        run: bash scripts/check-devplan-updated.sh

      - name: Check watchdog registry updated
        run: bash scripts/check-watchdog-registry-updated.sh

      - name: Check template golden in sync
        # Anti-drift twin: a templates/system/ change must also update the
        # committed golden (tests/golden/system/), and the envsubst allow-list
        # must stay byte-identical across the renderer, provision, and
        # validator. No-op when already in sync.
        run: bash scripts/check-golden-sync.sh

      - name: Check agent-repo golden in sync
        # Anti-drift twin for the agent-repo mould: a templates/agent-repo/ change must
        # also update the committed golden (tests/golden/agent-repo/). Allow-list parity
        # with provision-agent-repo.yml is checked too once that provisioner exists.
        # No-op when already in sync.
        run: bash scripts/check-agent-repo-golden-sync.sh

      - name: Check n8n postgres queries quote interpolated values
        # Guards the JSON.stringify-in-SQL antipattern that silently killed three
        # scheduled workers (a {{ }} value must be a single-quoted SQL literal;
        # JSON.stringify emits double quotes = a Postgres identifier). Precise:
        # inspects only postgres `query` strings, so legit JSON.stringify in
        # jsonBody / claimsJson / prompts is untouched.
        run: bash scripts/check-n8n-sql-literals.sh

      - name: Check documented facts match the code
        # Documentation drift prevention, Layer 2 (the pillar): a fact extracted
        # from code — e.g. the named-Postgres-query whitelist — must equal what
        # the doc declares. Catches the recorded "8 vs 4" class, which the
        # presence/structure gates miss. See docs/doc-drift-prevention.md.
        run: bash scripts/check-doc-facts.sh

      - name: Check bound docs touched when their artifact changes
        # Documentation drift prevention, Layer 1: if a bound artifact REALLY
        # changed (n8n diffs normalized so a cosmetic reposition doesn't count),
        # its bound doc must be touched in the same diff — unless a `doc-waiver:`
        # line is added to a changelog.d/ fragment. See docs/doc-drift-prevention.md.
        run: bash scripts/check-doc-binding.sh
