name: Set repo auto-merge

# AI-operable utility: turn ON a repo's "Allow auto-merge" setting (allow_auto_merge)
# via the broker App (administration:write), authenticated WIF-only. Explicit
# workflow_dispatch only — never auto-runs. The minted token is scoped to the single
# target repo (least-privilege) and masked. Reads the current value first (so the run
# log shows the true prior state), sets it, and verifies the result in-run.
#
# Why this exists: GitHub's native auto-merge (the operator's "Auto-merge when ready"
# toggle) is refused with "Auto merge is not allowed for this repository" unless the
# repo has allow_auto_merge enabled. provision-system.yml set it at create time, but the
# lean /new-system path did not, so sibling repos (e.g. or-agents) and any repo that
# never had it need this one-time flip. Idempotent: setting it when already true is a
# harmless no-op.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo name under edri2or (e.g. or-agents)"
        required: true
        type: string

permissions: {}

jobs:
  set-automerge:
    name: Enable allow_auto_merge via the broker App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Mint broker App token (administration:write, scoped to the target repo)
        env:
          REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          case "$REPO" in
            *[!a-zA-Z0-9._-]*|"") echo "FAIL: invalid repo name" >&2; exit 1 ;;
          esac
          APP_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-id" \
            --project="or-factory-master-control")
          INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-installation-id" \
            --project="or-factory-master-control")
          gcloud secrets versions access latest \
            --secret="factory-master-broker-app-private-key" \
            --project="or-factory-master-control" > /tmp/broker-app-key.pem
          chmod 600 /tmp/broker-app-key.pem
          TOKEN=$(bash scripts/generate-app-token.sh /tmp/broker-app-key.pem "$APP_ID" "$INSTALL_ID" \
            "" '{"administration":"write"}' "[\"${REPO}\"]")
          [ -n "$TOKEN" ] || { echo "FAIL: could not obtain App installation token" >&2; exit 1; }
          echo "::add-mask::${TOKEN}"
          echo "APP_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
          shred -u /tmp/broker-app-key.pem 2>/dev/null || rm -f /tmp/broker-app-key.pem

      - name: Enable allow_auto_merge + verify
        env:
          REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          # Report the current value first — the run log then records the true prior state.
          BEFORE=$(curl -sS -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/edri2or/${REPO}" \
            | python3 -c "import json,sys;print(str(json.load(sys.stdin).get('allow_auto_merge')).lower())")
          echo "Current: edri2or/${REPO} allow_auto_merge=${BEFORE}"
          echo "Setting edri2or/${REPO} allow_auto_merge=true"
          CODE=$(curl -sS -o /tmp/patch.json -w '%{http_code}' -X PATCH \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${REPO}" \
            -d '{"allow_auto_merge": true}')
          if [ "$CODE" -ge 300 ]; then
            echo "FAIL: PATCH returned HTTP ${CODE}. Body:" >&2
            # Surface the message field only (never the token).
            python3 -c "import json,sys;print(json.load(open('/tmp/patch.json')).get('message','(no message)'))" >&2 || true
            exit 1
          fi
          # Verify the change actually took.
          GOT=$(curl -sS -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/edri2or/${REPO}" \
            | python3 -c "import json,sys;print(str(json.load(sys.stdin)['allow_auto_merge']).lower())")
          echo "Verified: edri2or/${REPO} allow_auto_merge=${GOT}"
          [ "$GOT" = "true" ] || { echo "FAIL: allow_auto_merge did not turn on (got ${GOT})" >&2; exit 1; }
          echo "OK: edri2or/${REPO} now allows auto-merge."
