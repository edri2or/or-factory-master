name: Playground Tests

# Fifth CI gate, on top of the four static ones (changelog, shellcheck +
# yamllint, secret-scan, supply-chain). This one validates RUNTIME behavior:
#  - actionlint catches structural workflow bugs the raw yamllint pass misses
#    (with shellcheck severity pinned to `error`, matching pipeline-tests.yml
#    so the existing style-level noise stays out of CI).
#  - BATS runs the per-script unit tests under scripts/tests/ — proves the
#    check-scripts actually fail when they should.
#  - validate-templates.sh renders every templates/system/*.template with
#    the same envsubst allow-list provision-system.yml uses and asserts no
#    placeholders survive — catches misspelled ${SYSTEM_NAEM}-style bugs
#    before they blow up a real provision.
#
# Job name MUST stay exactly "Playground tests" — that's the string the
# protect-main ruleset will require in a follow-up PR after this lands.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playground:
    name: Playground tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # bats-core / bats-support / bats-assert live as git submodules
          # under scripts/tests/. Without this they'd be empty directories
          # and BATS would not run.
          submodules: true
          # Some check-scripts walk `git diff HEAD~1 HEAD`; full history keeps
          # them honest in PRs / future fixture-style tests.
          fetch-depth: 0

      - name: Install actionlint
        # Pinned to a released version; the SHA256 is verified against the
        # release asset so a compromised release tag can't ship arbitrary
        # binaries. (One-line install pattern matches rhysd/actionlint docs.)
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tgz
          tar -xzf /tmp/actionlint.tgz -C /usr/local/bin actionlint
          actionlint -version

      - name: Install envsubst + yamllint
        # validate-templates.sh needs envsubst (gettext-base); yamllint is
        # used opportunistically on rendered *.yml.template output. The
        # existing pipeline-tests job apt-installs the same packages.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gettext-base yamllint

      - name: actionlint
        # `-shellcheck "shellcheck -S error"` matches pipeline-tests.yml's
        # `--severity=error` filter, so we don't suddenly start failing on
        # info/style hits that the rest of the repo deliberately ignores.
        run: actionlint -shellcheck "shellcheck -S error"

      - name: BATS tests
        run: ./scripts/tests/bats/bin/bats scripts/tests/*.bats

      - name: db-setup verification gate (B1)
        # Proves the db-setup table-verification verdict goes RED on a real table
        # shortfall and stays "inconclusive" (loud WARN, never a false RED) on a
        # foreign/unreadable execution — mirror of _db_verdict in the system
        # configure-agent-router.yml. master-system-integrity B1.
        run: bash scripts/tests/db-verify-gate-test.sh

      - name: Template validation
        run: bash scripts/tests/validate-templates.sh

      - name: System golden gate
        # Re-renders the whole templates/system mould with the same fixed
        # allow-list a provision uses and compares it byte-for-byte (sha256
        # manifest + the two rendered orientation docs) to the committed
        # golden under tests/golden/system/. Drift fails the build; the twin
        # gate in changelog-check.yml forces a `--update` whenever the mould
        # changes. Stays in THIS job so no new required status context is added.
        run: bash scripts/check-system-golden.sh

      - name: Single-voice agent gate (mould)
        # Validates the shipped sub-agent templates (templates/system/workflows/n8n/
        # *-agent.json): every specialist agent returns {reply} to the orchestrator
        # via an Execute-Workflow trigger and never owns an operator-facing Telegram
        # send. The same script (scripts/check-agent-single-voice.sh) is shipped into
        # each system by provision-system.yml and runs there over workflows/n8n.
        run: AGENT_DIR=templates/system/workflows/n8n bash scripts/check-agent-single-voice.sh

      - name: executeWorkflow-published gate (mould)
        # n8n 2.x: a published workflow that calls a sub via executeWorkflow (MAIN)
        # cannot publish while that sub is unpublished (HTTP 400) — it silently stays
        # inactive (the async-deep-research / factory-test-053 bug: tg-inbound never
        # activated). This gate fails CI if any executeWorkflow-referenced sub is
        # installed `_upsert_wf … no`. toolWorkflow (ai_tool) subs are exempt.
        run: WF_DIR=templates/system/workflows/n8n CONFIGURE_FILE=templates/system/.github/workflows/configure-agent-router.yml bash scripts/check-executeworkflow-published.sh

      - name: MCP server build + unit tests
        # Compile-check the mcp-server TypeScript and run its pure unit tests
        # (tsc + node --test). Until now NO PR-time gate compiled this code —
        # tsc ran only inside the deploy Docker build, so a type error or a
        # broken bot guard would surface only at deploy. The factory chat bot
        # (telegram-chat*.ts) adds real logic that must be gated here. Uses the
        # runner's preinstalled Node (20+, matching the node:20 runtime image);
        # kept in THIS job so no new required status context is added.
        run: |
          set -euo pipefail
          cd services/mcp-server
          npm ci
          npm test
