name: Playground Tests

# Runtime-behavior CI gate on top of the static ones (changelog, shellcheck +
# yamllint, secret-scan, supply-chain):
#  - actionlint catches structural workflow bugs the raw yamllint pass misses.
#  - BATS runs the per-script unit tests under scripts/tests/ — proves the
#    check-scripts actually fail when they should.
#  - MCP server build + unit tests compile-check the gateway TypeScript.
#
# Job name MUST stay exactly "Playground tests" — it is a required status
# context in the protect-main ruleset.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playground:
    name: Playground tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # bats-core / bats-support / bats-assert live as git submodules
          # under scripts/tests/. Without this they'd be empty directories
          # and BATS would not run.
          submodules: true
          # Some check-scripts walk `git diff HEAD~1 HEAD`; full history keeps
          # them honest in PRs.
          fetch-depth: 0

      - name: Install actionlint
        # Pinned to a released version. (One-line install pattern matches
        # rhysd/actionlint docs.)
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tgz
          tar -xzf /tmp/actionlint.tgz -C /usr/local/bin actionlint
          actionlint -version

      - name: actionlint
        # `-shellcheck "shellcheck -S error"` matches pipeline-tests.yml's
        # `--severity=error` filter, so info/style hits the repo ignores stay out.
        run: actionlint -shellcheck "shellcheck -S error" -ignore 'unexpected key "queue" for "concurrency" section'

      - name: BATS tests
        run: ./scripts/tests/bats/bin/bats scripts/tests/*.bats

      - name: MCP server build + unit tests
        # Compile-check the mcp-server TypeScript and run its pure unit tests
        # (tsc + node --test). The factory chat bot (telegram-chat*.ts) adds real
        # logic that must be gated here. Kept in THIS job so no new required
        # status context is added.
        run: |
          set -euo pipefail
          cd services/mcp-server
          npm ci
          npm test
