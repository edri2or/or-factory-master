name: Secret Scan

# Mirrors edri2or/factory's scan-for-secrets gate. Greps the tree for
# known leak shapes (ghp_/PAT GitHub tokens, GCP OAuth tokens, PEM
# private keys, GCP SA JSON, committed .env files). Self-excludes the
# scanner itself.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Run secret scanner
        run: bash scripts/scan-for-secrets.sh
