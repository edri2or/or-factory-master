name: n8n-mcp live-write smoke

# Proves the central n8n-mcp gateway end to end: mint a system-scoped bearer,
# run the MCP handshake through /n8n/<system>/mcp to the internal n8n-mcp sidecar,
# and drive a live create+delete of a `dev-` scratch workflow on the system's own
# n8n. The admin secret is read from Secret Manager via WIF inside the run step
# (masked, never persisted) — it never enters a Claude session. Manual only.

on:
  workflow_dispatch:
    inputs:
      system:
        description: "System to smoke-test (must be on the gateway allowlist)"
        required: false
        default: "or-edri-4"
        type: string

concurrency:
  group: n8n-mcp-smoke
  cancel-in-progress: false

permissions: {}

jobs:
  smoke:
    name: Drive the live-write loop
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: "or-factory-master-control"
      GCP_REGION: "me-west1"
      SERVICE: "factory-master-actions-mcp"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Run the live-write smoke
        env:
          SMOKE_SYSTEM: ${{ inputs.system }}
          SMOKE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Resolve the live gateway URL and read the admin secret IN-STEP so the
          # secret stays in this shell only (masked, never written to GITHUB_ENV).
          GATEWAY_URL=$(gcloud run services describe "${SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.url)')
          ADMIN_SECRET=$(gcloud secrets versions access latest \
            --secret="mcp-server-admin-secret" --project="${GCP_PROJECT}" | tr -d '\r\n')
          echo "::add-mask::${ADMIN_SECRET}"
          export GATEWAY_URL ADMIN_SECRET
          python3 scripts/n8n-mcp-smoke.py

      - name: Prove durable session recovery across an instance replacement
        env:
          SMOKE_SYSTEM: ${{ inputs.system }}
          SMOKE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Layer-B acceptance gate: establish a live session, FORCE the single
          # warm gateway instance to be replaced (a new Cloud Run revision wipes
          # the in-RAM session map — the exact event DEPLOY_NONCE/maintenance/OOM
          # cause in production), then reuse the SAME session id. Success can only
          # come from the durable Firestore session store rehydrating it.
          GATEWAY_URL=$(gcloud run services describe "${SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.url)')
          ADMIN_SECRET=$(gcloud secrets versions access latest \
            --secret="mcp-server-admin-secret" --project="${GCP_PROJECT}" | tr -d '\r\n')
          echo "::add-mask::${ADMIN_SECRET}"
          export GATEWAY_URL ADMIN_SECRET
          export SMOKE_STATE_FILE="${RUNNER_TEMP}/n8n-mcp-smoke-state.json"

          SMOKE_PHASE=init python3 scripts/n8n-mcp-smoke.py

          # Force a fresh revision → the min=max=1 instance is replaced (RAM map
          # gone). SMOKE_RESTART_NONCE only perturbs the template to roll the
          # revision; it is ignored by the gateway and dropped by the next real
          # deploy's full `services replace`. The update waits until the new
          # revision is serving 100% of traffic.
          echo "Forcing a gateway instance replacement…"
          gcloud run services update "${SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --update-env-vars="SMOKE_RESTART_NONCE=${SMOKE_RUN_ID}" --quiet >/dev/null
          echo "New revision serving; reusing the pre-restart session."

          SMOKE_PHASE=recover python3 scripts/n8n-mcp-smoke.py
