name: Provision YouTube Data API key (create key -> system SM, grant accessor)

# Manual dispatch only. Provisions a Google API key for YouTube Data API v3 into
# a system's GCP project, server-side, as the broker SA via WIF (the broker holds
# roles/owner on system projects, which includes serviceusage.apiKeys.create).
#
# What it does, end to end:
#   1. Enables youtube.googleapis.com + apikeys.googleapis.com on the project.
#   2. Creates (or reuses, by display name) an API key restricted to YouTube
#      Data API v3 only (least-privilege), with NO application restriction —
#      the key is read SERVER-SIDE (n8n on Railway + the CI probe), so an
#      HTTP-referrer restriction would break it (the likely reason the existing
#      google-api-key was rejected).
#   3. Pipes the key string straight into Secret Manager — never echoed, stored
#      in a shell variable, or written to the logs (mirrors mirror-secret-to-system.yml).
#   4. Grants roles/secretmanager.secretAccessor on the secret to the system's
#      deploy-sa + runtime-sa (the probe authenticates as deploy-sa; the live
#      n8n tool reads it as runtime-sa).
#
# Why a dedicated workflow (not gcp-action.yml): the "create key -> read key
# string -> write to SM" path must keep the value off the logs, which a single
# classified gcloud command cannot do. Defaults target the or-aios request
# (docs/agent-specs/youtube-search-key-request.md) so it dispatches zero-arg,
# but the inputs keep it reusable. Idempotent: an existing key with the same
# display name is reused; re-running just adds another (identical) SM version.

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "System GCP project that holds the key + secret (e.g. factory-test-8). Never a control project."
        required: false
        type: string
        default: "factory-test-8"
      secret_name:
        description: "Secret Manager secret id to store the key string under."
        required: false
        type: string
        default: "youtube-data-api-key"
      target_service:
        description: "API the key is restricted to (api-target service)."
        required: false
        type: string
        default: "youtube.googleapis.com"
      members:
        description: "Comma-separated SA emails to grant secretAccessor. Empty = deploy-sa@<proj> + runtime-sa@<proj>."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  provision:
    name: Provision YouTube Data API key
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - name: Validate inputs
        id: validate
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          TARGET_SERVICE: ${{ inputs.target_service }}
          MEMBERS_IN: ${{ inputs.members }}
        run: |
          set -euo pipefail
          # Guard: never a control project (holds the broker's own keys), and
          # never the shared sandbox backend (its IAM is deliberately minimal).
          case "$GCP_PROJECT" in
            or-factory-master-control|factory-control-9piybr)
              echo "FAIL: gcp_project must not be a control project" >&2; exit 1 ;;
            factory-test-25)
              echo "FAIL: gcp_project must not be factory-test-25 (shared sandbox backend)" >&2; exit 1 ;;
          esac
          if ! [[ "$GCP_PROJECT" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: gcp_project '$GCP_PROJECT' is not a valid GCP project id (6-30 chars)" >&2
            exit 1
          fi
          if ! [[ "$SECRET_NAME" =~ ^[a-zA-Z0-9_-]{1,255}$ ]]; then
            echo "FAIL: secret_name '$SECRET_NAME' is not a valid secret id" >&2
            exit 1
          fi
          # An API "service" target is a googleapis.com hostname.
          if ! [[ "$TARGET_SERVICE" =~ ^[a-z0-9.-]+\.googleapis\.com$ ]]; then
            echo "FAIL: target_service '$TARGET_SERVICE' is not a *.googleapis.com service name" >&2
            exit 1
          fi
          if [ -n "$MEMBERS_IN" ]; then
            MEMBERS="$MEMBERS_IN"
          else
            MEMBERS="deploy-sa@${GCP_PROJECT}.iam.gserviceaccount.com,runtime-sa@${GCP_PROJECT}.iam.gserviceaccount.com"
          fi
          {
            echo "members=$MEMBERS"
            echo "display_name=${SECRET_NAME}-${GCP_PROJECT}"
          } >> "$GITHUB_OUTPUT"
          echo "INFO: provision API key for '$TARGET_SERVICE' in '$GCP_PROJECT' -> secret '$SECRET_NAME', grant: $MEMBERS"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Enable required APIs
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          TARGET_SERVICE: ${{ inputs.target_service }}
        run: |
          set -euo pipefail
          # apikeys.googleapis.com is required to create/list API keys at all.
          gcloud services enable "$TARGET_SERVICE" apikeys.googleapis.com \
            --project="$GCP_PROJECT" --quiet
          echo "PASS: enabled $TARGET_SERVICE + apikeys.googleapis.com on $GCP_PROJECT."

      - name: Create or reuse the API key
        id: key
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          TARGET_SERVICE: ${{ inputs.target_service }}
          DISPLAY_NAME: ${{ steps.validate.outputs.display_name }}
        run: |
          set -euo pipefail

          # --billing-project pins the API Keys API call's quota/consumer project
          # to $GCP_PROJECT (where we enabled apikeys.googleapis.com). Without it,
          # gcloud bills the call to the broker credentials' own project
          # (or-factory-master-control), where the API Keys API is disabled —
          # which is the SERVICE_DISABLED failure the first run hit.
          _find_key() {
            gcloud services api-keys list \
              --project="$GCP_PROJECT" \
              --billing-project="$GCP_PROJECT" \
              --filter="displayName=${DISPLAY_NAME} AND NOT state:DELETED" \
              --format="value(name)" 2>/dev/null | head -1
          }

          KEY_NAME="$(_find_key || true)"
          if [ -n "$KEY_NAME" ]; then
            echo "INFO: reusing existing API key for display name '$DISPLAY_NAME'."
          else
            # api-target=service=... restricts the key to that API only (least
            # privilege). No --allowed-* flag => application restriction = None,
            # which is required for server-side use (no HTTP referrer).
            # Right after enabling apikeys.googleapis.com the create can briefly
            # see SERVICE_DISABLED / PERMISSION_DENIED — retry only that class.
            for i in 1 2 3 4 5 6; do
              if err=$(gcloud services api-keys create \
                         --project="$GCP_PROJECT" \
                         --billing-project="$GCP_PROJECT" \
                         --display-name="$DISPLAY_NAME" \
                         --api-target="service=${TARGET_SERVICE}" \
                         --quiet 2>&1); then
                echo "PASS: API key created (display name '$DISPLAY_NAME')."
                break
              fi
              echo "$err" >&2
              if echo "$err" | grep -qE 'SERVICE_DISABLED|PERMISSION_DENIED|has not been used|propagat'; then
                echo "INFO: transient on create attempt $i; retrying in 10s…" >&2
                sleep 10
                continue
              fi
              echo "FAIL: could not create API key" >&2
              exit 1
            done
            KEY_NAME="$(_find_key || true)"
            [ -n "$KEY_NAME" ] || { echo "FAIL: created key not found by display name" >&2; exit 1; }
          fi
          echo "key_name=$KEY_NAME" >> "$GITHUB_OUTPUT"
          echo "INFO: key resource resolved."

      - name: Store key string in Secret Manager
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          KEY_NAME: ${{ steps.key.outputs.key_name }}
        run: |
          set -euo pipefail
          # Create the secret shell if missing (idempotent).
          if ! gcloud secrets describe "$SECRET_NAME" --project="$GCP_PROJECT" >/dev/null 2>&1; then
            gcloud secrets create "$SECRET_NAME" \
              --project="$GCP_PROJECT" \
              --replication-policy=automatic \
              --labels=managed-by=or-factory-master,provisioned-by=provision-youtube-data-api-key \
              --quiet
            echo "PASS: created secret shell $SECRET_NAME in $GCP_PROJECT."
          else
            echo "INFO: secret $SECRET_NAME already exists in $GCP_PROJECT."
          fi

          # Read the key string and pipe it straight into a new secret version.
          # The pipe keeps the value off the logs and out of any shell variable.
          gcloud services api-keys get-key-string "$KEY_NAME" \
            --billing-project="$GCP_PROJECT" \
            --format="value(keyString)" \
          | gcloud secrets versions add "$SECRET_NAME" \
            --project="$GCP_PROJECT" --data-file=- --quiet
          echo "PASS: stored key string as a new version of $SECRET_NAME."

          COUNT=$(gcloud secrets versions list "$SECRET_NAME" \
            --project="$GCP_PROJECT" --filter="state=ENABLED" \
            --format="value(name)" | wc -l)
          echo "PASS: $SECRET_NAME now has ${COUNT} enabled version(s) in $GCP_PROJECT."

      - name: Grant secretAccessor to each member
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          MEMBERS: ${{ steps.validate.outputs.members }}
        run: |
          set -euo pipefail
          _grant() {
            local member="$1" i err
            for i in 1 2 3 4 5 6; do
              if err=$(gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
                         --project="$GCP_PROJECT" \
                         --role="roles/secretmanager.secretAccessor" \
                         --member="serviceAccount:${member}" \
                         --quiet 2>&1); then
                echo "PASS: granted secretAccessor on $SECRET_NAME to $member"
                return 0
              fi
              if echo "$err" | grep -qE 'PERMISSION_DENIED|does not exist|NOT_FOUND'; then
                echo "INFO: transient on attempt $i for $member; retrying in 5s…" >&2
                sleep 5
                continue
              fi
              echo "FAIL: could not grant secretAccessor to $member:" >&2
              echo "$err" >&2
              return 1
            done
            echo "FAIL: exhausted retries granting secretAccessor to $member" >&2
            return 1
          }
          IFS=',' read -ra MEMBER_ARR <<< "$MEMBERS"
          for m in "${MEMBER_ARR[@]}"; do
            m="$(echo "$m" | xargs)"
            [ -z "$m" ] && continue
            _grant "$m"
          done
          echo "PASS: all secretAccessor grants applied on $SECRET_NAME."

      - name: Verify (no value printed)
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          KEY_NAME: ${{ steps.key.outputs.key_name }}
          MEMBERS: ${{ steps.validate.outputs.members }}
        run: |
          set -euo pipefail
          echo "=== Verification ==="
          # Key API restriction is exactly the target service (least-privilege),
          # and no browser/application restriction is set (server-side use).
          gcloud services api-keys describe "$KEY_NAME" \
            --billing-project="$GCP_PROJECT" \
            --format="yaml(displayName,restrictions.apiTargets,restrictions.browserKeyRestrictions)" || true

          ENABLED=$(gcloud secrets versions list "$SECRET_NAME" \
            --project="$GCP_PROJECT" --filter="state=ENABLED" --format="value(name)" | wc -l)
          echo "secret '$SECRET_NAME' enabled versions: $ENABLED"
          [ "$ENABLED" -ge 1 ] || { echo "FAIL: secret has no enabled version" >&2; exit 1; }

          POLICY=$(gcloud secrets get-iam-policy "$SECRET_NAME" \
            --project="$GCP_PROJECT" --format="json")
          IFS=',' read -ra MEMBER_ARR <<< "$MEMBERS"
          for m in "${MEMBER_ARR[@]}"; do
            m="$(echo "$m" | xargs)"; [ -z "$m" ] && continue
            if echo "$POLICY" | grep -q "serviceAccount:${m}"; then
              echo "PASS: $m has a binding on $SECRET_NAME"
            else
              echo "FAIL: $m missing from $SECRET_NAME IAM policy" >&2; exit 1
            fi
          done
          echo "=== PASS: youtube-data-api-key provisioned, stored, and readable by deploy-sa + runtime-sa ==="
