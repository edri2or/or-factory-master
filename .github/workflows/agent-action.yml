name: Agent Action (broker — dispatch work to an agent-repo)

# The broker for the agent-repo product-type (devplans/agent-repo-product.md),
# shaped on gcp-action.yml + publish-static-site.yml. Dispatched on or-factory-master only,
# runs as the broker SA (WIF, main-locked). It risk-classifies the task
# (scripts/agent-classify.sh) and routes:
#
#   phase=propose (default):
#     green/yellow -> broker the work immediately (dispatch worker -> poll -> write
#                     the result back to the requester) + emit audit events.
#     red          -> DO NOT broker; ask the MCP to send Or a Telegram ✅/❌ card
#                     (/agent-action-register). The work is NOT run here.
#   phase=execute:
#     dispatched by the MCP ONLY after Or taps ✅ on the Telegram card — brokers the
#     approved work regardless of tier. The approval is the gate.
#
# For one unit of brokered work it:
#   1. mints a per-request token scoped to the WORKER (actions) and dispatches the worker's
#      agent-main.yml with the task + correlation_id,
#   2. POLLS the worker run to terminal (broker-PULL — the worker never reaches outward),
#   3. downloads the worker's `agent-result` artifact,
#   4. commits the result to the REQUESTER repo as results/<correlation_id>.json (a token
#      scoped to the requester, contents).
#
# CHANNEL = FILES, not GitHub issues: the broker App has contents:write but NOT issues, so
# the requester's tracking channel is repo files (git-native; switching to issues would need
# an App-permission change + re-consent). agent->broker only (the broker pulls; agents never
# talk directly). Every cross-repo reach is a FRESH, minimal, single-repo-scoped broker App
# token; the worker holds no standing secret. Audit via emit-event.sh.
#
# Allowlisted for phase=propose only: the MCP dispatch_workflow tool refuses a phase=execute
# dispatch, so EXECUTE is reachable ONLY through the Telegram approval callback (the RED gate
# cannot be bypassed). Mirrors gcp-action.yml's "execute reachable only via the MCP".

on:
  workflow_dispatch:
    inputs:
      worker_repo:
        description: "Worker agent-repo that runs the task (edri2or/<repo> or bare repo)."
        required: true
        type: string
      requester_repo:
        description: "Requester agent-repo the result is written back to (bare repo under edri2or)."
        required: true
        type: string
      task:
        description: "The unit of work handed to the worker (treated as untrusted data by the worker)."
        required: true
        type: string
      correlation_id:
        description: "Short id tying the dispatch, artifact, result file and events together."
        required: false
        default: ""
        type: string
      phase:
        description: "propose (classify + run green/yellow, card for red) | execute (run, post-approval)."
        required: false
        default: "propose"
        type: string
      reason:
        description: "Free-text reason shown on the RED approval card."
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  broker:
    name: Broker a unit of work to an agent-repo
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches fails to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      CONTROL_PROJECT: or-factory-master-control
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      MCP_URL: https://factory-master-actions-mcp-140345952904.me-west1.run.app

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Validate inputs
        env:
          WORKER: ${{ inputs.worker_repo }}
          REQUESTER: ${{ inputs.requester_repo }}
          TASK: ${{ inputs.task }}
          CORR: ${{ inputs.correlation_id }}
          PHASE: ${{ inputs.phase }}
        run: |
          set -euo pipefail
          case "$PHASE" in
            propose|execute) ;;
            *) echo "FAIL: phase must be 'propose' or 'execute' (got '$PHASE')" >&2; exit 1 ;;
          esac
          norm() { printf '%s' "${1##*/}"; }   # accept owner/repo or bare repo
          for pair in "worker_repo:$(norm "$WORKER")" "requester_repo:$(norm "$REQUESTER")"; do
            name="${pair#*:}"; key="${pair%%:*}"
            printf '%s' "$name" | grep -Eq '^[a-z][a-z0-9._-]{2,38}[a-z0-9]$' \
              || { echo "FAIL: ${key} '${name}' has a bad repo-name shape" >&2; exit 1; }
            case "$name" in
              or-factory-master|or-factory-master-control|*-control) echo "FAIL: refusing control/factory repo '${name}'" >&2; exit 1 ;;
            esac
          done
          [ -n "$TASK" ] || { echo "FAIL: task is empty" >&2; exit 1; }
          if [ -n "$CORR" ]; then
            printf '%s' "$CORR" | grep -Eq '^[A-Za-z0-9-]{1,40}$' || { echo "FAIL: correlation_id has a bad shape" >&2; exit 1; }
          fi

      - name: Classify
        id: classify
        env:
          TASK: ${{ inputs.task }}
          WORKER: ${{ inputs.worker_repo }}
        run: |
          set -euo pipefail
          # An agent task is FREEFORM text — the classifier substring-matches it
          # case-insensitively (no normalization needed, unlike gcp-action.yml), then
          # CAPS the tier by the worker's capability (a read-only worker → red→yellow,
          # so a task that merely mentions a risky word is not falsely RED-gated).
          OUT=$(bash scripts/agent-classify.sh "$TASK" "$WORKER")
          echo "classifier: $OUT"
          TIER=$(printf '%s' "$OUT" | sed -n 's/.*"tier":[[:space:]]*"\([^"]*\)".*/\1/p')
          [ -n "$TIER" ] || { echo "FAIL: classifier returned no tier" >&2; exit 1; }
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "INFO: task tiered '$TIER'"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      # ---- red + propose: ask the MCP to send the Telegram approval card --------
      - name: Send Telegram approval card (red, propose)
        if: inputs.phase == 'propose' && steps.classify.outputs.tier == 'red'
        env:
          WORKER: ${{ inputs.worker_repo }}
          REQUESTER: ${{ inputs.requester_repo }}
          TASK: ${{ inputs.task }}
          CORR: ${{ inputs.correlation_id }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          WORKER="${WORKER##*/}"; REQUESTER="${REQUESTER##*/}"
          CORR_VAL="${CORR:-run-${GITHUB_RUN_ID}}"
          MCP_ADMIN=$(gcloud secrets versions access latest --secret=mcp-server-admin-secret --project="$CONTROL_PROJECT" | tr -d '\r\n')
          echo "::add-mask::$MCP_ADMIN"
          REQ=$(jq -cn --arg w "$WORKER" --arg r "$REQUESTER" --arg t "$TASK" --arg corr "$CORR_VAL" --arg reason "$REASON" \
            '{worker_repo:$w, requester_repo:$r, task:$t, correlation_id:$corr, reason:$reason}')
          CODE=$(curl -sS -m 30 -o /tmp/agent-reg.body -w '%{http_code}' \
            -X POST "${MCP_URL}/agent-action-register" \
            -H "X-Admin-Secret: ${MCP_ADMIN}" \
            -H "Content-Type: application/json" \
            --data "$REQ" || echo "000")
          echo "POST /agent-action-register -> HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            ERR=$(jq -r '.error // empty' /tmp/agent-reg.body 2>/dev/null || true)
            echo "FAIL: could not send approval card (HTTP ${CODE}): ${ERR}" >&2
            # Don't fail SILENTLY (the old behaviour — Or never learned a RED task was dropped).
            # Tell Or plainly with a custom Hebrew Telegram; keep it SEPARATE from the generic
            # emit Telegram (emitted below at severity=info → Axiom-only) to avoid a double-send
            # — the same split workspace-token-audit.yml uses.
            BOT=$(gcloud secrets versions access latest --secret=telegram-bot-token --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
            CHAT=$(gcloud secrets versions access latest --secret=telegram-chat-id --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
            if [ -n "$BOT" ]; then echo "::add-mask::$BOT"; fi
            TELEGRAM_BOT_TOKEN="$BOT" TELEGRAM_CHAT_ID="$CHAT" \
              bash scripts/notify-card-failure.sh "$CORR_VAL" "$CODE" "$ERR" || true
            # Axiom-only audit (info + action_required=false → no second Telegram, no Linear noise).
            bash scripts/emit-event.sh --name="factory.agent_action.card_failed" --severity=info --layer=factory \
              --workflow=agent-action.yml --run-id="${GITHUB_RUN_ID}" --action-required=false \
              --body="$(jq -cn --arg c "$CORR_VAL" --arg code "$CODE" --arg e "$ERR" '{correlation_id:$c, http_code:$code, error:$e}')" || true
            rm -f /tmp/agent-reg.body; exit 1
          fi
          rm -f /tmp/agent-reg.body
          echo "PASS: RED task — approval card sent to Telegram (awaiting Or's ✅). Work NOT brokered."

      # ---- green/yellow (propose) OR execute (post-approval): broker the work ----
      - name: Broker the work (dispatch worker -> poll -> write result to requester)
        if: >-
          (inputs.phase == 'propose' && (steps.classify.outputs.tier == 'green' || steps.classify.outputs.tier == 'yellow'))
          || inputs.phase == 'execute'
        env:
          WORKER: ${{ inputs.worker_repo }}
          REQUESTER: ${{ inputs.requester_repo }}
          TASK: ${{ inputs.task }}
          CORR: ${{ inputs.correlation_id }}
          TIER: ${{ steps.classify.outputs.tier }}
          PHASE: ${{ inputs.phase }}
        run: |
          set -uo pipefail
          WORKER="${WORKER##*/}"; REQUESTER="${REQUESTER##*/}"
          CORR_VAL="${CORR:-skel-${GITHUB_RUN_ID}}"

          emit() {  # emit <name> <severity> <action_required> <body-json>
            bash scripts/emit-event.sh --name="$1" --severity="$2" --layer=factory \
              --workflow=agent-action.yml --run-id="${GITHUB_RUN_ID}" \
              --action-required="$3" --body="$4" || true
          }
          fail() {
            echo "FAIL: $1" >&2
            emit "factory.agent_action.failed" "error" "true" \
              "$(jq -cn --arg c "$CORR_VAL" --arg m "$1" '{correlation_id:$c, error:$m}')"
            exit 1
          }
          mint() {  # mint <perms-json> <repo> ; retries for a just-created repo (installation lag)
            local perms="$1" repo="$2" t="" a
            for a in 1 2 3 4 5 6; do
              t=$(bash scripts/generate-app-token.sh /tmp/bk.pem "$APP_ID" "$INSTALL_ID" "" "$perms" "[\"$repo\"]" 2>/dev/null || true)
              [ -n "$t" ] && { printf '%s' "$t"; return 0; }
              sleep 10
            done
            return 1
          }

          emit "factory.agent_action.started" "info" "false" \
            "$(jq -cn --arg c "$CORR_VAL" --arg w "$WORKER" --arg r "$REQUESTER" --arg t "${TIER:-}" --arg p "${PHASE:-}" \
              '{correlation_id:$c, worker:$w, requester:$r, tier:$t, phase:$p}')"

          # --- broker App creds ---
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/bk.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"

          # --- 1) dispatch the worker's agent-main.yml (actions token, that repo only) ---
          WORKER_TOKEN=$(mint '{"actions":"write"}' "$WORKER") || fail "could not mint worker token for ${WORKER}"
          echo "::add-mask::$WORKER_TOKEN"
          code=$(curl -sS -m 30 -o /tmp/disp.body -w '%{http_code}' -X POST \
            "https://api.github.com/repos/edri2or/${WORKER}/actions/workflows/agent-main.yml/dispatches" \
            -H "Authorization: Bearer ${WORKER_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            --data "$(jq -cn --arg t "$TASK" --arg c "$CORR_VAL" '{ref:"main", inputs:{task:$t, correlation_id:$c}}')" || echo "000")
          [ "$code" = "204" ] || fail "dispatch agent-main.yml in ${WORKER} -> HTTP ${code}: $(head -c 200 /tmp/disp.body 2>/dev/null)"
          echo "INFO: dispatched agent-main.yml in edri2or/${WORKER} (corr=${CORR_VAL})."
          emit "factory.agent_action.dispatched" "info" "false" \
            "$(jq -cn --arg c "$CORR_VAL" --arg w "$WORKER" '{correlation_id:$c, worker:$w}')"

          export GH_TOKEN="$WORKER_TOKEN"

          # --- 2) find + poll the worker run to terminal (broker-PULL) ---
          RID=""
          for a in $(seq 1 18); do
            RID=$(gh run list --repo "edri2or/${WORKER}" --workflow agent-main.yml -L 5 \
              --json databaseId,event \
              --jq "[.[] | select(.event==\"workflow_dispatch\")] | .[0].databaseId // empty" 2>/dev/null || true)
            [ -n "$RID" ] && break
            sleep 5
          done
          [ -n "$RID" ] || fail "worker run never appeared in ${WORKER}"
          echo "INFO: worker run id=${RID}; polling to terminal…"
          concl=""
          for a in $(seq 1 60); do
            st=$(gh run view "$RID" --repo "edri2or/${WORKER}" --json status --jq '.status' 2>/dev/null || echo "")
            if [ "$st" = "completed" ]; then
              concl=$(gh run view "$RID" --repo "edri2or/${WORKER}" --json conclusion --jq '.conclusion' 2>/dev/null || echo "")
              break
            fi
            sleep 10
          done
          [ -n "$concl" ] || fail "worker run ${RID} did not finish within ~10m"
          echo "INFO: worker run ${RID} conclusion=${concl}"
          [ "$concl" = "success" ] || fail "worker run ${RID} did not succeed (${concl})"

          # --- 3) download the worker's result artifact ---
          rm -rf dl && mkdir -p dl
          gh run download "$RID" --repo "edri2or/${WORKER}" --name agent-result --dir dl 2>/dev/null \
            || fail "could not download agent-result artifact from worker run ${RID}"
          RESULT_FILE="dl/${CORR_VAL}.json"
          [ -f "$RESULT_FILE" ] || RESULT_FILE=$(find dl -name '*.json' | head -1)
          [ -n "$RESULT_FILE" ] && [ -f "$RESULT_FILE" ] || fail "result json not found in the artifact"
          RESULT_JSON=$(cat "$RESULT_FILE")
          printf '%s' "$RESULT_JSON" | jq -e . >/dev/null 2>&1 || fail "worker result is not valid JSON"
          echo "INFO: result: $(printf '%s' "$RESULT_JSON" | head -c 300)"

          # --- 4) write the result back to the requester repo (contents token, that repo only) ---
          REQ_TOKEN=$(mint '{"contents":"write"}' "$REQUESTER") || fail "could not mint requester token for ${REQUESTER}"
          echo "::add-mask::$REQ_TOKEN"
          RPATH="results/${CORR_VAL}.json"
          B64=$(printf '%s' "$RESULT_JSON" | base64 -w0)
          SHA=$(curl -sS -m 30 "https://api.github.com/repos/edri2or/${REQUESTER}/contents/${RPATH}" \
            -H "Authorization: Bearer ${REQ_TOKEN}" -H "Accept: application/vnd.github+json" | jq -r '.sha // empty' 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            PUT_BODY=$(jq -cn --arg m "agent-action result ${CORR_VAL}" --arg c "$B64" --arg s "$SHA" '{message:$m, content:$c, sha:$s}')
          else
            PUT_BODY=$(jq -cn --arg m "agent-action result ${CORR_VAL}" --arg c "$B64" '{message:$m, content:$c}')
          fi
          pcode=$(curl -sS -m 30 -o /tmp/put.body -w '%{http_code}' -X PUT \
            "https://api.github.com/repos/edri2or/${REQUESTER}/contents/${RPATH}" \
            -H "Authorization: Bearer ${REQ_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            --data "$PUT_BODY" || echo "000")
          case "$pcode" in
            200|201) echo "PASS: wrote result to edri2or/${REQUESTER}/${RPATH}." ;;
            *) fail "write result to ${REQUESTER}/${RPATH} -> HTTP ${pcode}: $(jq -r '.message // empty' /tmp/put.body 2>/dev/null)" ;;
          esac
          rm -f /tmp/bk.pem

          emit "factory.agent_action.completed" "info" "false" \
            "$(jq -cn --arg c "$CORR_VAL" --arg w "$WORKER" --arg r "$REQUESTER" --arg p "$RPATH" \
              '{correlation_id:$c, worker:$w, requester:$r, result_path:$p}')"
          echo "PASS: broker dispatched -> worker ran Claude -> result returned to edri2or/${REQUESTER}/${RPATH}."

      - name: Telegram confirmation (execute phase)
        if: inputs.phase == 'execute' && success()
        continue-on-error: true
        env:
          REQUESTER: ${{ inputs.requester_repo }}
          CORR: ${{ inputs.correlation_id }}
        run: |
          set -uo pipefail
          REQUESTER="${REQUESTER##*/}"
          BOT=$(gcloud secrets versions access latest --secret=telegram-bot-token --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          CHAT=$(gcloud secrets versions access latest --secret=telegram-chat-id --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          if [ -n "$BOT" ] && [ -n "$CHAT" ]; then
            echo "::add-mask::$BOT"
            MSG="✅ בוצע: משימת-הסוכן שאישרת (${CORR:-}) הורצה — התוצאה נכתבה ל-${REQUESTER}."
            curl -sS -m 20 -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              --data-urlencode "chat_id=${CHAT}" \
              --data-urlencode "text=${MSG}" >/dev/null || true
          fi
