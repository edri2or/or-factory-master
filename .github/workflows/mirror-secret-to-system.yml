name: Mirror Secret to System (control -> system SM, value copy)

# Manual dispatch only. Copies the LATEST version of one or more Secret Manager
# secrets FROM or-factory-master-control INTO an existing system's GCP project,
# server-side, as the broker SA via WIF. The value is piped directly between
# gcloud calls — never echoed, stored in a shell variable, or written to logs.
#
# Why this exists: scripts/copy-generic-secrets.sh seeds every generic secret
# into a system ONLY at provision time. A generic secret whose value changes in
# control AFTER a system was provisioned (e.g. a rotated google-oauth-client-*)
# never propagates — the system keeps the value it was born with. grant-secret-
# accessor.yml closes the IAM half of this gap; this workflow closes the value
# half. Idempotent: re-running just adds another (identical) version to the dest.

on:
  workflow_dispatch:
    inputs:
      system_project:
        description: "Destination system GCP project (e.g. factory-test-23). Never a control project."
        required: true
        type: string
      secret_names:
        description: "Comma-separated secret name(s), same id in control and dest (e.g. google-oauth-client-id,google-oauth-client-secret)."
        required: true
        type: string

permissions: {}

jobs:
  mirror:
    name: Mirror secret value(s) control -> system
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - name: Validate inputs
        id: validate
        env:
          SYSTEM_PROJECT: ${{ inputs.system_project }}
          SECRET_NAMES: ${{ inputs.secret_names }}
        run: |
          set -euo pipefail
          # Guard: the destination is a SYSTEM, never a control project (which
          # holds the broker's own keys) nor the shared sandbox backend.
          case "$SYSTEM_PROJECT" in
            or-factory-master-control|factory-control-9piybr)
              echo "FAIL: system_project must not be a control project" >&2; exit 1 ;;
            factory-test-25)
              echo "FAIL: system_project must not be factory-test-25 (shared sandbox backend)" >&2; exit 1 ;;
          esac
          if ! [[ "$SYSTEM_PROJECT" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: system_project '$SYSTEM_PROJECT' is not a valid GCP project id (6-30 chars)" >&2
            exit 1
          fi
          if [ -z "${SECRET_NAMES// /}" ]; then
            echo "FAIL: secret_names is empty" >&2; exit 1
          fi
          # Each secret id: letters, digits, underscore, hyphen; 1-255 chars.
          IFS=',' read -ra ARR <<< "$SECRET_NAMES"
          for s in "${ARR[@]}"; do
            s="$(echo "$s" | xargs)"
            [ -z "$s" ] && continue
            if ! [[ "$s" =~ ^[a-zA-Z0-9_-]{1,255}$ ]]; then
              echo "FAIL: secret name '$s' is not a valid secret id" >&2
              exit 1
            fi
          done
          echo "INFO: will mirror [$SECRET_NAMES] from or-factory-master-control -> $SYSTEM_PROJECT"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Mirror each secret value
        env:
          SYSTEM_PROJECT: ${{ inputs.system_project }}
          SECRET_NAMES: ${{ inputs.secret_names }}
        run: |
          set -euo pipefail
          SOURCE_PROJECT="or-factory-master-control"

          # Super-credentials belong exclusively to control — never mirrored out.
          # Mirrors the EXCLUDE policy in scripts/copy-generic-secrets.sh so this
          # workflow can never push the broker's own App key / any management /
          # provisioning / master key into a system.
          EXCLUDE='^(factory-master-broker-app-.*|.*-management-key|.*-provisioning-key|.*-master-key)$'

          MIRRORED=0
          IFS=',' read -ra ARR <<< "$SECRET_NAMES"
          for secret in "${ARR[@]}"; do
            secret="$(echo "$secret" | xargs)"
            [ -z "$secret" ] && continue
            echo "--- $secret ---"

            if [[ "$secret" =~ $EXCLUDE ]]; then
              echo "FAIL: '$secret' is a control-only super-credential — refusing to mirror" >&2
              exit 1
            fi

            # Source must have a readable version (no value printed).
            if ! gcloud secrets versions access latest \
                 --secret="$secret" --project="$SOURCE_PROJECT" >/dev/null 2>&1; then
              echo "FAIL: '$secret' has no accessible version in $SOURCE_PROJECT" >&2
              exit 1
            fi

            # Create the dest secret if missing (idempotent).
            if ! gcloud secrets describe "$secret" --project="$SYSTEM_PROJECT" >/dev/null 2>&1; then
              gcloud secrets create "$secret" \
                --project="$SYSTEM_PROJECT" \
                --replication-policy=automatic \
                --labels=copied-from-factory=true,managed-by=or-factory-master \
                --quiet
              echo "PASS: created shell $secret in $SYSTEM_PROJECT"
            else
              echo "INFO: $secret already exists in $SYSTEM_PROJECT"
            fi

            # Copy the value server-side. The pipe keeps it off the logs and out
            # of any shell variable.
            gcloud secrets versions access latest \
              --secret="$secret" --project="$SOURCE_PROJECT" \
            | gcloud secrets versions add "$secret" \
              --project="$SYSTEM_PROJECT" --data-file=- --quiet
            echo "PASS: mirrored latest $secret ($SOURCE_PROJECT) -> $secret ($SYSTEM_PROJECT)"

            COUNT=$(gcloud secrets versions list "$secret" \
              --project="$SYSTEM_PROJECT" --filter="state=ENABLED" \
              --format="value(name)" | wc -l)
            echo "PASS: $secret now has ${COUNT} enabled version(s) in $SYSTEM_PROJECT."
            MIRRORED=$((MIRRORED + 1))
          done

          echo "=== Mirror complete: $MIRRORED secret(s) copied into $SYSTEM_PROJECT ==="
