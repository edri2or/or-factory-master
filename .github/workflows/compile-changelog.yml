name: Compile changelog

# Manual fold of changelog.d/*.md fragments into CHANGELOG.md: Stage numbers are assigned
# in ONE single-threaded run (so concurrent PRs never collide on a number), the consumed
# fragments are deleted, and oldest entries auto-rotate to docs/changelog-archive/ past the
# 20 KB cap. Opens a PR with the result via the broker App (so the PR gets CI) — never
# pushes to main directly. See changelog.d/README.md.

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  compile:
    name: Compile changelog fragments
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Resolve broker App credentials
        run: |
          set -euo pipefail
          APP_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-id" \
            --project="or-factory-master-control")
          INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-installation-id" \
            --project="or-factory-master-control")
          gcloud secrets versions access latest \
            --secret="factory-master-broker-app-private-key" \
            --project="or-factory-master-control" > /tmp/broker-app-key.pem
          chmod 600 /tmp/broker-app-key.pem
          TOKEN=$(bash scripts/generate-app-token.sh /tmp/broker-app-key.pem "$APP_ID" "$INSTALL_ID" \
            "" '{"contents":"write","pull_requests":"write"}' '["or-factory-master"]')
          [ -n "$TOKEN" ] || { echo "FAIL: could not obtain App installation token" >&2; exit 1; }
          echo "::add-mask::${TOKEN}"
          echo "APP_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
          shred -u /tmp/broker-app-key.pem 2>/dev/null || rm -f /tmp/broker-app-key.pem

      - name: Compile fragments into CHANGELOG.md
        run: bash scripts/compile-changelog.sh

      - name: Open a PR if the compile changed anything
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "Compile produced no changes — nothing to PR."
            exit 0
          fi
          BRANCH="changelog-compile-$(date -u +%Y%m%d%H%M%S)"
          git config user.name "factory-master-broker[bot]"
          git config user.email "factory-master-broker[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -q -m "chore: compile changelog.d fragments into CHANGELOG.md"
          # APP_TOKEN is masked; keep `set -x` off so it never lands in logs.
          git push "https://x-access-token:${APP_TOKEN}@github.com/edri2or/or-factory-master.git" "$BRANCH"
          BODY="Automated by the **Compile changelog** workflow: folds \`changelog.d/\` fragments into \`CHANGELOG.md\` with Stage numbers assigned in one single-threaded run (collision-free), deletes the consumed fragments, and auto-archives past the 20 KB cap. Review and merge."
          HTML=$(curl -sf -X POST \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$(jq -cn --arg b "$BRANCH" --arg body "$BODY" \
                  '{title:"chore: compile changelog fragments into CHANGELOG.md", head:$b, base:"main", body:$body}')" \
            "https://api.github.com/repos/edri2or/or-factory-master/pulls" | jq -r '.html_url // empty')
          echo "Opened PR: ${HTML:-<failed to parse PR url>}"
