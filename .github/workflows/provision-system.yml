name: Provision System (step 1 — GCP + GitHub + secrets)

# Manual dispatch only. Bootstraps a new system: GCP project, service accounts,
# WIF, GitHub repo, branch protection, generic secrets, repo variables.
# Does NOT deploy Railway or Cloudflare — that's a separate step.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: "Lowercase, 4-30 chars, [a-z0-9-]. Becomes GCP project ID + repo name (e.g. or-test-1)."
        required: true
        type: string

permissions: {}

jobs:
  provision:
    name: Provision System
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate inputs
        id: validate
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          if ! [[ "$SYSTEM_NAME" =~ ^[a-z][a-z0-9-]{2,28}[a-z0-9]$ ]]; then
            echo "FAIL: system_name must match ^[a-z][a-z0-9-]{2,28}[a-z0-9]\$ (got: $SYSTEM_NAME)" >&2
            exit 1
          fi
          # GCP project IDs are 6-30 chars; the regex above guarantees 4-30 chars total.
          # Tighten lower bound to GCP's minimum.
          if [ "${#SYSTEM_NAME}" -lt 6 ]; then
            echo "FAIL: system_name must be at least 6 chars (GCP project ID minimum)" >&2
            exit 1
          fi
          echo "system_name=$SYSTEM_NAME" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP via WIF
        id: wif-auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2.1.13
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Resolve broker App credentials
        id: app-creds
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          APP_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-id" \
            --project="or-factory-master-control")
          INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-installation-id" \
            --project="or-factory-master-control")
          gcloud secrets versions access latest \
            --secret="factory-master-broker-app-private-key" \
            --project="or-factory-master-control" \
            > /tmp/broker-app-key.pem
          chmod 600 /tmp/broker-app-key.pem

          TOKEN=$(bash scripts/generate-app-token.sh /tmp/broker-app-key.pem "$APP_ID" "$INSTALL_ID")
          [ -n "$TOKEN" ] || { echo "FAIL: could not obtain App installation token" >&2; exit 1; }
          echo "::add-mask::${TOKEN}"

          # Persist the token for downstream steps via the GHA env file.
          {
            echo "APP_TOKEN=${TOKEN}"
            echo "APP_ID=${APP_ID}"
            echo "INSTALL_ID=${INSTALL_ID}"
          } >> "$GITHUB_ENV"

          shred -u /tmp/broker-app-key.pem 2>/dev/null || rm -f /tmp/broker-app-key.pem

      - name: Preflight — verify repo and project don't exist
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          # Project must not exist
          if gcloud projects describe "$SYSTEM_NAME" >/dev/null 2>&1; then
            echo "FAIL: GCP project '$SYSTEM_NAME' already exists" >&2
            exit 1
          fi

          # Repo must not exist
          http_code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${SYSTEM_NAME}")
          if [ "$http_code" = "200" ]; then
            echo "FAIL: GitHub repo 'edri2or/${SYSTEM_NAME}' already exists" >&2
            exit 1
          fi
          if [ "$http_code" != "404" ]; then
            echo "FAIL: unexpected HTTP $http_code from GitHub when checking repo existence" >&2
            exit 1
          fi
          echo "Preflight passed: project and repo are both available."

      - name: Create GCP project + link billing
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          gcloud projects create "$SYSTEM_NAME" \
            --folder="123180924297" \
            --name="$SYSTEM_NAME" \
            --labels="managed-by=or-factory-master,system=${SYSTEM_NAME}" \
            --quiet
          gcloud beta billing projects link "$SYSTEM_NAME" \
            --billing-account="014D0F-AC8E0F-5A7EE7"
          echo "PASS: project $SYSTEM_NAME created and linked to billing."

      - name: Enable APIs
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          gcloud services enable \
            run.googleapis.com \
            secretmanager.googleapis.com \
            iam.googleapis.com \
            iamcredentials.googleapis.com \
            cloudresourcemanager.googleapis.com \
            sts.googleapis.com \
            artifactregistry.googleapis.com \
            --project="$SYSTEM_NAME"
          echo "PASS: APIs enabled."

      - name: Create runtime-sa and deploy-sa
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          gcloud iam service-accounts create runtime-sa \
            --project="$SYSTEM_NAME" \
            --display-name="Runtime Service Account"
          gcloud iam service-accounts create deploy-sa \
            --project="$SYSTEM_NAME" \
            --display-name="Deploy Service Account"
          echo "PASS: service accounts created."

      - name: Grant project-level IAM
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          DEPLOY_SA="deploy-sa@${SYSTEM_NAME}.iam.gserviceaccount.com"
          RUNTIME_SA="runtime-sa@${SYSTEM_NAME}.iam.gserviceaccount.com"

          for role in roles/run.developer roles/artifactregistry.writer \
                      roles/secretmanager.secretVersionManager; do
            gcloud projects add-iam-policy-binding "$SYSTEM_NAME" \
              --member="serviceAccount:${DEPLOY_SA}" --role="$role" --quiet
          done
          gcloud projects add-iam-policy-binding "$SYSTEM_NAME" \
            --member="serviceAccount:${RUNTIME_SA}" --role="roles/run.invoker" --quiet
          echo "PASS: project-level IAM granted."

      - name: Create system-level WIF pool and provider
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          gcloud iam workload-identity-pools create github-pool \
            --project="$SYSTEM_NAME" \
            --location=global \
            --display-name="GitHub Actions Pool"

          gcloud iam workload-identity-pools providers create-oidc github-provider \
            --project="$SYSTEM_NAME" \
            --location=global \
            --workload-identity-pool=github-pool \
            --display-name="GitHub Actions Provider" \
            --issuer-uri="https://token.actions.githubusercontent.com" \
            --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository,attribute.repository_id=assertion.repository_id,attribute.ref=assertion.ref" \
            --attribute-condition="assertion.repository_owner=='edri2or' && attribute.repository=='edri2or/${SYSTEM_NAME}' && attribute.ref=='refs/heads/main'"
          echo "PASS: WIF pool + provider created."

      - name: Grant deploy-sa workloadIdentityUser binding
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          PROJECT_NUMBER=$(gcloud projects describe "$SYSTEM_NAME" --format="value(projectNumber)")
          DEPLOY_SA="deploy-sa@${SYSTEM_NAME}.iam.gserviceaccount.com"
          PRINCIPAL="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github-pool/attribute.repository/edri2or/${SYSTEM_NAME}"
          gcloud iam service-accounts add-iam-policy-binding "$DEPLOY_SA" \
            --project="$SYSTEM_NAME" \
            --role="roles/iam.workloadIdentityUser" \
            --member="$PRINCIPAL" \
            --quiet
          echo "PASS: workloadIdentityUser granted to ${DEPLOY_SA}."

      - name: Create GitHub repo with auto_init
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          BODY=$(jq -cn --arg name "$SYSTEM_NAME" \
            '{name: $name, private: true, auto_init: true, has_issues: true, has_wiki: false, delete_branch_on_merge: true}')
          resp=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X POST \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/edri2or/repos" \
            -d "$BODY")
          http_code=$(printf '%s' "$resp" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(printf '%s' "$resp" | sed '$d')
          [ "$http_code" = "201" ] \
            || { echo "FAIL: create repo HTTP ${http_code}: ${body}" >&2; exit 1; }
          echo "PASS: repo edri2or/${SYSTEM_NAME} created."

      - name: Branch protection on main
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          # auto_init created an initial commit; main exists. Add protection.
          BODY=$(jq -cn '{
            required_status_checks: null,
            enforce_admins: false,
            required_pull_request_reviews: {
              required_approving_review_count: 0,
              dismiss_stale_reviews: false
            },
            restrictions: null,
            allow_force_pushes: false,
            allow_deletions: false
          }')
          resp=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X PUT \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${SYSTEM_NAME}/branches/main/protection" \
            -d "$BODY")
          http_code=$(printf '%s' "$resp" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(printf '%s' "$resp" | sed '$d')
          [ "$http_code" = "200" ] \
            || { echo "FAIL: branch protection HTTP ${http_code}: ${body}" >&2; exit 1; }
          echo "PASS: branch protection set on main."

      - name: Copy generic secrets
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          bash scripts/copy-generic-secrets.sh "$SYSTEM_NAME"

      - name: Set repo variables
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          PROJECT_NUMBER=$(gcloud projects describe "$SYSTEM_NAME" --format="value(projectNumber)")
          GCP_WIF_PROVIDER="projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          GCP_DEPLOY_SA="deploy-sa@${SYSTEM_NAME}.iam.gserviceaccount.com"

          _set_var() {
            local name="$1" value="$2" resp http_code
            resp=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X POST \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/edri2or/${SYSTEM_NAME}/actions/variables" \
              -d "$(jq -cn --arg n "$name" --arg v "$value" '{name:$n, value:$v}')")
            http_code=$(printf '%s' "$resp" | tail -1 | sed 's/HTTP_STATUS://')
            [ "$http_code" = "201" ] \
              || { echo "FAIL: set $name HTTP $http_code" >&2; return 1; }
            echo "PASS: $name set."
          }
          _set_var "GCP_WIF_PROVIDER" "$GCP_WIF_PROVIDER"
          _set_var "GCP_DEPLOY_SA"    "$GCP_DEPLOY_SA"
          _set_var "GCP_PROJECT_ID"   "$SYSTEM_NAME"
          _set_var "SYSTEM_NAME"      "$SYSTEM_NAME"

      - name: Summary
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          PROJECT_NUMBER=$(gcloud projects describe "$SYSTEM_NAME" --format="value(projectNumber)")
          {
            echo "## Provisioned: \`${SYSTEM_NAME}\`"
            echo ""
            echo "| Resource | Value |"
            echo "|---|---|"
            echo "| GCP project | \`${SYSTEM_NAME}\` (number: ${PROJECT_NUMBER}) |"
            echo "| Runtime SA | \`runtime-sa@${SYSTEM_NAME}.iam.gserviceaccount.com\` |"
            echo "| Deploy SA | \`deploy-sa@${SYSTEM_NAME}.iam.gserviceaccount.com\` |"
            echo "| WIF provider | \`projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github-pool/providers/github-provider\` |"
            echo "| GitHub repo | \`edri2or/${SYSTEM_NAME}\` |"
            echo ""
            echo "**Next step**: Railway + Cloudflare deployment (separate workflow, not yet implemented)."
          } >> "$GITHUB_STEP_SUMMARY"
