name: Grant Secret Accessor (one-off IAM grant on a single secret)

# Manual dispatch only. Grants roles/secretmanager.secretAccessor on ONE existing
# Secret Manager secret to one or more service accounts, as the broker SA via WIF.
#
# Why this exists: provisioning grants each *provisioned* secret a per-secret
# secretAccessor binding for the system's deploy-sa + runtime-sa. A secret created
# by hand AFTER provisioning (e.g. supadata-api-key, cloudflare-access-token) never
# gets that binding, so the system's deploy reads it as empty and silently skips the
# feature. This workflow closes that gap autonomously, keeping the value in Secret
# Manager (never read or printed here — it only touches IAM policy). Idempotent.

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: "GCP project that holds the secret (e.g. factory-test-7)."
        required: true
        type: string
      secret_name:
        description: "Secret Manager secret to grant read access on (e.g. supadata-api-key)."
        required: true
        type: string
      members:
        description: "Comma-separated SA emails to grant secretAccessor. Leave EMPTY to default to deploy-sa@<proj> + runtime-sa@<proj>."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  grant:
    name: Grant secretAccessor
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - name: Validate inputs
        id: validate
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          MEMBERS_IN: ${{ inputs.members }}
        run: |
          set -euo pipefail
          # Guard: never touch a control project (holds the broker's own keys), and
          # never the shared sandbox backend (its IAM is deliberately minimal).
          case "$GCP_PROJECT" in
            or-factory-master-control|factory-control-9piybr)
              echo "FAIL: gcp_project must not be a control project" >&2; exit 1 ;;
            factory-test-25)
              echo "FAIL: gcp_project must not be factory-test-25 (shared sandbox backend)" >&2; exit 1 ;;
          esac
          if ! [[ "$GCP_PROJECT" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: gcp_project '$GCP_PROJECT' is not a valid GCP project id (6-30 chars)" >&2
            exit 1
          fi
          # GCP secret ids: letters, digits, underscore, hyphen; 1-255 chars.
          if ! [[ "$SECRET_NAME" =~ ^[a-zA-Z0-9_-]{1,255}$ ]]; then
            echo "FAIL: secret_name '$SECRET_NAME' is not a valid secret id" >&2
            exit 1
          fi
          if [ -n "$MEMBERS_IN" ]; then
            MEMBERS="$MEMBERS_IN"
          else
            MEMBERS="deploy-sa@${GCP_PROJECT}.iam.gserviceaccount.com,runtime-sa@${GCP_PROJECT}.iam.gserviceaccount.com"
          fi
          echo "members=$MEMBERS" >> "$GITHUB_OUTPUT"
          echo "INFO: will grant secretAccessor on '$SECRET_NAME' in '$GCP_PROJECT' to: $MEMBERS"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Grant secretAccessor to each member
        env:
          GCP_PROJECT: ${{ inputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          MEMBERS: ${{ steps.validate.outputs.members }}
        run: |
          set -euo pipefail

          # Fail clearly if the secret was mistyped / does not exist.
          if ! gcloud secrets describe "$SECRET_NAME" --project="$GCP_PROJECT" >/dev/null 2>&1; then
            echo "FAIL: secret '$SECRET_NAME' not found in project '$GCP_PROJECT'" >&2
            exit 1
          fi

          # add-iam-policy-binding can hit a brief eventual-consistency window;
          # retry only the known transient classes (~30s), surface anything else.
          _grant() {
            local member="$1" i err
            for i in 1 2 3 4 5 6; do
              if err=$(gcloud secrets add-iam-policy-binding "$SECRET_NAME" \
                         --project="$GCP_PROJECT" \
                         --role="roles/secretmanager.secretAccessor" \
                         --member="serviceAccount:${member}" \
                         --quiet 2>&1); then
                echo "PASS: granted secretAccessor on $SECRET_NAME to $member"
                return 0
              fi
              if echo "$err" | grep -qE 'PERMISSION_DENIED|does not exist|NOT_FOUND'; then
                echo "INFO: transient on attempt $i for $member; retrying in 5s…" >&2
                sleep 5
                continue
              fi
              echo "FAIL: could not grant secretAccessor to $member:" >&2
              echo "$err" >&2
              return 1
            done
            echo "FAIL: exhausted retries granting secretAccessor to $member" >&2
            return 1
          }

          IFS=',' read -ra MEMBER_ARR <<< "$MEMBERS"
          for m in "${MEMBER_ARR[@]}"; do
            m="$(echo "$m" | xargs)"   # trim surrounding whitespace
            [ -z "$m" ] && continue
            _grant "$m"
          done
          echo "PASS: all secretAccessor grants applied on $SECRET_NAME."
