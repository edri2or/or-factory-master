name: Verify Sentry end-to-end

# One-shot autonomous verification that the MCP server's Sentry integration
# actually DELIVERS events AND scrubs secrets. Triggers a uniquely-marked error
# via the admin-gated /debug/sentry-test, then reads the event BACK from the
# Sentry API and asserts (a) it landed and (b) the beforeSend scrubber stripped
# the Authorization header + request body. All secrets stay in the job (masked);
# the outcome is a single structured [verify-sentry] line. Always reports via
# stdout — exit code mirrors pass/fail for convenience.

on:
  workflow_dispatch:

permissions: {}

jobs:
  verify:
    name: Verify Sentry end-to-end
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: "or-factory-master-control"
      SERVICE: "factory-master-actions-mcp"
      REGION: "me-west1"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Trigger a marked error and read it back from Sentry
        run: |
          set -uo pipefail

          # --- secrets (masked the instant they land) ---
          ADMIN=$(gcloud secrets versions access latest --secret=mcp-server-admin-secret --project="$GCP_PROJECT" 2>/dev/null) || ADMIN=""
          [ -n "$ADMIN" ] && echo "::add-mask::${ADMIN}"
          TOKEN=$(gcloud secrets versions access latest --secret=sentry-auth-token --project="$GCP_PROJECT" 2>/dev/null) || TOKEN=""
          [ -n "$TOKEN" ] && echo "::add-mask::${TOKEN}"
          DSN=$(gcloud secrets versions access latest --secret=sentry-api-key --project="$GCP_PROJECT" 2>/dev/null) || DSN=""
          [ -n "$DSN" ] && echo "::add-mask::${DSN}"

          if [ -z "$ADMIN" ] || [ -z "$TOKEN" ] || [ -z "$DSN" ]; then
            echo "[verify-sentry] result='blocked' reason='missing-secret' admin=$([ -n "$ADMIN" ] && echo y || echo n) auth_token=$([ -n "$TOKEN" ] && echo y || echo n) dsn=$([ -n "$DSN" ] && echo y || echo n)"
            exit 1
          fi

          # --- derive Sentry API base + numeric project id from the DSN ---
          # DSN: https://<key>@o<org>.ingest.<region.>sentry.io/<projectId>
          host=$(printf '%s' "$DSN" | sed -E 's#^https?://[^@]+@([^/]+)/.*#\1#')
          PROJECT_ID=$(printf '%s' "$DSN" | sed -E 's#.*/([0-9]+)/?$#\1#')
          region_host=$(printf '%s' "$host" | sed -E 's#^o[0-9]+\.ingest\.##')
          if ! printf '%s' "$DSN" | grep -q '^https://' || [ -z "$PROJECT_ID" ] || ! printf '%s' "$PROJECT_ID" | grep -qE '^[0-9]+$'; then
            echo "[verify-sentry] result='fail' stage='parse-dsn' reason='sentry-api-key is not a valid https DSN with a numeric project id'"
            exit 1
          fi
          API="https://${region_host}/api/0"
          echo "[verify-sentry] api='${API}' project_id='${PROJECT_ID}'"

          # --- resolve org slug + project slug from the numeric project id ---
          projs=$(mktemp)
          http=$(curl -sS -m 20 -o "$projs" -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" "${API}/projects/" 2>/dev/null) || http="000"
          case "$http" in
            2*) ;;
            *)
              detail=$(tr -d '\r' < "$projs" | tr '\n' ' ' | cut -c1-200)
              echo "[verify-sentry] result='fail' stage='list-projects' http='${http}' detail='${detail}'"
              rm -f "$projs"; exit 1 ;;
          esac
          ORG_SLUG=$(jq -r --arg id "$PROJECT_ID" 'map(select((.id|tostring)==$id)) | .[0].organization.slug // empty' "$projs" 2>/dev/null) || ORG_SLUG=""
          PROJ_SLUG=$(jq -r --arg id "$PROJECT_ID" 'map(select((.id|tostring)==$id)) | .[0].slug // empty' "$projs" 2>/dev/null) || PROJ_SLUG=""
          rm -f "$projs"
          if [ -z "$ORG_SLUG" ] || [ -z "$PROJ_SLUG" ]; then
            echo "[verify-sentry] result='fail' stage='resolve-project' reason='project ${PROJECT_ID} not visible to the auth token (check project:read scope)'"
            exit 1
          fi
          echo "[verify-sentry] org='${ORG_SLUG}' project='${PROJ_SLUG}'"

          # --- resolve the MCP service URL ---
          URL=$(gcloud run services describe "$SERVICE" --region="$REGION" --project="$GCP_PROJECT" --format='value(status.url)' 2>/dev/null) || URL=""
          if [ -z "$URL" ]; then
            echo "[verify-sentry] result='fail' stage='resolve-url' reason='could not describe Cloud Run service'"
            exit 1
          fi

          # --- trigger a uniquely-marked error, with a decoy Authorization
          #     header + body sentinel so the scrubber has something to strip.
          #     The route captures explicitly + flushes + returns the event_id,
          #     so we read it back by id (deterministic, no tag-search lag). ---
          MARKER="verify-$(date +%s)-${RANDOM}"
          trigbody=$(mktemp)
          trig=$(curl -sS -m 20 -o "$trigbody" -w '%{http_code}' -X POST \
            -H "X-Admin-Secret: ${ADMIN}" \
            -H "Authorization: Bearer SCRUB_ME_AUTH" \
            -H "Content-Type: application/json" \
            --data '{"sentinel":"SCRUB_ME_BODY"}' \
            "${URL}/debug/sentry-test?marker=${MARKER}" 2>/dev/null) || trig="000"
          if [ "$trig" = "403" ]; then
            echo "[verify-sentry] result='fail' stage='trigger' reason='admin secret rejected (403)'"
            rm -f "$trigbody"; exit 1
          fi
          EVENT_ID=$(jq -r '.event_id // empty' "$trigbody" 2>/dev/null) || EVENT_ID=""
          INITIALIZED=$(jq -r '.initialized // empty' "$trigbody" 2>/dev/null) || INITIALIZED=""
          FLUSHED=$(jq -r '.flushed // empty' "$trigbody" 2>/dev/null) || FLUSHED=""
          rm -f "$trigbody"
          echo "[verify-sentry] triggered marker='${MARKER}' http='${trig}' initialized='${INITIALIZED}' flushed='${FLUSHED}' event_id='${EVENT_ID}'"

          if [ "$INITIALIZED" != "true" ]; then
            echo "[verify-sentry] result='fail' stage='sdk-disabled' reason='server reports Sentry not initialized — SENTRY_DSN (sentry-api-key) not a valid DSN at runtime or not picked up by the deployed revision'"
            exit 1
          fi
          if [ -z "$EVENT_ID" ]; then
            echo "[verify-sentry] result='fail' stage='trigger' reason='no event_id in response (http=${trig})'"
            exit 1
          fi

          # --- fetch the exact event by id (retry for ingest/processing lag) ---
          det=$(mktemp)
          found="no"
          for _ in $(seq 1 20); do
            sleep 6
            http=$(curl -sS -m 20 -o "$det" -w '%{http_code}' \
              -H "Authorization: Bearer ${TOKEN}" \
              "${API}/projects/${ORG_SLUG}/${PROJ_SLUG}/events/${EVENT_ID}/" 2>/dev/null) || http="000"
            case "$http" in 2*) found="yes"; break ;; esac
          done

          if [ "$found" != "yes" ]; then
            rm -f "$det"
            echo "[verify-sentry] result='fail' stage='read-back' event_id='${EVENT_ID}' reason='event accepted by SDK (flushed=${FLUSHED}) but not retrievable from the API within ~2m — ingest rejected it or project mismatch'"
            exit 1
          fi
          echo "[verify-sentry] event_found event_id='${EVENT_ID}'"

          # --- assert the beforeSend scrubber stripped the decoy secrets from
          #     the event we just fetched (Authorization header + body sentinel) ---
          leak="no"
          grep -qi 'SCRUB_ME_AUTH\|SCRUB_ME_BODY' "$det" && leak="yes"
          authleak=$(jq -r '[.. | objects | select(has("headers")) | .headers] | tostring' "$det" 2>/dev/null | grep -ci '"authorization"' || true)
          rm -f "$det"

          if [ "$leak" = "yes" ] || [ "${authleak:-0}" -gt 0 ]; then
            echo "[verify-sentry] result='fail' stage='scrub' event_id='${EVENT_ID}' sentinel_leak='${leak}' auth_header_seen='${authleak}'"
            exit 1
          fi

          echo "[verify-sentry] result='pass' event_id='${EVENT_ID}' scrubbed='yes' marker='${MARKER}'"
