name: Bootstrap Agent-repo Identity (shared WIF door)

# One-time, idempotent infra for the agent-repo product-type. Creates the SHARED "WIF door"
# (devplans/agent-repo-product.md, Stage 1a): a dedicated WIF pool + provider + minimal
# runtime SA on factory-test-25 (CEL: edri2or org + main) whose ONLY power is reading the
# shared anthropic-api-key secret in or-factory-master-control. This is what lets a GCP-less
# agent-repo run Claude headless via short-lived OIDC with NO standing secret.
#
# Runs as the broker (main-locked, like all broker work) — the identity it BUILDS is the weak
# one. Re-running repairs/updates the resources. The script hard-refuses any project but
# factory-test-25 (WIF) and or-factory-master-control (the one secret). Reads/prints NO
# secret values. NOT on the dispatch_workflow allowlist (one-time setup).

on:
  workflow_dispatch:
    inputs:
      bind_repos:
        description: "Comma-separated agent-repos to allow through the door (owner/repo or bare repo under edri2or). e.g. zz-agentskel-worker"
        required: false
        default: "zz-agentskel-worker"
        type: string

permissions: {}

jobs:
  bootstrap:
    name: Bootstrap agent-repo runtime identity
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Bootstrap agent-repo identity (idempotent)
        env:
          BIND_REPOS: ${{ inputs.bind_repos }}
        run: |
          set -euo pipefail
          IFS=',' read -ra REPOS <<< "${BIND_REPOS:-}"
          CLEAN=()
          for r in "${REPOS[@]}"; do
            r="${r// /}"; if [ -n "$r" ]; then CLEAN+=("$r"); fi
          done
          bash scripts/bootstrap-agent-repo-identity.sh factory-test-25 or-factory-master-control "${CLEAN[@]}"
