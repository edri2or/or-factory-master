name: drive-edit live smoke

# Live proof for the gateway-owned edit_drive_file_content tool (drive-content-edit
# Stage 2): drives the tool end-to-end through the deployed gateway's
# /workspace/<system>/mcp route on a real .md file in the shared Drive, and verifies
# the read-back. Admin secret + the shared gmail-oauth-* creds are read from Secret
# Manager via WIF inside the run step (masked, never persisted). Manual only.

on:
  workflow_dispatch:
    inputs:
      system:
        description: "System whose /workspace route to drive (default or-edri-4)."
        required: false
        default: "or-edri-4"
        type: string

concurrency:
  group: drive-edit-smoke
  cancel-in-progress: false

permissions: {}

jobs:
  smoke:
    name: Edit a .md live through the gateway
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: "or-factory-master-control"
      GCP_REGION: "me-west1"
      SERVICE: "factory-master-actions-mcp"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Run the live drive-edit smoke
        env:
          SMOKE_SYSTEM: ${{ inputs.system }}
        run: |
          set -euo pipefail
          GATEWAY_URL=$(gcloud run services describe "${SERVICE}" --region="${GCP_REGION}" --project="${GCP_PROJECT}" --format='value(status.url)')
          ADMIN_SECRET=$(gcloud secrets versions access latest --secret="mcp-server-admin-secret" --project="${GCP_PROJECT}" | tr -d '\r\n')
          RT=$(gcloud secrets versions access latest --secret="gmail-oauth-refresh-token" --project="${GCP_PROJECT}" | tr -d '\r\n')
          CID=$(gcloud secrets versions access latest --secret="gmail-oauth-client-id" --project="${GCP_PROJECT}" | tr -d '\r\n')
          CSEC=$(gcloud secrets versions access latest --secret="gmail-oauth-client-secret" --project="${GCP_PROJECT}" | tr -d '\r\n')
          echo "::add-mask::${ADMIN_SECRET}"
          echo "::add-mask::${RT}"
          echo "::add-mask::${CID}"
          echo "::add-mask::${CSEC}"
          export GATEWAY_URL ADMIN_SECRET
          export GMAIL_OAUTH_REFRESH_TOKEN="${RT}" GMAIL_OAUTH_CLIENT_ID="${CID}" GMAIL_OAUTH_CLIENT_SECRET="${CSEC}"
          node scripts/drive-edit-smoke.mjs
