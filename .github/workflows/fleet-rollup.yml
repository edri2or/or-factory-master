name: Fleet Reliability Rollup

# Daily HISTORICAL reliability digest across the whole fleet — the complement to the
# watchdog's current-state fleet-health summary (meta-monitoring-watchdog.yml) and the
# per-system runtime audit. Queries Axiom (read-only) for the reliability events in the
# window (factory.n8n.workflow_failed / factory.automation.empty_result /
# factory.runtime_audit.failed) and emits one digest via scripts/emit-event.sh: clean =
# info (Axiom only); any events = warning -> Telegram. SOFT-FAIL throughout (a token/query
# issue degrades to an info note, never fails). See scripts/fleet-rollup.sh + docs/observability.md.

on:
  schedule:
    - cron: "30 6 * * *"   # daily 06:30 UTC (after factory-health :00 and system-runtime :15)
  workflow_dispatch:
    inputs:
      window:
        description: "Lookback window for the digest (Axiom ago(), e.g. 24h, 7d). Default 24h."
        required: false
        default: "24h"
        type: string

permissions: {}

jobs:
  rollup:
    name: Fleet reliability rollup
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Run fleet reliability rollup
        env:
          ROLLUP_WINDOW: ${{ github.event.inputs.window || '24h' }}
        run: bash scripts/fleet-rollup.sh
