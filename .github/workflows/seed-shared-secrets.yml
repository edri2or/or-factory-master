name: Seed Shared Secrets (control vault + named systems)

# Manual dispatch only (triggered via actions_run_trigger; NOT on the
# dispatch_workflow allowlist). Copies one or more secret VALUES from a source
# system's Secret Manager into the factory CONTROL Secret Manager — the shared
# vault that scripts/copy-generic-secrets.sh propagates to every newly
# provisioned system — and, optionally, into named EXISTING system projects right
# now (provisioning does not back-fill already-built systems). This is how a
# secret that should be "the same for every system" (e.g. the operator's single
# Gmail OAuth app credentials) becomes universal.
#
# Authenticates as the broker SA via WIF, so it must run on main. Values are read
# into a 0600 temp file and never printed or logged. Idempotent: a destination
# that already holds a version for a secret is left untouched. Guards refuse a
# control project or the shared sandbox backend as source/destination.

on:
  workflow_dispatch:
    inputs:
      source_project:
        description: "System GCP project that holds the secret VALUES (e.g. factory-test-7)."
        required: true
        type: string
      secret_names:
        description: "Comma-separated secret names to seed (e.g. gmail-oauth-client-id,gmail-oauth-client-secret)."
        required: true
        type: string
      dest_projects:
        description: "Comma-separated existing system projects to seed NOW (e.g. factory-test-23). EMPTY = control vault only."
        required: false
        type: string
        default: ""
      seed_control:
        description: "Also seed the factory control vault so every FUTURE system gets these automatically."
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  seed:
    name: Seed shared secrets
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Seed shared secrets
        env:
          SOURCE_PROJECT: ${{ inputs.source_project }}
          SECRET_NAMES: ${{ inputs.secret_names }}
          DEST_PROJECTS: ${{ inputs.dest_projects }}
          SEED_CONTROL: ${{ inputs.seed_control }}
        run: bash scripts/seed-shared-secrets.sh
