name: Create throwaway repo (verification helper)

# Tiny helper: creates a throwaway PRIVATE repo via the broker App so the
# Telegram-gated repo-delete capability can be verified end-to-end on a real
# repo. Hard-guarded to names starting with `zz-` so it can only ever create
# throwaways, never a real/important repo. Idempotent-ish (422 "name exists" is
# treated as success). Also proves the broker App can CREATE repos.
#
# Auth: WIF as the broker SA -> read broker App creds from SM -> mint token ->
# POST /orgs/edri2or/repos. NOT on the dispatch_workflow allowlist.

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Throwaway repo name (MUST start with 'zz-')."
        required: true
        type: string
        default: "zz-rmtest"

permissions: {}

jobs:
  create:
    name: Create throwaway repo
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      CONTROL_PROJECT: or-factory-master-control

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Validate name (zz- only)
        env:
          NAME: ${{ inputs.name }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$NAME" | grep -Eq '^zz-[a-z0-9._-]{1,40}$'; then
            echo "FAIL: name must match ^zz-[a-z0-9._-]{1,40}$ (throwaways only)." >&2; exit 1
          fi

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Create the throwaway repo (broker App)
        env:
          NAME: ${{ inputs.name }}
        run: |
          set -euo pipefail
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/bk.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          TOKEN=$(bash scripts/generate-app-token.sh /tmp/bk.pem "$APP_ID" "$INSTALL_ID")
          rm -f /tmp/bk.pem
          echo "::add-mask::$TOKEN"
          code=$(curl -sS -m 30 -o /tmp/cr.body -w '%{http_code}' \
            -X POST "https://api.github.com/orgs/edri2or/repos" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data "$(jq -cn --arg n "$NAME" '{name:$n, private:true, auto_init:true, description:"throwaway — repo-delete verification; safe to delete"}')" || echo "000")
          echo "POST /orgs/edri2or/repos -> HTTP ${code}"
          if [ "$code" = "201" ]; then
            echo "PASS: created edri2or/${NAME} (broker CAN create)."
          elif [ "$code" = "422" ]; then
            echo "PASS: edri2or/${NAME} already exists (ok)."
          else
            echo "FAIL: create ${NAME} HTTP ${code}: $(jq -r '.message // empty' /tmp/cr.body 2>/dev/null || true)" >&2
            rm -f /tmp/cr.body; exit 1
          fi
          rm -f /tmp/cr.body
