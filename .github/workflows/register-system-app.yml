name: Register System App (per-system GitHub App, 2-click)

# Manual dispatch only. Registers a dedicated GitHub App for an already-provisioned
# system, narrowly scoped to that one repo. Credentials land in the SYSTEM project's
# SM as github-app-{id,private-key,installation-id}. Cloud Run receiver lives in
# or-factory-master-control and is torn down at the end.
#
# Operator action (ADR-012 vendor floor): 2 browser clicks on GitHub.
#   1. "Create GitHub App"
#   2. "Install" — choose 'Only select repositories' and tick edri2or/<system_name>.
#      Do NOT choose 'All repositories'.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: "Existing system. 6-30 chars, [a-z0-9-]. Must already be provisioned."
        required: true
        type: string
      shared_gcp_project:
        description: "TEST-ONLY: the App's SM secrets + SA grants live in this shared GCP project instead of one named after system_name (use when system_name was provisioned in reuse mode). The repo, App name, and APP_* repo vars still belong to system_name. Must be a test project. Leave empty for normal systems."
        required: false
        type: string
        default: ""
      adopt_gcp_project:
        description: "REAL adopt: the App's SM secrets + SA grants live in this existing/recovered GCP project (use when system_name was provisioned in adopt mode, where the GCP project id differs from system_name). The repo, App name, and APP_* repo vars still belong to system_name. Must NOT be a control project or factory-test-25. Mutually exclusive with shared_gcp_project. Leave empty for normal systems."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  register:
    name: Register App for ${{ inputs.system_name }} (2-click)
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: "or-factory-master-control"
      GCP_PROJECT_NUMBER: "140345952904"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      GCP_REGION: "me-west1"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      IMAGE: "me-west1-docker.pkg.dev/or-factory-master-control/bootstrap-images/receiver:latest"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Validate inputs
        id: validate
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
          SHARED_GCP_PROJECT: ${{ inputs.shared_gcp_project }}
          ADOPT_GCP_PROJECT: ${{ inputs.adopt_gcp_project }}
        run: |
          set -euo pipefail
          if ! [[ "$SYSTEM_NAME" =~ ^[a-z][a-z0-9-]{2,28}[a-z0-9]$ ]]; then
            echo "FAIL: system_name must match ^[a-z][a-z0-9-]{2,28}[a-z0-9]\$ (got: $SYSTEM_NAME)" >&2
            exit 1
          fi
          if [ "${#SYSTEM_NAME}" -lt 6 ]; then
            echo "FAIL: system_name must be at least 6 chars" >&2
            exit 1
          fi

          # SYS_PROJECT is the GCP project for the App's SM secrets + SA grants.
          # Normally == system_name; in reuse mode it's the shared TEST project;
          # in adopt mode it's the existing/recovered project (id != system_name).
          # In every case the repo, App name, receiver, and APP_* repo vars stay
          # system_name.
          if [ -n "$SHARED_GCP_PROJECT" ] && [ -n "$ADOPT_GCP_PROJECT" ]; then
            echo "FAIL: shared_gcp_project (reuse) and adopt_gcp_project (adopt) are mutually exclusive — pick one" >&2
            exit 1
          fi
          SYS_PROJECT="$SYSTEM_NAME"
          if [ -n "$SHARED_GCP_PROJECT" ]; then
            case "$SHARED_GCP_PROJECT" in
              or-factory-master-control|factory-control-9piybr)
                echo "FAIL: shared_gcp_project must not be a control project" >&2; exit 1 ;;
            esac
            if ! [[ "$SHARED_GCP_PROJECT" =~ ^(factory-test-|v2-test-|or-test-)[a-z0-9-]+$ ]]; then
              echo "FAIL: shared_gcp_project '$SHARED_GCP_PROJECT' must be a test project (factory-test-*/v2-test-*/or-test-*)" >&2
              exit 1
            fi
            SYS_PROJECT="$SHARED_GCP_PROJECT"
            echo "INFO: reuse mode — App secrets/SAs target shared project '$SHARED_GCP_PROJECT'; repo + App scope stay 'edri2or/$SYSTEM_NAME'."
          elif [ -n "$ADOPT_GCP_PROJECT" ]; then
            # Adopt mode: a REAL system whose GCP project is an existing/recovered
            # one (provision-system.yml adopt_gcp_project). Allow any non-control
            # project except factory-test-25; the App creds land in its SM.
            case "$ADOPT_GCP_PROJECT" in
              or-factory-master-control|factory-control-9piybr)
                echo "FAIL: adopt_gcp_project must not be a control project" >&2; exit 1 ;;
              factory-test-25)
                echo "FAIL: adopt_gcp_project must not be factory-test-25 (the active shared reuse backend)" >&2; exit 1 ;;
            esac
            if ! [[ "$ADOPT_GCP_PROJECT" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
              echo "FAIL: adopt_gcp_project '$ADOPT_GCP_PROJECT' is not a valid GCP project id (6-30 chars, ^[a-z][a-z0-9-]{4,28}[a-z0-9]\$)" >&2
              exit 1
            fi
            SYS_PROJECT="$ADOPT_GCP_PROJECT"
            echo "INFO: adopt mode — App secrets/SAs target existing/recovered project '$ADOPT_GCP_PROJECT'; repo + App scope stay 'edri2or/$SYSTEM_NAME'."
          fi

          {
            echo "SYSTEM_NAME=${SYSTEM_NAME}"
            echo "SYS_PROJECT=${SYS_PROJECT}"
            echo "SERVICE_NAME=system-app-receiver-${SYSTEM_NAME}"
            echo "APP_NAME=${SYSTEM_NAME}-app"
          } >> "$GITHUB_ENV"

      - name: Authenticate to GCP via WIF
        id: wif-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Resolve broker App credentials
        id: broker-creds
        run: |
          set -euo pipefail
          BROKER_APP_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-id" \
            --project="${GCP_PROJECT}")
          BROKER_INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="factory-master-broker-app-installation-id" \
            --project="${GCP_PROJECT}")
          gcloud secrets versions access latest \
            --secret="factory-master-broker-app-private-key" \
            --project="${GCP_PROJECT}" \
            > /tmp/broker-app-key.pem
          chmod 600 /tmp/broker-app-key.pem

          BROKER_TOKEN=$(bash scripts/generate-app-token.sh \
            /tmp/broker-app-key.pem "$BROKER_APP_ID" "$BROKER_INSTALL_ID")
          [ -n "$BROKER_TOKEN" ] || { echo "FAIL: could not mint broker App token" >&2; exit 1; }
          echo "::add-mask::${BROKER_TOKEN}"

          {
            echo "BROKER_TOKEN=${BROKER_TOKEN}"
            echo "BROKER_APP_ID=${BROKER_APP_ID}"
            echo "BROKER_INSTALL_ID=${BROKER_INSTALL_ID}"
          } >> "$GITHUB_ENV"

          shred -u /tmp/broker-app-key.pem 2>/dev/null || rm -f /tmp/broker-app-key.pem

      - name: Preflight — system must already exist
        run: |
          set -euo pipefail
          if ! gcloud projects describe "$SYS_PROJECT" >/dev/null 2>&1; then
            echo "FAIL: GCP project '$SYS_PROJECT' does not exist — run provision-system.yml first" >&2
            exit 1
          fi
          http_code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${BROKER_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${SYSTEM_NAME}")
          if [ "$http_code" != "200" ]; then
            echo "FAIL: GitHub repo 'edri2or/${SYSTEM_NAME}' missing (HTTP $http_code) — run provision-system.yml first" >&2
            exit 1
          fi
          echo "Preflight passed: project and repo exist."

      - name: Check if System App credentials already exist
        id: check-secrets
        run: |
          set -euo pipefail
          have_id=false; have_key=false; have_install=false
          gcloud secrets describe "github-app-id"              --project="${SYS_PROJECT}" &>/dev/null && have_id=true || true
          gcloud secrets describe "github-app-private-key"     --project="${SYS_PROJECT}" &>/dev/null && have_key=true || true
          gcloud secrets describe "github-app-installation-id" --project="${SYS_PROJECT}" &>/dev/null && have_install=true || true

          if [ "$have_key" = "true" ] && [ "$have_install" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ App already registered — skipping (id=$have_id key=$have_key install=$have_install)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Missing credentials (id=$have_id key=$have_key install=$have_install) — proceeding."
          fi

      - name: Compute predictable Cloud Run URL + generate POLL_TOKEN
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          SERVICE_URL="https://${SERVICE_NAME}-${GCP_PROJECT_NUMBER}.${GCP_REGION}.run.app"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

          POLL_TOKEN=$(openssl rand -hex 32)
          echo "POLL_TOKEN=${POLL_TOKEN}" >> "$GITHUB_ENV"
          echo "::add-mask::${POLL_TOKEN}"

      - name: Ensure receiver image is present (build only if missing)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          if gcloud artifacts docker images describe "${IMAGE}" \
               --project="${GCP_PROJECT}" >/dev/null 2>&1; then
            echo "Receiver image already in Artifact Registry — reusing."
            exit 0
          fi
          echo "Image missing — building from src/bootstrap-receiver/"
          gcloud artifacts repositories create bootstrap-images \
            --repository-format=docker \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --quiet 2>/dev/null || true
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker build -t "${IMAGE}" src/bootstrap-receiver/
          docker push "${IMAGE}"

      - name: Deploy Cloud Run receiver (single shot with REDIRECT_URL baked in)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          # Narrow per-system App permissions. No administration, no
          # organization_administration, no pull_requests — the system's own
          # workflows act on a single repo via deploy-sa for GCP and this App
          # for GitHub-side actions.
          APP_PERMISSIONS_JSON='{"contents":"write","metadata":"read","actions":"write","workflows":"write","secrets":"write"}'
          APP_PERMISSIONS_B64=$(printf '%s' "${APP_PERMISSIONS_JSON}" | base64 -w 0)

          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --allow-unauthenticated \
            --service-account="${BROKER_SA}" \
            --max-instances=1 \
            --set-env-vars="GCP_PROJECT_ID=${SYS_PROJECT},GITHUB_ORG=edri2or,APP_NAME=${APP_NAME},SECRET_PREFIX=github-app-,APP_PERMISSIONS=${APP_PERMISSIONS_B64},GITHUB_REPO=edri2or/${SYSTEM_NAME},POLL_TOKEN=${POLL_TOKEN},REDIRECT_URL=${SERVICE_URL}/callback" \
            --quiet

      - name: Probe health (verify predicted URL is reachable)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          for i in $(seq 1 24); do
            if [ "$(curl -sS -m 8 -o /dev/null -w '%{http_code}' "${SERVICE_URL}/health")" = "200" ]; then
              echo "✅ Receiver healthy after ${i} attempt(s) at ${SERVICE_URL}"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Receiver did not become healthy at ${SERVICE_URL} in 120s"
          exit 1

      - name: Operator instructions
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          echo "::notice::Open this URL to register the App: ${SERVICE_URL}"
          {
            echo "## Per-System GitHub App Registration — Action Required"
            echo ""
            echo "**System**: \`${SYSTEM_NAME}\`  •  **App name**: \`${APP_NAME}\`"
            echo ""
            echo "**Open this URL in your browser** (org admin required):"
            echo ""
            echo "👉 **[Start App registration](${SERVICE_URL})**"
            echo ""
            echo "### Click 1 — Create the App"
            echo "GitHub shows 'Create GitHub App' — click it."
            echo ""
            echo "### Click 2 — Install (CRITICAL: pick the right radio)"
            echo "On the install page, choose **'Only select repositories'** and tick \`edri2or/${SYSTEM_NAME}\`."
            echo ""
            echo "⚠ **Do NOT pick 'All repositories'.** The workflow verifies that the App is scoped to only this one repo and will fail if you pick 'All'."
            echo ""
            echo "Credentials will be written automatically to GCP Secret Manager (project \`${SYS_PROJECT}\`):"
            echo "- \`github-app-id\`"
            echo "- \`github-app-private-key\`"
            echo "- \`github-app-installation-id\`"
            echo ""
            echo "If GitHub says 'App name already taken': delete the existing App from"
            echo "**Settings → Developer settings → GitHub Apps → ${APP_NAME} → Delete**."
            echo ""
            echo "_This job polls for up to 10 minutes._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify operator via Telegram
        id: notify-telegram
        if: steps.check-secrets.outputs.exists == 'false'
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          {
          set -euo pipefail

          TG_TOKEN=$(gcloud secrets versions access latest \
            --secret=telegram-bot-token \
            --project="${GCP_PROJECT}")
          echo "::add-mask::${TG_TOKEN}"

          TG_CHAT_ID=$(gcloud secrets versions access latest \
            --secret=telegram-chat-id \
            --project="${GCP_PROJECT}")
          echo "::add-mask::${TG_CHAT_ID}"

          DEADLINE=$(date -u -d '+10 minutes' +'%H:%M UTC')
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          TEXT="<b>Factory: GitHub App registration needed</b>

          System: <code>${SYSTEM_NAME}</code>
          Org: edri2or
          Deadline: ${DEADLINE} (~10 min)

          Tap to register (2 clicks on GitHub):
          ${SERVICE_URL}

          1. Click \"Create GitHub App\"
          2. Click \"Install\" → \"Only select repositories\", tick <code>edri2or/${SYSTEM_NAME}</code>

          Run: ${RUN_URL}"

          PAYLOAD=$(jq -n \
            --arg chat "${TG_CHAT_ID}" \
            --arg text "${TEXT}" \
            '{chat_id: $chat, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')

          HTTP_CODE=$(curl -sS -o /tmp/tg-resp.json -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "${PAYLOAD}")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Telegram sendMessage failed HTTP $HTTP_CODE"
            jq -r '.description // "no description"' /tmp/tg-resp.json | head -5
            exit 1
          fi
          echo "PASS: Telegram notification sent (HTTP $HTTP_CODE)"
          } 2>&1 | tee /tmp/notify-telegram.log
          exit "${PIPESTATUS[0]}"

      - name: Poll for App credentials (up to 10 min)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            CREDS=$(curl -sf "${SERVICE_URL}/credentials?token=${POLL_TOKEN}" 2>/dev/null || echo "{}")
            read -r HAS_ID HAS_KEY HAS_INSTALL <<< "$(echo "$CREDS" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(int(bool(d.get('id'))),int(bool(d.get('private_key'))),int(bool(d.get('installation_id'))))" \
              2>/dev/null || echo "0 0 0")"
            if [ "$HAS_ID" = "1" ] && [ "$HAS_KEY" = "1" ] && [ "$HAS_INSTALL" = "1" ]; then
              echo "✅ All credentials received after ${i} poll(s)."
              exit 0
            fi
            echo "  Poll ${i}/20 — id=${HAS_ID} key=${HAS_KEY} install=${HAS_INSTALL}"
            [ "$i" -lt 20 ] && sleep 30
          done
          echo "::error::Timed out waiting for App credentials. Did you complete both clicks?"
          exit 1

      - name: Verify 3 App secrets in system SM
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          for SECRET in "github-app-id" "github-app-private-key" "github-app-installation-id"; do
            if gcloud secrets describe "${SECRET}" --project="${SYS_PROJECT}" &>/dev/null; then
              echo "PASS: ${SECRET} exists in SM (${SYS_PROJECT})"
            else
              echo "::error::${SECRET} missing from SM (${SYS_PROJECT})"
              exit 1
            fi
          done

      - name: Grant secretAccessor to deploy-sa and runtime-sa on App secrets
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          DEPLOY_SA="deploy-sa@${SYS_PROJECT}.iam.gserviceaccount.com"
          RUNTIME_SA="runtime-sa@${SYS_PROJECT}.iam.gserviceaccount.com"
          for SECRET in "github-app-id" "github-app-private-key" "github-app-installation-id"; do
            for MEMBER in "serviceAccount:${DEPLOY_SA}" "serviceAccount:${RUNTIME_SA}"; do
              gcloud secrets add-iam-policy-binding "${SECRET}" \
                --project="${SYS_PROJECT}" \
                --role="roles/secretmanager.secretAccessor" \
                --member="${MEMBER}" \
                --quiet >/dev/null
            done
            echo "PASS: secretAccessor granted to deploy-sa + runtime-sa on ${SECRET}"
          done

      - name: Verify install scope is narrow (single repo only)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          # Mint an installation token for the NEW per-system App, then call
          # /installation/repositories. If repository_selection=='all', this
          # endpoint returns every repo in the org — we assert exactly 1.
          APP_ID=$(gcloud secrets versions access latest \
            --secret="github-app-id" --project="${SYS_PROJECT}")
          INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="github-app-installation-id" --project="${SYS_PROJECT}")
          gcloud secrets versions access latest \
            --secret="github-app-private-key" --project="${SYS_PROJECT}" \
            > /tmp/system-app-key.pem
          chmod 600 /tmp/system-app-key.pem

          SYSTEM_TOKEN=$(bash scripts/generate-app-token.sh \
            /tmp/system-app-key.pem "$APP_ID" "$INSTALL_ID")
          shred -u /tmp/system-app-key.pem 2>/dev/null || rm -f /tmp/system-app-key.pem
          [ -n "$SYSTEM_TOKEN" ] || { echo "::error::could not mint per-system App token" >&2; exit 1; }
          echo "::add-mask::${SYSTEM_TOKEN}"

          RESP=$(curl -sS \
            -H "Authorization: Bearer ${SYSTEM_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/installation/repositories?per_page=100")
          TOTAL=$(echo "$RESP" | jq -r '.total_count // empty')
          FIRST=$(echo "$RESP" | jq -r '.repositories[0].full_name // empty')

          if [ "$TOTAL" = "1" ] && [ "$FIRST" = "edri2or/${SYSTEM_NAME}" ]; then
            echo "PASS: install scope is narrow (1 repo: ${FIRST})"
            exit 0
          fi

          echo "::error::install scope too broad — total_count=${TOTAL} first=${FIRST}"
          {
            echo ""
            echo "## ⚠ Install scope check FAILED"
            echo ""
            echo "App \`${APP_NAME}\` was installed with the wrong scope (total_count=${TOTAL}, first=\`${FIRST}\`). Recover:"
            echo ""
            echo "1. Uninstall the App: **Settings → Developer settings → GitHub Apps → ${APP_NAME} → Installations → Uninstall**."
            echo "2. Delete the SM secrets in project \`${SYS_PROJECT}\`:"
            echo "   \`gcloud secrets delete github-app-id github-app-private-key github-app-installation-id --project=${SYS_PROJECT}\`"
            echo "3. Re-dispatch this workflow. On click 2, choose **'Only select repositories'** and tick \`edri2or/${SYSTEM_NAME}\`."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Set APP_ID and APP_INSTALLATION_ID repo variables on system repo
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          set -euo pipefail
          APP_ID=$(gcloud secrets versions access latest \
            --secret="github-app-id" --project="${SYS_PROJECT}")
          INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="github-app-installation-id" --project="${SYS_PROJECT}")

          _set_var() {
            local name="$1" value="$2" resp http_code
            resp=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X POST \
              -H "Authorization: Bearer ${BROKER_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/edri2or/${SYSTEM_NAME}/actions/variables" \
              -d "$(jq -cn --arg n "$name" --arg v "$value" '{name:$n, value:$v}')")
            http_code=$(printf '%s' "$resp" | tail -1 | sed 's/HTTP_STATUS://')
            [ "$http_code" = "201" ] \
              || { echo "FAIL: set $name HTTP $http_code" >&2; return 1; }
            echo "PASS: $name set."
          }
          _set_var "APP_ID"              "$APP_ID"
          _set_var "APP_INSTALLATION_ID" "$INSTALL_ID"

      - name: Tear down Cloud Run receiver
        if: always() && steps.check-secrets.outputs.exists == 'false'
        run: |
          gcloud run services delete "${SERVICE_NAME}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --quiet 2>/dev/null || true
          echo "Receiver torn down."

      - name: Summary
        if: success()
        run: |
          set -euo pipefail
          if [ "${{ steps.check-secrets.outputs.exists }}" = "true" ]; then
            {
              echo "## ✅ Skipped — App already registered"
              echo ""
              echo "Credentials present in SM (\`${SYS_PROJECT}\`):"
              echo "- \`github-app-id\`"
              echo "- \`github-app-private-key\`"
              echo "- \`github-app-installation-id\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          APP_ID=$(gcloud secrets versions access latest \
            --secret="github-app-id" --project="${SYS_PROJECT}")
          INSTALL_ID=$(gcloud secrets versions access latest \
            --secret="github-app-installation-id" --project="${SYS_PROJECT}")
          {
            echo "## ✅ Per-system App registered: \`${APP_NAME}\`"
            echo ""
            echo "| Resource | Value |"
            echo "|---|---|"
            echo "| App name | \`${APP_NAME}\` |"
            echo "| App ID | \`${APP_ID}\` |"
            echo "| Installation ID | \`${INSTALL_ID}\` |"
            echo "| Install scope | \`selected\` (1 repo: \`edri2or/${SYSTEM_NAME}\`) |"
            echo "| SM secrets | \`github-app-id\`, \`github-app-private-key\`, \`github-app-installation-id\` in project \`${SYS_PROJECT}\` |"
            echo "| Repo vars | \`APP_ID\`, \`APP_INSTALLATION_ID\` on \`edri2or/${SYSTEM_NAME}\` |"
            echo ""
            echo "**Next step**: dispatch \`deploy-railway-cloudflare.yml\` in \`edri2or/${SYSTEM_NAME}\` to deploy n8n."
          } >> "$GITHUB_STEP_SUMMARY"
