name: Notify Session on CI Green

# Bridges "CI passed" -> the Claude Code session that is watching the PR.
#
# Why this exists: a session subscribed to a PR (Auto-fix / PR-activity) receives
# GitHub webhook events for "CI check failures" and "review comments" — but NOT
# for CI *success*. So a green CI run never wakes the watching session on its own.
# (The failure side is covered natively by that same subscription.)
#
# The fix: CI success is not a push event, but a PR *review* is. When CI finishes
# on a PR, this posts a short review (event=COMMENT) on that PR. The subscribed
# session receives the review as a github-webhook-activity event and wakes
# immediately — no timer, no polling, same session. Proven in the sibling system
# or-agents (live 2026-07-24): a submitted PR review pushes into the subscribed
# session within seconds (a plain issue comment does NOT).
#
# Factory difference from or-agents: the factory splits CI across FIVE workflows
# (Changelog Check / Pipeline Tests / Secret Scan / Supply Chain Check /
# Playground Tests). Listening to only one would let this post "CI passed" while
# another gate is still running or red. So this listens to all five, and before
# posting it re-reads every check-run on the PR's head commit and posts only when
# they are ALL green. That check makes exactly one honest post per green PR (only
# the last-finishing run sees everything green) and needs no hardcoded gate list,
# so the same logic drops unchanged into any sibling system.
#
# workflow_dispatch is kept so the wiring can be sanity-checked from the Actions
# tab; a manual run has no PR context, so it only confirms the job is reachable.

on:
  workflow_run:
    workflows:
      - Changelog Check
      - Pipeline Tests
      - Secret Scan
      - Supply Chain Check
      - Playground Tests
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  pull-requests: write

jobs:
  notify:
    name: notify session on green
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request') }}
    steps:
      - name: Post CI-green review to wake the watching session
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual smoke test: no PR context on workflow_dispatch. Job is reachable; nothing to post."
            exit 0
          fi
          pr="${PR_NUMBER:-}"
          if [ -z "${pr}" ]; then
            # Fallback: the workflow_run payload didn't carry the PR; resolve the
            # open PR by head branch instead.
            pr="$(gh pr list --repo "${REPO}" --head "${BRANCH}" --state open \
              --json number --jq '.[0].number' 2>/dev/null || true)"
          fi
          if [ -z "${pr}" ]; then
            echo "No open PR found for branch '${BRANCH}'; nothing to wake. Skipping."
            exit 0
          fi

          # Honesty gate: only post once EVERY check-run on the head commit is green.
          # (This workflow is workflow_run-triggered and does not attach a check-run
          # to the PR head, so it can never gate on itself.)
          runs="$(gh api "repos/${REPO}/commits/${SHA}/check-runs" --paginate \
            --jq '.check_runs[] | [.status, (.conclusion // "")] | @tsv' 2>/dev/null || true)"
          if [ -z "${runs}" ]; then
            echo "No check-runs visible for ${SHA} yet; nothing to confirm. Skipping."
            exit 0
          fi
          if printf '%s\n' "${runs}" | awk -F'\t' '$1 != "completed"{f=1} END{exit f?0:1}'; then
            echo "Some checks still running on ${SHA}; a later run will see all-green. Skipping."
            exit 0
          fi
          if printf '%s\n' "${runs}" \
            | awk -F'\t' '$2 != "success" && $2 != "neutral" && $2 != "skipped"{f=1} END{exit f?0:1}'; then
            echo "Not every check is green on ${SHA}; not waking the session."
            exit 0
          fi
          echo "All checks green on ${SHA} — posting the wake review."

          body="$(printf '%s\n\n%s\n\n---\n%s' \
            "✅ CI passed — all checks green on \`${BRANCH}\` (${SHA})." \
            "The session watching this PR is woken by this review — its cue to continue on green." \
            "_Generated by [Claude Code](https://claude.ai/code)_")"
          if gh api "repos/${REPO}/pulls/${pr}/reviews" \
              -f event=COMMENT -f body="${body}" --silent; then
            echo "Posted CI-green review on PR #${pr} — watching session will wake."
          else
            echo "Review post failed (non-fatal); CI stays green regardless."
          fi
