name: Exercise Agent

# On-demand BEHAVIORAL probe: drive a REAL message of your choosing through a live
# system's secured inbound path (telegram-in -> Caddy -> tg-inbound -> agent-router
# -> the routed specialist) via WIF + Secret Manager and scripts/e2e-verify-inbound.sh,
# then print the agent's ACTUAL reply. Unlike e2e-verify.yml this writes NO proof and
# commits nothing — it is a pure, reusable "does this agent actually answer?" probe.
# Use it to PROVE a specific agent (code / infra / research / deep-research / ...) works
# end-to-end on a real message, or to reproduce a silent failure on demand.
#
# Why a workflow (not a local curl): the inbound is HMAC/secret-guarded at the Caddy
# edge, so the only sanctioned way to drive a real message is server-side, reading the
# system's secrets from Secret Manager via WIF. The secret values are masked and never
# printed. WIF note: the broker WIF CEL pins ref=refs/heads/main, so this runs on main.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: The live system to drive (its repo/subdomain name, e.g. or-edri-4).
        required: true
      gcp_project:
        description: GCP project holding that system's secrets (reuse systems = the shared project, e.g. factory-test-21).
        required: true
        default: factory-test-25
      probe_text:
        description: The message to send. Its intent decides which agent runs (e.g. a code request routes to code-agent).
        required: true
      expect_substr:
        description: Optional substring the reply MUST contain (stronger assert; empty = only require a non-error reply).
        required: false
        default: ""
      poll_timeout_s:
        description: Seconds to wait for the execution to finish (raise for deep/LLM-heavy paths).
        required: false
        default: "120"

concurrency:
  group: exercise-agent-${{ github.event.inputs.system_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  exercise:
    name: Exercise agent (live)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write    # WIF OIDC token (workflow_dispatch only — never on PR)
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF (broker)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Drive the message and print the agent's reply
        env:
          PROJECT_ID: ${{ github.event.inputs.gcp_project }}
          SYSTEM_NAME: ${{ github.event.inputs.system_name }}
          PROBE_TEXT: ${{ github.event.inputs.probe_text }}
          EXPECT_SUBSTR: ${{ github.event.inputs.expect_substr }}
          POLL_TIMEOUT_S: ${{ github.event.inputs.poll_timeout_s }}
        run: |
          set -euo pipefail
          _sm() { gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null; }

          # Same three secrets the e2e driver needs; sourced server-side, masked, never printed.
          N8N_WEBHOOK_SECRET=$(_sm n8n-telegram-webhook-secret) || true
          N8N_CHAT_ID=$(_sm n8n-telegram-chat-id) || true
          N8N_API_KEY=$(_sm n8n-api-key) || true
          for v in N8N_WEBHOOK_SECRET N8N_CHAT_ID N8N_API_KEY; do
            [ -n "${!v}" ] || { echo "FAIL: $v missing/empty in $PROJECT_ID SM (broker secretAccessor?)" >&2; exit 1; }
            echo "::add-mask::${!v}"
          done
          export N8N_WEBHOOK_SECRET N8N_CHAT_ID N8N_API_KEY SYSTEM_NAME PROBE_TEXT EXPECT_SUBSTR POLL_TIMEOUT_S
          export E2E_RESULT_FILE="${RUNNER_TEMP}/result.json"

          # The driver exits 1 on a behavioral failure (empty/errored reply) — that is a real
          # red signal, so propagate it; but always surface the result JSON in the summary first.
          rc=0
          bash scripts/e2e-verify-inbound.sh || rc=$?

          {
            echo "## Exercise result (rc=${rc})"
            echo ""
            echo "- system: \`${SYSTEM_NAME}\`"
            echo "- probe: \`${PROBE_TEXT}\`"
            echo ""
            echo '```json'
            cat "${E2E_RESULT_FILE}" 2>/dev/null || echo '{"note":"no result file produced"}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "${rc}"
