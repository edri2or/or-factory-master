name: Fulfill System Request (broker-side, human-gated)

# The broker side of the system resource-request channel. A provisioned system
# RAISES a request via scripts/emit-event.sh -> a Linear ticket; the MCP triage
# dispatches THIS workflow. It runs in two phases:
#
#   phase=register : validate the request (scripts/validate-system-request.sh),
#                    then ask the MCP to send Or one Telegram approval card.
#                    Creates NOTHING.
#   phase=fulfill  : (dispatched by the MCP only after Or taps the ✅ button)
#                    re-validate, then perform the privileged action as the
#                    broker SA (create a secret shell + grant accessor, or grant
#                    one allowlisted IAM role) and report back.
#
# Authenticates as the broker SA via WIF (pinned to factory main). The target
# GCP project is resolved AUTHORITATIVELY from the system repo's GCP_PROJECT_ID
# variable — never trusted from the request body — so a request can only ever
# touch the named system's own project. NOT on the dispatch_workflow allowlist:
# it is reachable only through the MCP triage + approval path (like
# oil-autofix-verify.yml).

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "register (send approval card) | fulfill (apply, post-approval)"
        required: true
        type: string
      request_type:
        description: "secret | iam"
        required: true
        type: string
      system_name:
        description: "The system repo name the request belongs to."
        required: true
        type: string
      secret_name:
        description: "Secret id to create (request_type=secret)."
        required: false
        type: string
        default: ""
      role:
        description: "roles/... to grant (request_type=iam)."
        required: false
        type: string
        default: ""
      members:
        description: "Comma-separated SA emails; empty = the system's deploy-sa + runtime-sa."
        required: false
        type: string
        default: ""
      issue_id:
        description: "The Linear issue identifier the request came from."
        required: false
        type: string
        default: ""
      reason:
        description: "Free-text reason from the requesting system (shown on the card)."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  fulfill:
    name: Fulfill system request
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches fails to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      CONTROL_PROJECT: or-factory-master-control
      MCP_URL: https://factory-master-actions-mcp-140345952904.me-west1.run.app

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.0

      - name: Validate inputs
        env:
          PHASE: ${{ inputs.phase }}
          REQUEST_TYPE: ${{ inputs.request_type }}
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          case "$PHASE" in
            register|fulfill) ;;
            *) echo "FAIL: phase must be 'register' or 'fulfill' (got '$PHASE')" >&2; exit 1 ;;
          esac
          case "$REQUEST_TYPE" in
            secret|iam) ;;
            *) echo "FAIL: request_type must be 'secret' or 'iam'" >&2; exit 1 ;;
          esac
          if ! [[ "$SYSTEM_NAME" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: system_name '$SYSTEM_NAME' is not a valid system name" >&2; exit 1
          fi

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Resolve target project from the system repo (authoritative)
        id: resolve
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          # The authoritative target project is the system repo's GCP_PROJECT_ID
          # variable (set at provision time) — NOT anything from the request body.
          # This binds the request to the named system's real project and works
          # for adopt-mode systems where the project id != repo name.
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/fsr-key.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          TOKEN=$(bash scripts/generate-app-token.sh /tmp/fsr-key.pem "$APP_ID" "$INSTALL_ID" "" '{"variables":"read"}' "[\"$SYSTEM_NAME\"]")
          rm -f /tmp/fsr-key.pem
          echo "::add-mask::$TOKEN"
          GCP_PROJECT=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${SYSTEM_NAME}/actions/variables/GCP_PROJECT_ID" \
            | jq -r '.value // empty')
          [ -n "$GCP_PROJECT" ] || { echo "FAIL: could not resolve GCP_PROJECT_ID for edri2or/${SYSTEM_NAME}" >&2; exit 1; }
          echo "gcp_project=$GCP_PROJECT" >> "$GITHUB_OUTPUT"
          echo "INFO: resolved target project for $SYSTEM_NAME -> $GCP_PROJECT"

      - name: Validate request (deterministic gate)
        env:
          REQUEST_TYPE: ${{ inputs.request_type }}
          SYSTEM_NAME: ${{ inputs.system_name }}
          GCP_PROJECT: ${{ steps.resolve.outputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          ROLE: ${{ inputs.role }}
          MEMBERS: ${{ inputs.members }}
        run: |
          set -euo pipefail
          out=$(bash scripts/validate-system-request.sh) ; rc=$?
          printf '%s\n' "$out"
          [ "$rc" -eq 0 ] || { echo "Gate refused the request — aborting." >&2; exit 1; }

      # ---- register phase: ask the MCP to send the Telegram approval card -------
      - name: Send Telegram approval card (register phase)
        if: inputs.phase == 'register'
        env:
          REQUEST_TYPE: ${{ inputs.request_type }}
          SYSTEM_NAME: ${{ inputs.system_name }}
          GCP_PROJECT: ${{ steps.resolve.outputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          ROLE: ${{ inputs.role }}
          ISSUE_ID: ${{ inputs.issue_id }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          MCP_ADMIN=$(gcloud secrets versions access latest --secret=mcp-server-admin-secret --project="$CONTROL_PROJECT" | tr -d '\r\n')
          echo "::add-mask::$MCP_ADMIN"
          REQ=$(jq -cn \
            --arg type "$REQUEST_TYPE" --arg sys "$SYSTEM_NAME" --arg proj "$GCP_PROJECT" \
            --arg secret "$SECRET_NAME" --arg role "$ROLE" --arg issue "$ISSUE_ID" --arg reason "$REASON" \
            '{request_type:$type, system_name:$sys, gcp_project:$proj, secret_name:$secret, role:$role, issue_id:$issue, reason:$reason}')
          CODE=$(curl -sS -m 30 -o /tmp/fsr-reg.body -w '%{http_code}' \
            -X POST "${MCP_URL}/system-request-register" \
            -H "X-Admin-Secret: ${MCP_ADMIN}" \
            -H "Content-Type: application/json" \
            --data "$REQ" || echo "000")
          echo "POST /system-request-register -> HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            echo "FAIL: could not send approval card (HTTP ${CODE}): $(jq -r '.error // empty' /tmp/fsr-reg.body 2>/dev/null || true)" >&2
            rm -f /tmp/fsr-reg.body; exit 1
          fi
          rm -f /tmp/fsr-reg.body
          echo "PASS: approval card sent to Telegram (awaiting Or's ✅)."

      # ---- fulfill phase: perform the privileged action -------------------------
      - name: Fulfill the request (fulfill phase)
        if: inputs.phase == 'fulfill'
        id: apply
        env:
          REQUEST_TYPE: ${{ inputs.request_type }}
          GCP_PROJECT: ${{ steps.resolve.outputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          ROLE: ${{ inputs.role }}
          MEMBERS: ${{ inputs.members }}
        run: |
          set -euo pipefail
          bash scripts/fulfill-system-request.sh

      - name: Audit + notify (fulfill phase)
        if: inputs.phase == 'fulfill' && success()
        continue-on-error: true
        env:
          REQUEST_TYPE: ${{ inputs.request_type }}
          SYSTEM_NAME: ${{ inputs.system_name }}
          GCP_PROJECT: ${{ steps.resolve.outputs.gcp_project }}
          SECRET_NAME: ${{ inputs.secret_name }}
          ROLE: ${{ inputs.role }}
          ISSUE_ID: ${{ inputs.issue_id }}
        run: |
          set -uo pipefail
          # Durable audit event (Axiom). Non-actionable, so it never opens a ticket.
          TARGET="${SECRET_NAME:-$ROLE}"
          bash scripts/emit-event.sh \
            --name="factory.system_request.fulfilled" \
            --severity="info" \
            --layer="factory" \
            --workflow="fulfill-system-request.yml" \
            --run-id="${GITHUB_RUN_ID}" \
            --system="${SYSTEM_NAME}" \
            --body="$(jq -cn --arg t "$REQUEST_TYPE" --arg tgt "$TARGET" --arg p "$GCP_PROJECT" '{request_type:$t, target:$tgt, gcp_project:$p}')" || true

          # Telegram confirmation to Or.
          BOT=$(gcloud secrets versions access latest --secret=telegram-bot-token --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          CHAT=$(gcloud secrets versions access latest --secret=telegram-chat-id --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          if [ -n "$BOT" ] && [ -n "$CHAT" ]; then
            echo "::add-mask::$BOT"
            MSG="✅ בוצע: בקשת ${REQUEST_TYPE} עבור \`${SYSTEM_NAME}\` — \`${TARGET}\` (פרויקט ${GCP_PROJECT})."
            curl -sS -m 20 -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              --data-urlencode "chat_id=${CHAT}" \
              --data-urlencode "text=${MSG}" \
              --data-urlencode "parse_mode=Markdown" >/dev/null || true
          fi

          # Close the Linear ticket (soft-fail) — comment + move to a completed state.
          if [ -n "${ISSUE_ID:-}" ]; then
            LINEAR=$(gcloud secrets versions access latest --secret=linear-api-key --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
            if [ -n "$LINEAR" ]; then
              echo "::add-mask::$LINEAR"
              UUID=$(curl -sS -m 20 -X POST https://api.linear.app/graphql \
                -H "Authorization: ${LINEAR}" -H "Content-Type: application/json" \
                --data "$(jq -cn --arg id "$ISSUE_ID" '{query:"query($id:String!){ issue(id:$id){ id team{ id } } }", variables:{id:$id}}')" \
                | jq -r '.data.issue.id // empty' || true)
              if [ -n "$UUID" ]; then
                BODY="🤖 ערוץ בקשות — הבקשה מומשה ואומתה. נוצר אוטומטית · fulfill-system-request."
                curl -sS -m 20 -X POST https://api.linear.app/graphql \
                  -H "Authorization: ${LINEAR}" -H "Content-Type: application/json" \
                  --data "$(jq -cn --arg id "$UUID" --arg b "$BODY" '{query:"mutation($id:String!,$b:String!){ commentCreate(input:{issueId:$id, body:$b}){ success } }", variables:{id:$id, b:$b}}')" >/dev/null || true
              fi
            fi
          fi
          echo "PASS: audit + notify done."
