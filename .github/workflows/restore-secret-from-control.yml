name: Restore Preserved Secret to System (control -> system SM, value copy)

# Manual dispatch only. The completion of the preserve/restore pair (twin of
# preserve-secret-to-control.yml). Copies a PRESERVATION secret (control SM, name
# MUST start with "preserved-") back INTO a system's GCP project under a chosen
# secret id, server-side as the broker SA via WIF. The value is piped directly
# between gcloud calls — never echoed, stored in a shell variable, or logged.
#
# Why this exists: after a system is rebuilt, re-inject a runtime value that was
# preserved before the previous teardown (e.g. an n8n Telegram bot token) so the
# bot/identity carries across rebuilds. The source is locked to "preserved-*", so
# this can only read preservation copies — never an arbitrary control credential.

on:
  workflow_dispatch:
    inputs:
      source_secret:
        description: "Source secret id in control SM. MUST start with 'preserved-' (e.g. preserved-n8n-telegram-bot-token-or-edri-4)."
        required: true
        type: string
      dest_project:
        description: "Destination system GCP project to write INTO (e.g. factory-test-21). Never a control project."
        required: true
        type: string
      dest_secret:
        description: "Destination secret id in the system project (e.g. n8n-telegram-bot-token)."
        required: true
        type: string

permissions: {}

jobs:
  restore:
    name: Restore preserved secret control -> system
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    steps:
      - name: Validate inputs
        env:
          SOURCE_SECRET: ${{ inputs.source_secret }}
          DEST_PROJECT: ${{ inputs.dest_project }}
          DEST_SECRET: ${{ inputs.dest_secret }}
        run: |
          set -euo pipefail
          # The source is locked to the preservation namespace — this workflow can
          # only read "preserved-*" copies, never an arbitrary control credential.
          if ! [[ "$SOURCE_SECRET" =~ ^preserved-[a-zA-Z0-9_-]{1,243}$ ]]; then
            echo "FAIL: source_secret '$SOURCE_SECRET' must start with 'preserved-'" >&2
            exit 1
          fi
          # The destination is a SYSTEM project, never control nor the sandbox backend.
          case "$DEST_PROJECT" in
            or-factory-master-control|factory-control-9piybr)
              echo "FAIL: dest_project must not be a control project" >&2; exit 1 ;;
            factory-test-25)
              echo "FAIL: dest_project must not be factory-test-25 (shared sandbox backend)" >&2; exit 1 ;;
          esac
          if ! [[ "$DEST_PROJECT" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: dest_project '$DEST_PROJECT' is not a valid GCP project id (6-30 chars)" >&2
            exit 1
          fi
          if ! [[ "$DEST_SECRET" =~ ^[a-zA-Z0-9_-]{1,255}$ ]]; then
            echo "FAIL: dest_secret '$DEST_SECRET' is not a valid secret id" >&2
            exit 1
          fi
          echo "INFO: will restore or-factory-master-control/$SOURCE_SECRET -> $DEST_PROJECT/$DEST_SECRET"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Restore the secret value
        env:
          SOURCE_SECRET: ${{ inputs.source_secret }}
          DEST_PROJECT: ${{ inputs.dest_project }}
          DEST_SECRET: ${{ inputs.dest_secret }}
        run: |
          set -euo pipefail
          SOURCE_PROJECT="or-factory-master-control"
          BROKER_SA="factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

          # Source must have a readable version in control (the broker owns control).
          if ! gcloud secrets versions access latest \
               --secret="$SOURCE_SECRET" --project="$SOURCE_PROJECT" >/dev/null 2>&1; then
            echo "FAIL: '$SOURCE_SECRET' has no accessible version in $SOURCE_PROJECT" >&2
            exit 1
          fi

          # The broker manages the system project, so it can grant itself the
          # version-adder role on this one secret. Idempotent; harmless if already held.
          gcloud secrets add-iam-policy-binding "$DEST_SECRET" \
            --project="$DEST_PROJECT" \
            --role="roles/secretmanager.secretVersionManager" \
            --member="serviceAccount:${BROKER_SA}" \
            --quiet >/dev/null 2>&1 || true

          # Create the dest secret if missing (a rebuilt system already has the
          # shell, but stay idempotent).
          if ! gcloud secrets describe "$DEST_SECRET" --project="$DEST_PROJECT" >/dev/null 2>&1; then
            gcloud secrets create "$DEST_SECRET" \
              --project="$DEST_PROJECT" \
              --replication-policy=automatic \
              --labels="restored-by=or-factory-master,source-secret=${SOURCE_SECRET}" \
              --quiet
            echo "PASS: created $DEST_SECRET in $DEST_PROJECT"
          else
            echo "INFO: $DEST_SECRET already exists in $DEST_PROJECT"
          fi

          # Copy the value server-side (the pipe keeps it off the logs and out of
          # any shell variable), with a short retry to absorb IAM propagation on
          # the freshly-granted version-add.
          ok=""
          for attempt in $(seq 1 12); do
            if gcloud secrets versions access latest \
                 --secret="$SOURCE_SECRET" --project="$SOURCE_PROJECT" \
               | gcloud secrets versions add "$DEST_SECRET" \
                 --project="$DEST_PROJECT" --data-file=- --quiet; then
              ok=1
              break
            fi
            echo "INFO: version add not ready yet (attempt ${attempt}/12) — waiting 10s for IAM propagation..."
            sleep 10
          done
          if [ -z "$ok" ]; then
            echo "FAIL: could not add a version to $DEST_SECRET in $DEST_PROJECT (after grant + retry)" >&2
            exit 1
          fi
          echo "PASS: restored $SOURCE_SECRET ($SOURCE_PROJECT) -> $DEST_SECRET ($DEST_PROJECT)"

          COUNT=$(gcloud secrets versions list "$DEST_SECRET" \
            --project="$DEST_PROJECT" --filter="state=ENABLED" \
            --format="value(name)" | wc -l)
          echo "PASS: $DEST_SECRET now has ${COUNT} enabled version(s) in $DEST_PROJECT."
