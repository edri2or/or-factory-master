name: Pipeline Tests

# L1 of edri2or/factory's pipeline-tests.yml: shellcheck on every shell
# script, yamllint on every workflow YAML. Catches the typo class of
# bugs (unquoted vars, undefined commands, malformed YAML) at near-zero
# maintenance cost. .yamllint silences line-length noise — the workflows
# are full of long jq / GraphQL one-liners we don't want to chop.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: shellcheck + yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint

      - name: shellcheck
        run: shellcheck --severity=error scripts/*.sh

      - name: yamllint
        run: yamllint .github/workflows/ templates/system/.github/workflows/
