name: Deploy Verify

# Proof producer for the factory's "deploy-edge" surface — drives a LIVE test
# system's Caddy/HMAC edge via scripts/deploy-verify.sh and, only on a real pass,
# writes a signed e2e-proofs/deploy-edge-<slug>.json (content_hash over the FACTORY
# templates on target_ref), commits it, and uploads it as the `e2e-proof` artifact.
#
# Precondition (live-test-loop): the named test system must already be running the
# branch's templates (apply them first with prove-on-test-system.yml).
#
# WIF note: the broker WIF CEL pins ref=refs/heads/main, so dispatch on main (for
# auth) while it checks out target_ref's content.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: The live TEST system whose edge to drive (its repo/subdomain name).
        required: true
      gcp_project:
        description: GCP project holding that system's secrets.
        required: false
        default: factory-test-25
      target_ref:
        description: The factory branch whose deploy templates to prove and commit the proof onto.
        required: true
      slug:
        description: Proof slug — MUST start with "deploy-edge-" (e.g. deploy-edge-mysys).
        required: true

concurrency:
  # Serialize every factory run that acts on one live system into a FIFO queue (shared
  # `live-system-<system>` group with prove / refresh / e2e-verify), so two parallel
  # developments never overwrite each other on the same system. Grouped by SYSTEM, not by
  # target_ref, to match the proof-system lock. queue:max keeps up to 100 runs queued and
  # REQUIRES cancel-in-progress:false.
  group: live-system-${{ github.event.inputs.system_name }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  verify:
    name: Deploy edge verify (live test system)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout the branch under proof
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ github.event.inputs.target_ref }}
          fetch-depth: 2

      - name: Authenticate to GCP via WIF (broker)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Drive the live HMAC edge and assert it enforces
        id: drive
        env:
          PROJECT_ID: ${{ github.event.inputs.gcp_project }}
          SYSTEM_NAME: ${{ github.event.inputs.system_name }}
        run: |
          set -euo pipefail
          HMAC_SECRET=$(gcloud secrets versions access latest --secret=webhook-hmac-secret --project="$PROJECT_ID" 2>/dev/null) || true
          [ -n "$HMAC_SECRET" ] || { echo "FAIL: webhook-hmac-secret missing/empty in $PROJECT_ID SM (broker secretAccessor?)" >&2; exit 1; }
          echo "::add-mask::${HMAC_SECRET}"
          export HMAC_SECRET SYSTEM_NAME
          export E2E_RESULT_FILE="${RUNNER_TEMP}/edge-result.json"
          bash scripts/deploy-verify.sh

      - name: Build and sign the proof
        id: proof
        env:
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source scripts/lib.sh
          CONTENT_HASH=$(e2e_surface_hash deploy-edge)
          DRIVE=$(cat "${RUNNER_TEMP}/edge-result.json")

          mkdir -p e2e-proofs
          NOSIG="${RUNNER_TEMP}/proof-nosig.json"
          jq -n \
            --arg schema "e2e-proof/v1" --arg surface "deploy-edge" \
            --arg slug "$SLUG" --arg repo "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" --arg chash "$CONTENT_HASH" \
            --argjson d "$DRIVE" \
            '{schema:$schema, surface:$surface, slug:$slug, repo:$repo, run_id:$run_id,
              content_hash:$chash, system:($d.system), domain:($d.domain),
              checks:($d.checks), result:($d.result), executed_at:($d.executed_at)}' > "$NOSIG"

          KEY=$(gcloud secrets versions access latest --secret=mcp-server-bearer-signing-key --project="or-factory-master-control" 2>/dev/null) || true
          if [ -n "$KEY" ]; then
            echo "::add-mask::${KEY}"
            CANON=$(jq -Sc 'del(.signature)' "$NOSIG")
            SIG=$(printf '%s' "$CANON" | openssl dgst -sha256 -hmac "$KEY" -hex | awk '{print $NF}')
            jq --arg s "hmac-sha256:${SIG}" '.signature=$s' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          else
            jq '.signature="unsigned"' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          fi
          echo "proof_path=e2e-proofs/${SLUG}.json" >> "$GITHUB_OUTPUT"
          echo "Proof written:"; jq . "e2e-proofs/${SLUG}.json"

      - name: Upload the proof artifact (the gate cross-checks this)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-proof
          path: ${{ steps.proof.outputs.proof_path }}
          if-no-files-found: error

      - name: Commit the proof onto the branch
        env:
          TARGET_REF: ${{ github.event.inputs.target_ref }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          git config user.name "deploy-verify[bot]"
          git config user.email "actions@github.com"
          git add "e2e-proofs/${SLUG}.json"
          if git diff --cached --quiet; then
            echo "Proof unchanged — nothing to commit."
          else
            git commit -q -m "e2e: deploy-edge proof for ${SLUG} (run ${GITHUB_RUN_ID})"
            git push origin "HEAD:${TARGET_REF}"
          fi
