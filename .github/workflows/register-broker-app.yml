name: Register Broker App

# Registers the factory-master-broker GitHub App via Cloud Run receiver.
# Operator action: 2 browser clicks after the URL appears in Step Summary.
#
# Prerequisites (one-time, done in Cloud Shell during initial setup):
#   gcloud services enable artifactregistry.googleapis.com run.googleapis.com \
#     --project=or-factory-master-control
#
# After completion, credentials are stored in GCP Secret Manager:
#   factory-master-broker-app-id
#   factory-master-broker-app-private-key
#   factory-master-broker-app-installation-id

on:
  workflow_dispatch:

permissions: {}

jobs:
  register:
    name: Register factory-master-broker App (2-click)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: "or-factory-master-control"
      GCP_PROJECT_NUMBER: "140345952904"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      GCP_REGION: "me-west1"
      SERVICE_NAME: "factory-master-broker-receiver"
      APP_NAME: "factory-master-broker"
      SECRET_PREFIX: "factory-master-broker-app-"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2.1.13
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Check if App credentials already exist in GCP SM
        id: check-secrets
        run: |
          have_id=false; have_key=false; have_install=false
          gcloud secrets describe "${SECRET_PREFIX}id" --project="${GCP_PROJECT}" &>/dev/null && have_id=true || true
          gcloud secrets describe "${SECRET_PREFIX}private-key" --project="${GCP_PROJECT}" &>/dev/null && have_key=true || true
          gcloud secrets describe "${SECRET_PREFIX}installation-id" --project="${GCP_PROJECT}" &>/dev/null && have_install=true || true

          if [ "$have_id" = "true" ] && [ "$have_key" = "true" ] && [ "$have_install" = "true" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ App credentials already in GCP SM — skipping registration."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Missing credentials (id=$have_id key=$have_key install=$have_install) — proceeding."
          fi

      - name: Compute predictable Cloud Run URL + generate poll token
        id: precompute
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          # Cloud Run gives services a predictable region-domain URL based on
          # service name + project number, available the moment the service is created:
          #   https://<service-name>-<project-number>.<region>.run.app
          # Computing this BEFORE deploy lets us bake REDIRECT_URL into env vars
          # in a single deploy call — eliminating the race window where the
          # receiver served forms with placeholder URLs because env had not been
          # updated yet.
          #
          # NOTE: `gcloud run services describe ... --format='value(status.url)'`
          # returns the LEGACY URL (*.a.run.app with random hash), not this one.
          # Both URLs serve the same service. We verify reachability via the
          # health probe below, not by comparing URLs.
          SERVICE_URL="https://${SERVICE_NAME}-${GCP_PROJECT_NUMBER}.${GCP_REGION}.run.app"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"
          echo "Predicted SERVICE_URL: ${SERVICE_URL}"

          POLL_TOKEN=$(openssl rand -hex 32)
          echo "POLL_TOKEN=${POLL_TOKEN}" >> "$GITHUB_ENV"
          echo "::add-mask::${POLL_TOKEN}"

      - name: Build and push receiver image
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          gcloud artifacts repositories create bootstrap-images \
            --repository-format=docker \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --quiet 2>/dev/null || true

          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/bootstrap-images/receiver:latest"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker build -t "${IMAGE}" src/bootstrap-receiver/
          docker push "${IMAGE}"

      - name: Deploy Cloud Run receiver (single shot with REDIRECT_URL baked in)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          # Permissions: broad — broker manages ALL repos in the org.
          # Repository: administration, contents, actions, secrets, workflows,
          #   pull_requests (write), metadata (read).
          # Organization: administration (write) — required to create new repos.
          # Note: `variables` permission omitted — not supported in Manifest API.
          APP_PERMISSIONS_JSON='{"administration":"write","contents":"write","actions":"write","secrets":"write","workflows":"write","pull_requests":"write","metadata":"read","organization_administration":"write"}'
          APP_PERMISSIONS_B64=$(printf '%s' "${APP_PERMISSIONS_JSON}" | base64 -w 0)

          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --allow-unauthenticated \
            --service-account="${BROKER_SA}" \
            --max-instances=1 \
            --set-env-vars="GCP_PROJECT_ID=${GCP_PROJECT},GITHUB_ORG=edri2or,APP_NAME=${APP_NAME},SECRET_PREFIX=${SECRET_PREFIX},APP_PERMISSIONS=${APP_PERMISSIONS_B64},GITHUB_REPO=edri2or/or-factory-master,POLL_TOKEN=${POLL_TOKEN},REDIRECT_URL=${SERVICE_URL}/callback" \
            --quiet

      - name: Probe health (verify predicted URL is reachable)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          for i in $(seq 1 24); do
            if [ "$(curl -sS -m 8 -o /dev/null -w '%{http_code}' "${SERVICE_URL}/health")" = "200" ]; then
              echo "✅ Receiver healthy after ${i} attempt(s) at ${SERVICE_URL}"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Receiver did not become healthy at ${SERVICE_URL} in 120s"
          exit 1

      - name: Operator instructions
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          echo "::notice::Open this URL to register the App: ${SERVICE_URL}"
          {
            echo "## factory-master-broker App Registration — Action Required"
            echo ""
            echo "**Open this URL in your browser** (org admin required):"
            echo ""
            echo "👉 **[Start App registration](${SERVICE_URL})**"
            echo ""
            echo "### Click 1 — Create the App"
            echo "GitHub shows 'Create GitHub App' — click it."
            echo ""
            echo "### Click 2 — Install"
            echo "On the install page, select **'All repositories'** — this App manages all systems in the org."
            echo ""
            echo "Credentials will be stored automatically in GCP Secret Manager:"
            echo "- \`${SECRET_PREFIX}id\`"
            echo "- \`${SECRET_PREFIX}private-key\`"
            echo "- \`${SECRET_PREFIX}installation-id\`"
            echo ""
            echo "If GitHub says 'App name already taken': delete the existing App from"
            echo "**Settings → Developer settings → GitHub Apps → factory-master-broker → Delete**."
            echo ""
            echo "_This job polls for up to 10 minutes._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Poll for App credentials (up to 10 min)
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          for i in $(seq 1 20); do
            CREDS=$(curl -sf "${SERVICE_URL}/credentials?token=${POLL_TOKEN}" 2>/dev/null || echo "{}")
            read -r HAS_ID HAS_KEY HAS_INSTALL <<< "$(echo "$CREDS" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(int(bool(d.get('id'))),int(bool(d.get('private_key'))),int(bool(d.get('installation_id'))))" \
              2>/dev/null || echo "0 0 0")"
            if [ "$HAS_ID" = "1" ] && [ "$HAS_KEY" = "1" ] && [ "$HAS_INSTALL" = "1" ]; then
              echo "✅ All credentials received after ${i} poll(s)."
              exit 0
            fi
            echo "  Poll ${i}/20 — id=${HAS_ID} key=${HAS_KEY} install=${HAS_INSTALL}"
            [ "$i" -lt 20 ] && sleep 30
          done
          echo "::error::Timed out waiting for App credentials. Did you complete both clicks?"
          exit 1

      - name: Verify credentials in GCP SM
        if: steps.check-secrets.outputs.exists == 'false'
        run: |
          for SECRET in "${SECRET_PREFIX}id" "${SECRET_PREFIX}private-key" "${SECRET_PREFIX}installation-id"; do
            if gcloud secrets describe "${SECRET}" --project="${GCP_PROJECT}" &>/dev/null; then
              echo "✅ ${SECRET} exists in GCP SM"
            else
              echo "::error::${SECRET} missing from GCP SM"
              exit 1
            fi
          done

      - name: Tear down Cloud Run receiver
        if: always() && steps.check-secrets.outputs.exists == 'false'
        run: |
          gcloud run services delete "${SERVICE_NAME}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --quiet 2>/dev/null || true
          echo "Receiver torn down."

      - name: Summary
        if: success()
        run: |
          if [ "${{ steps.check-secrets.outputs.exists }}" = "true" ]; then
            echo "## ✅ Skipped — credentials already present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ✅ factory-master-broker App registered" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Credentials available in GCP SM at \`${GCP_PROJECT}\`:" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${SECRET_PREFIX}id\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${SECRET_PREFIX}private-key\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${SECRET_PREFIX}installation-id\`" >> "$GITHUB_STEP_SUMMARY"
          fi
