name: Agent-skeleton seed (throwaway, Stage 1)

# THROWAWAY setup for the agent-repo walking skeleton (devplans/agent-repo-product.md,
# Stage 1). Creates the zz- spike repo(s) via the broker App and seeds the WORKER repo with
# the spike workflows from spikes/agent-skeleton/ (pushed under .github/workflows/). When a
# REQUESTER is given it is created too (the broker writes the result there). This is replaced by
# provision-agent-repo.yml in Stage 3 — delete this file + the spike repos after the
# go/no-go verdict. Name-guarded to zz-* so it can only ever touch throwaways.
#
# Auth: WIF as the broker SA -> read broker App creds from SM -> mint tokens (org-wide for
# repo-create; repo-scoped for the seed push / issue). NOT on the dispatch_workflow allowlist.

on:
  workflow_dispatch:
    inputs:
      worker_repo:
        description: "Worker spike repo (MUST start with zz-)."
        required: true
        default: "zz-agentskel-worker"
        type: string
      requester_repo:
        description: "Requester spike repo (MUST start with zz-). The broker writes the result here. Empty for the Stage-1a credential probe."
        required: false
        default: ""
        type: string
      run_probe:
        description: "After seeding, dispatch cred-probe.yml in the worker and verify it (Stage 1a credential proof). true/false."
        required: false
        default: "false"
        type: string

permissions: {}

jobs:
  seed:
    name: Create + seed the agent-repo skeleton spikes
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      CONTROL_PROJECT: or-factory-master-control
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Validate spike names (zz- only)
        env:
          WORKER: ${{ inputs.worker_repo }}
          REQUESTER: ${{ inputs.requester_repo }}
        run: |
          set -euo pipefail
          printf '%s' "$WORKER" | grep -Eq '^zz-[a-z0-9._-]{1,40}$' \
            || { echo "FAIL: worker_repo must match ^zz-[a-z0-9._-]{1,40}$ (throwaways only)." >&2; exit 1; }
          if [ -n "$REQUESTER" ]; then
            printf '%s' "$REQUESTER" | grep -Eq '^zz-[a-z0-9._-]{1,40}$' \
              || { echo "FAIL: requester_repo must match ^zz-[a-z0-9._-]{1,40}$ (throwaways only)." >&2; exit 1; }
          fi

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Create + seed the spike repos (broker App)
        env:
          WORKER: ${{ inputs.worker_repo }}
          REQUESTER: ${{ inputs.requester_repo }}
          RUN_PROBE: ${{ inputs.run_probe }}
        run: |
          set -euo pipefail
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/bk.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"

          # Org-wide token just to create repos (create is an org operation, not repo-scoped).
          ORG_TOKEN=$(bash scripts/generate-app-token.sh /tmp/bk.pem "$APP_ID" "$INSTALL_ID")
          echo "::add-mask::$ORG_TOKEN"

          create_repo() {
            local n="$1" code
            code=$(curl -sS -m 30 -o /tmp/cr.body -w '%{http_code}' \
              -X POST "https://api.github.com/orgs/edri2or/repos" \
              -H "Authorization: Bearer ${ORG_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --data "$(jq -cn --arg n "$n" '{name:$n, private:true, auto_init:true, description:"agent-repo walking-skeleton spike — safe to delete"}')" || echo "000")
            case "$code" in
              201) echo "INFO: created edri2or/${n}." ;;
              422) echo "INFO: edri2or/${n} already exists (ok)." ;;
              *)   echo "FAIL: create ${n} HTTP ${code}: $(jq -r '.message // empty' /tmp/cr.body 2>/dev/null || true)" >&2; exit 1 ;;
            esac
          }

          create_repo "$WORKER"
          if [ -n "$REQUESTER" ]; then create_repo "$REQUESTER"; fi

          # --- Seed the worker: push spikes/agent-skeleton/*.yml -> .github/workflows/ ---
          # actions:write lets us also DISPATCH + poll the probe below (Stage 1a) — the same
          # dispatch+poll engine the Stage 1b broker uses. Still scoped to the one worker repo.
          WORKER_TOKEN=$(bash scripts/generate-app-token.sh /tmp/bk.pem "$APP_ID" "$INSTALL_ID" "" '{"contents":"write","workflows":"write","actions":"write"}' "[\"${WORKER}\"]")
          echo "::add-mask::$WORKER_TOKEN"
          rm -rf wk
          if ! cerr=$(git clone --depth 1 "https://x-access-token:${WORKER_TOKEN}@github.com/edri2or/${WORKER}.git" wk 2>&1); then
            echo "FAIL: clone worker: $(printf '%s' "$cerr" | sed "s/${WORKER_TOKEN}/***/g")" >&2; exit 1
          fi
          mkdir -p wk/.github/workflows
          cp spikes/agent-skeleton/*.yml wk/.github/workflows/
          git -C wk config user.name "or-factory-master[bot]"
          git -C wk config user.email "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
          git -C wk add .github/workflows
          if git -C wk diff --cached --quiet; then
            echo "INFO: worker ${WORKER} already seeded with current spike workflows."
          else
            git -C wk commit -q -m "seed: agent-repo skeleton worker workflows"
            if ! perr=$(git -C wk push "https://x-access-token:${WORKER_TOKEN}@github.com/edri2or/${WORKER}.git" HEAD:main 2>&1); then
              echo "FAIL: push worker: $(printf '%s' "$perr" | sed "s/${WORKER_TOKEN}/***/g")" >&2; exit 1
            fi
            echo "PASS: seeded edri2or/${WORKER} with $(find spikes/agent-skeleton -name '*.yml' | wc -l) spike workflow(s)."
          fi

          # --- Stage 1a proof: dispatch + verify the credential probe in the worker ---
          # Dispatch cred-probe.yml in the GCP-less worker, poll to terminal, surface its
          # PASS line. This is the live proof that a bound agent-repo reads anthropic-api-key
          # via the WIF door (no standing secret). Same dispatch+poll shape the broker reuses.
          if [ "${RUN_PROBE:-false}" = "true" ]; then
            export GH_TOKEN="$WORKER_TOKEN"
            echo "INFO: dispatching cred-probe.yml in edri2or/${WORKER} (newly-pushed workflow may need a moment to register)…"
            dispatched=""
            for a in 1 2 3 4 5 6; do
              if gh workflow run cred-probe.yml --repo "edri2or/${WORKER}" --ref main 2>/dev/null; then dispatched="yes"; break; fi
              echo "  dispatch attempt ${a}/6 …"; sleep 10
            done
            [ -n "$dispatched" ] || { echo "FAIL: could not dispatch cred-probe.yml in ${WORKER}" >&2; exit 1; }
            RID=""
            for a in $(seq 1 12); do
              RID=$(gh run list --repo "edri2or/${WORKER}" --workflow cred-probe.yml -L 1 --json databaseId --jq '.[0].databaseId // empty' 2>/dev/null || true)
              [ -n "$RID" ] && break
              sleep 5
            done
            [ -n "$RID" ] || { echo "FAIL: cred-probe run never appeared in ${WORKER}" >&2; exit 1; }
            echo "INFO: cred-probe run id=${RID}; polling to terminal…"
            concl=""
            for a in $(seq 1 40); do
              st=$(gh run view "$RID" --repo "edri2or/${WORKER}" --json status --jq '.status' 2>/dev/null || echo "")
              if [ "$st" = "completed" ]; then
                concl=$(gh run view "$RID" --repo "edri2or/${WORKER}" --json conclusion --jq '.conclusion' 2>/dev/null || echo "")
                break
              fi
              sleep 10
            done
            [ -n "$concl" ] || { echo "FAIL: cred-probe did not finish within ~7m" >&2; exit 1; }
            echo "INFO: cred-probe conclusion=${concl}"
            gh run view "$RID" --repo "edri2or/${WORKER}" --log 2>/dev/null | grep -E "PASS:|FAIL:|length=" | head -10 || true
            [ "$concl" = "success" ] || { echo "FAIL: cred-probe did not succeed (${concl}) — the WIF door or grant is misconfigured." >&2; exit 1; }
            echo "PASS (Stage 1a): a GCP-less agent-repo read anthropic-api-key via the shared WIF door, no standing secret."
          fi

          # The requester just needs to EXIST — the broker (agent-action.yml) writes the
          # result back to it as results/<corr>.json (contents). No GitHub issue is opened
          # (the broker App has no `issues` permission; the requester's channel is repo files).
          rm -f /tmp/bk.pem /tmp/cr.body
