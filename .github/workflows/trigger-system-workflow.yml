name: Trigger System Workflow

# On-demand runner for a system's n8n workflow — the missing piece for verifying
# SCHEDULED workers (tg-proactive, style-refresh, DB Vacuum, ...) live without
# waiting for their cron. The n8n PUBLIC API cannot execute a workflow, so this
# logs in with the system's n8n owner creds (the proven configure-agent-router
# pattern) and calls the internal "Execute Workflow" endpoint. It is robust to the
# (undocumented) /run response shape: it records the workflow's latest execution id
# BEFORE running, then polls the PUBLIC executions API for a NEW finished execution
# and reports its real status — so success/failure is read from n8n itself.
#
# Secrets are read from the system's Secret Manager via WIF, masked, never printed.
# WIF note: the broker WIF CEL pins ref=refs/heads/main, so this runs on main.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: The live system whose n8n workflow to run (e.g. or-edri-4).
        required: true
      gcp_project:
        description: GCP project holding that system's secrets (e.g. factory-test-21 for or-edri-4).
        required: true
        default: factory-test-25
      workflow_id:
        description: The n8n workflow id to execute (e.g. nyx1Nom0cu38W8Il for tg-proactive).
        required: true
      poll_timeout_s:
        description: Seconds to wait for the triggered execution to finish.
        required: false
        default: "180"

concurrency:
  group: trigger-system-workflow-${{ github.event.inputs.system_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  trigger:
    name: Trigger system workflow (live)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read     # actions/checkout
      id-token: write    # WIF OIDC token (workflow_dispatch only)
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF (broker)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Run the n8n workflow on demand and report its real status
        env:
          PROJECT_ID: ${{ github.event.inputs.gcp_project }}
          SYSTEM_NAME: ${{ github.event.inputs.system_name }}
          WORKFLOW_ID: ${{ github.event.inputs.workflow_id }}
          POLL_TIMEOUT_S: ${{ github.event.inputs.poll_timeout_s }}
        run: |
          set -euo pipefail
          _sm() { gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null; }

          OWNER_EMAIL=$(_sm n8n-owner-email) || true
          OWNER_PASS=$(_sm n8n-owner-password) || true
          API_KEY=$(_sm n8n-api-key) || true
          for v in OWNER_EMAIL OWNER_PASS API_KEY; do
            [ -n "${!v}" ] || { echo "FAIL: $v missing/empty in $PROJECT_ID SM (broker secretAccessor?)" >&2; exit 1; }
          done
          echo "::add-mask::${OWNER_PASS}"
          echo "::add-mask::${API_KEY}"

          BASE="https://n8n-${SYSTEM_NAME}.or-infra.com"
          WID="${WORKFLOW_ID}"
          COOKIE="$(mktemp)"
          trap 'rm -f "$COOKIE" /tmp/tw-*.json' EXIT

          # --- 1. Owner login -> session cookie (proven configure-agent-router pattern) ---
          _login() {
            curl -sS -o /tmp/tw-login.json -w '%{http_code}' --max-time 15 -c "$COOKIE" \
              -X POST "$BASE/rest/login" -H 'Content-Type: application/json' \
              -d "$(jq -cn --arg f "$1" --arg e "$OWNER_EMAIL" --arg p "$OWNER_PASS" '{($f):$e, password:$p}')" \
              || echo "000"
          }
          HTTP="000"
          for _ in 1 2 3 4 5 6 7 8; do
            HTTP=$(_login emailOrLdapLoginId); [ "$HTTP" = "200" ] || HTTP=$(_login email)
            [ "$HTTP" = "200" ] && break; sleep 4
          done
          [ "$HTTP" = "200" ] || { echo "FAIL: n8n owner login (HTTP $HTTP)" >&2; head -c 300 /tmp/tw-login.json >&2 || true; exit 1; }
          echo "n8n owner login OK"

          # --- 2. Baseline: newest execution id for this workflow (PUBLIC API) ---
          _pub() { curl -sS -o "$2" -w '%{http_code}' --max-time 30 -H "X-N8N-API-KEY: $API_KEY" "$1" || echo "000"; }
          _pub "$BASE/api/v1/executions?workflowId=${WID}&limit=1" /tmp/tw-base.json >/dev/null || true
          BASE_EXEC=$(jq -r '(.data[0].id // 0)|tonumber? // 0' /tmp/tw-base.json 2>/dev/null || echo 0)
          echo "baseline latest execution id: ${BASE_EXEC}"

          # --- 3. Fetch the workflow (for the /run body) ---
          curl -sS -o /tmp/tw-wf.json --max-time 30 -b "$COOKIE" "$BASE/rest/workflows/${WID}" || true
          WF=$(jq -c '.data // .' /tmp/tw-wf.json 2>/dev/null || echo "")

          # --- 4. Trigger (try mechanisms in order; each attempt is logged) ---
          _run_try() {  # desc method url body auth(cookie|key)
            local desc="$1" method="$2" url="$3" body="$4" auth="$5" out=/tmp/tw-run.json http
            local -a a=(-sS -o "$out" -w '%{http_code}' --max-time 60 -X "$method" -H 'Content-Type: application/json')
            if [ "$auth" = "key" ]; then a+=(-H "X-N8N-API-KEY: $API_KEY"); else a+=(-b "$COOKIE"); fi
            [ -n "$body" ] && a+=(--data-binary "$body")
            http=$(curl "${a[@]}" "$url" || echo "000")
            echo "RUN-ATTEMPT [$desc]: HTTP $http"; head -c 200 "$out" 2>/dev/null || true; echo
            case "$http" in 200|201) return 0;; *) return 1;; esac
          }
          if [ -n "$WF" ] && [ "$WF" != "null" ]; then
            _run_try "rest run {workflowData}" POST "$BASE/rest/workflows/${WID}/run" "$(jq -cn --argjson wf "$WF" '{workflowData:$wf}')" cookie \
              || _run_try "rest run {workflowData,startNodes}" POST "$BASE/rest/workflows/${WID}/run" "$(jq -cn --argjson wf "$WF" '{workflowData:$wf,startNodes:[]}')" cookie \
              || _run_try "public run" POST "$BASE/api/v1/workflows/${WID}/run" "" key \
              || echo "WARN: all /run attempts returned non-2xx — will still poll for a new execution (it may have started)."
          else
            echo "WARN: could not fetch workflow body; trying public run only." >&2
            _run_try "public run" POST "$BASE/api/v1/workflows/${WID}/run" "" key || true
          fi

          # --- 5. Detect the NEW execution (independent of the /run response shape) ---
          deadline=$(( $(date +%s) + POLL_TIMEOUT_S ))
          NEWID=""; STATUS="unknown"
          while [ "$(date +%s)" -lt "$deadline" ]; do
            _pub "$BASE/api/v1/executions?workflowId=${WID}&limit=5" /tmp/tw-list.json >/dev/null || true
            CAND=$(jq -r --argjson b "${BASE_EXEC:-0}" '[.data[]? | select(((.id|tonumber?) // 0) > $b)] | sort_by(.id|tonumber) | (last.id // empty)' /tmp/tw-list.json 2>/dev/null || echo "")
            if [ -n "$CAND" ]; then
              NEWID="$CAND"
              _pub "$BASE/api/v1/executions/${CAND}" /tmp/tw-exec.json >/dev/null || true
              STATUS=$(jq -r '.status // "unknown"' /tmp/tw-exec.json 2>/dev/null || echo unknown)
              FIN=$(jq -r '.finished // false' /tmp/tw-exec.json 2>/dev/null || echo false)
              { [ "$FIN" = "true" ] || [ "$STATUS" = "success" ] || [ "$STATUS" = "error" ] || [ "$STATUS" = "crashed" ]; } && break
            fi
            sleep 6
          done

          {
            echo "## Trigger result"
            echo ""
            echo "- system: \`${SYSTEM_NAME}\` · workflow_id: \`${WID}\`"
            echo "- baseline exec: \`${BASE_EXEC}\` · new exec: \`${NEWID:-none}\` · status: \`${STATUS}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          [ -n "$NEWID" ] || { echo "FAIL: no new execution detected within ${POLL_TIMEOUT_S}s" >&2; exit 1; }
          echo "NEW EXECUTION ${NEWID} status=${STATUS}"
          [ "$STATUS" = "success" ] && exit 0
          echo "FAIL: execution ${NEWID} finished status=${STATUS}" >&2
          exit 1
