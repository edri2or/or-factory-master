name: Refresh System (apply current factory templates to a live system)

# The cheap "iterate on ONE live system" loop (the test-030 pattern). Applies the
# factory's CURRENT template files to an ALREADY-PROVISIONED system repo, then optionally
# triggers a system workflow to apply them live — WITHOUT a full re-provision/deploy
# (provision-system.yml refuses an existing system at preflight). This is the factory's
# standing, generic method for proving a template fix on a live system before promotion.
#
# It is generic over WHICH template subtree to sync (the `paths` input) and WHICH system
# workflow to run afterwards (the `post_merge_workflow` input). The defaults reproduce the
# original behaviour exactly: sync templates/system/workflows/n8n (the agent JSONs) and
# run the system's configure-agent-router.yml to reimport them into the live n8n.
#
# Use it to apply a merged template fix to one live test system in place and verify it
# live (e.g. in Telegram): fix template on main -> dispatch this -> ~40s later the live
# system is updated. A round is ~1-2 minutes, no new Railway project, no manual clicks.
#
# Branch-prove mode (`source_ref`): set `source_ref=<work-branch>` to copy the templates
# FROM that branch instead of main, so a provisioning-process change can be proven live on
# a standing system (e.g. or-edri-4) BEFORE it is merged to main — the apply step of the
# /dev-stage-factory live-proof loop for a not-yet-merged change.
#
# Scope & safety:
#   - Syncs ONLY paths under templates/system/, copied from the factory's trusted `main`
#     by default — or from `source_ref` when set (to prove a work-branch change live before
#     merge). The `paths` input is validated to be relative (no absolute paths, no `..`);
#     WIF still authenticates as the broker on `main` (only the template SOURCE ref changes).
#   - Template files carry @@PLACEHOLDERS@@; the post-merge system workflow substitutes
#     them at apply time (same as provision's scaffold), so the system repo stores the
#     templated files verbatim — exactly what provision pushes.
#   - Broker App token is scoped to the ONE target repo (contents:write + actions:write).
#   - Direct push to the system's main is by design (mirrors provision's scaffold push;
#     system branch protection is enforce_admins:false and the broker is admin).
#   - HARD-refuses the control project and the factory repo; validates system_name shape.
#   - Idempotent: byte-identical files -> no commit, no push (still optionally re-runs the
#     post-merge workflow, which is itself idempotent/soft-fail).

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: "Existing provisioned system repo to refresh (e.g. factory-test-tavily2)."
        required: true
        type: string
      paths:
        description: "Comma-separated template subpaths under templates/system/ to sync into the system repo (file or dir; e.g. 'workflows/n8n' or 'Caddyfile,workflows/n8n'). Default: the agent-workflow JSONs."
        required: false
        default: "workflows/n8n"
        type: string
      post_merge_workflow:
        description: "System workflow to dispatch after the merge to apply the change live (e.g. configure-agent-router.yml, deploy-railway-cloudflare.yml). Leave empty to skip. Default: configure-agent-router.yml."
        required: false
        default: "configure-agent-router.yml"
        type: string
      run_configure:
        description: "Master on/off for the post-merge dispatch (true/false). When true, dispatches post_merge_workflow; when false, skips it."
        required: false
        default: "true"
        type: string
      source_ref:
        description: "Optional git ref (branch/tag/SHA) in or-factory-master to copy the templates FROM, instead of the default checked-out main tree. Use to prove a NOT-YET-MERGED work-branch change live on a standing system (e.g. or-edri-4) before merging. Empty = normal behaviour (copy main). WIF still authenticates as the broker on main — only the template SOURCE changes."
        required: false
        default: ""
        type: string

concurrency:
  # Serialize every factory run that acts on one live system into a FIFO queue (shared
  # `live-system-<system>` group with prove / e2e-verify / deploy-verify), so two parallel
  # developments never overwrite each other on the same system — notably the standing
  # proving system or-edri-4. queue:max keeps up to 100 runs queued and REQUIRES
  # cancel-in-progress:false.
  group: live-system-${{ inputs.system_name }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  refresh:
    name: Refresh agent workflows in a live system
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      CONTROL_PROJECT: "or-factory-master-control"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # Default ('') checks out the triggering ref (main, per the `if` guard above),
          # preserving the original behaviour. When source_ref is set, copy the templates
          # from that work-branch instead — the broker WIF auth below still keys off
          # github.ref (main), so only the template SOURCE ref changes, not the identity.
          ref: ${{ inputs.source_ref }}
          persist-credentials: false

      - name: Validate system_name
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          # Same shape rule the factory enforces upstream (6-30 chars).
          echo "$SYSTEM_NAME" | grep -qE '^[a-z][a-z0-9-]{4,28}[a-z0-9]$' \
            || { echo "FAIL: system_name '$SYSTEM_NAME' must match ^[a-z][a-z0-9-]{4,28}[a-z0-9]\$" >&2; exit 1; }
          # HARD refuse: never target the factory or any control/master project.
          case "$SYSTEM_NAME" in
            or-factory-master|or-factory-master-control|factory|factory-control-*|*-control)
              echo "FAIL: refusing to target control/factory repo '$SYSTEM_NAME'" >&2; exit 1 ;;
          esac
          echo "OK: target edri2or/${SYSTEM_NAME}"

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Open PR with refreshed agent workflows, wait for CI, merge, reimport
        id: push
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_CONFIGURE: ${{ inputs.run_configure }}
          PATHS: ${{ inputs.paths }}
          POST_MERGE_WORKFLOW: ${{ inputs.post_merge_workflow }}
        run: |
          set -uo pipefail
          # --- Mint a broker App token scoped to JUST this repo (contents + PRs + actions + workflows) ---
          # `workflows:write` is required to sync files under .github/workflows/ — GitHub
          # refuses an App push that creates/updates a workflow file without it. Without it,
          # `paths` can only carry non-workflow templates (n8n JSONs, Caddyfile, etc.).
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT" 2>/dev/null || true)
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT" 2>/dev/null || true)
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/rsa-key.pem 2>/dev/null || true
          TOKEN=""
          if [ -s /tmp/rsa-key.pem ] && [ -n "$APP_ID" ] && [ -n "$INSTALL_ID" ]; then
            TOKEN=$(bash scripts/generate-app-token.sh /tmp/rsa-key.pem "$APP_ID" "$INSTALL_ID" "" '{"contents":"write","pull_requests":"write","actions":"write","workflows":"write"}' "[\"$SYSTEM_NAME\"]" 2>/dev/null || true)
          fi
          rm -f /tmp/rsa-key.pem
          [ -n "$TOKEN" ] || { echo "FAIL: could not mint a broker token for edri2or/${SYSTEM_NAME}" >&2; exit 1; }
          echo "::add-mask::$TOKEN"
          export GH_TOKEN="$TOKEN"

          # --- Clone the system repo (shallow), one-shot auth in the URL only ---
          # Capture git's stderr so we can surface the real error (auth / network /
          # missing branch), but sed-strip the token from the URL git echoes back
          # on failure. Same pattern as the push step below.
          rm -rf sys-target
          if ! cerr=$(git clone --depth 1 \
               "https://x-access-token:${TOKEN}@github.com/edri2or/${SYSTEM_NAME}.git" sys-target 2>&1); then
            echo "FAIL: could not clone edri2or/${SYSTEM_NAME}: $(printf '%s' "$cerr" | sed "s/${TOKEN}/***/g")" >&2; exit 1
          fi

          # --- Copy the requested template subpaths from the factory's trusted main ---
          # `paths` is a comma-separated list of file/dir paths RELATIVE to
          # templates/system/. Each is validated (no absolute path, no `..`), then
          # copied to the same relative location in the system repo. Default is
          # `workflows/n8n` (the agent JSONs) — identical to the original behaviour.
          git -C sys-target config user.name "or-factory-master[bot]"
          git -C sys-target config user.email "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
          IFS=',' read -ra SYNC_PATHS <<< "${PATHS:-workflows/n8n}"
          for raw in "${SYNC_PATHS[@]}"; do
            p="${raw// /}"; [ -n "$p" ] || continue
            case "$p" in
              /*|*..*) echo "FAIL: path '$p' must be relative under templates/system/ (no leading / and no '..')" >&2; exit 1 ;;
            esac
            src="templates/system/${p}"
            [ -e "$src" ] || { echo "FAIL: ${src} not found in factory main" >&2; exit 1; }
            dest_parent="sys-target/$(dirname "$p")"
            mkdir -p "$dest_parent"
            cp -r "$src" "$dest_parent/"
            git -C sys-target add "$p"
            echo "INFO: synced templates/system/${p} -> ${p}"
          done
          if git -C sys-target diff --cached --quiet; then
            echo "INFO: edri2or/${SYSTEM_NAME} template files already current — no PR needed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            # System repos protect main (PR + 4 green CI checks required) — a GitHub
            # App is NOT an admin bypass, so go through a PR: branch -> push -> open
            # PR -> wait for the system's own CI -> merge. Add a changelog.d fragment
            # so the system's "Changelog gates" check passes on the synced files.
            BRANCH="refresh-system-${RUN_ID}"
            DATE_UTC=$(date -u +%Y-%m-%d)
            mkdir -p sys-target/changelog.d
            {
              echo "### Refresh template files from or-factory-master"
              echo
              echo "- Synced \`${PATHS}\` to the factory's current templates via refresh-system-agents.yml (run ${RUN_ID})."
            } > "sys-target/changelog.d/${DATE_UTC}-refresh-system-${RUN_ID}.md"
            git -C sys-target add changelog.d
            git -C sys-target checkout -q -b "$BRANCH"
            git -C sys-target commit -q -m "ci: refresh template files from or-factory-master"
            if ! perr=$(git -C sys-target push "https://x-access-token:${TOKEN}@github.com/edri2or/${SYSTEM_NAME}.git" "$BRANCH:$BRANCH" 2>&1); then
              echo "FAIL: push branch failed: $(printf '%s' "$perr" | sed "s/${TOKEN}/***/g")" >&2; exit 1
            fi
            PR_URL=$(gh pr create --repo "edri2or/${SYSTEM_NAME}" --base main --head "$BRANCH" \
              --title "ci: refresh template files from or-factory-master" \
              --body "Automated refresh of \`${PATHS}\` from or-factory-master templates (refresh-system-agents.yml run ${RUN_ID}).") \
              || { echo "FAIL: gh pr create failed for edri2or/${SYSTEM_NAME}" >&2; exit 1; }
            echo "INFO: opened ${PR_URL}"
            # --- Live E2E proof for behavior changes (master-system-integrity B7) ---
            # If this refresh touches BEHAVIOR-bearing files and the system enforces
            # the "E2E verification gate", the PR cannot merge without a fresh
            # e2e-proofs/<slug>.json. The proof's content_hash is path-sensitive, so
            # it must be BORN in the system repo on THIS branch — produced by the
            # system's OWN e2e-verify.yml (drives a real inbound message, asserts the
            # reply, commits the signed proof onto target_ref). We dispatch it, wait
            # for the proof to land, then add a tiny broker-token commit: the proof
            # commit is pushed with GITHUB_TOKEN, whose CI runs need manual approval
            # and never run unattended, so a broker-token follow-up re-triggers
            # runnable CI and lets the gate evaluate the proof before the merge.
            BEHAVIOR_SYNCED=""
            for raw in "${SYNC_PATHS[@]}"; do
              q="${raw// /}"; [ -n "$q" ] || continue
              case "$q" in
                workflows/n8n|workflows/n8n/*|.github/workflows/configure-agent-router.yml) BEHAVIOR_SYNCED="yes" ;;
              esac
            done
            if [ -n "$BEHAVIOR_SYNCED" ] && gh api "repos/edri2or/${SYSTEM_NAME}/contents/.github/workflows/e2e-verify.yml" >/dev/null 2>&1; then
              echo "INFO: behavior files changed + system has the E2E gate — producing a live E2E proof on ${BRANCH}…"
              gh workflow run e2e-verify.yml --repo "edri2or/${SYSTEM_NAME}" --ref main \
                -f target_ref="$BRANCH" -f slug="refresh-system-${RUN_ID}" 2>/dev/null \
                || { echo "FAIL: could not dispatch e2e-verify.yml on edri2or/${SYSTEM_NAME}" >&2; exit 1; }
              PROOF_PATH="e2e-proofs/refresh-system-${RUN_ID}.json"
              proof_ok=""
              for attempt in $(seq 1 60); do
                sleep 15
                if gh api "repos/edri2or/${SYSTEM_NAME}/contents/${PROOF_PATH}?ref=${BRANCH}" >/dev/null 2>&1; then
                  proof_ok="yes"; break
                fi
                echo "INFO: waiting for the live E2E proof on ${BRANCH} (${attempt}/60)…"
              done
              if [ -z "$proof_ok" ]; then
                echo "FAIL: e2e-verify did not commit ${PROOF_PATH} onto ${BRANCH} within ~15m — the live E2E proof failed or timed out; refusing to merge an unproven behavior change." >&2
                exit 1
              fi
              echo "PASS: live E2E proof committed onto ${BRANCH}."
              # Nudge runnable CI (see note above): fast-forward to the proof commit,
              # add an empty broker-token commit, push. The PR-synchronize event then
              # runs the gate (which now sees the proof) under a runnable, non-approval
              # context, so the protected merge below can succeed.
              git -C sys-target fetch -q "https://x-access-token:${TOKEN}@github.com/edri2or/${SYSTEM_NAME}.git" "$BRANCH"
              git -C sys-target checkout -q "$BRANCH"
              git -C sys-target reset -q --hard FETCH_HEAD
              git -C sys-target commit -q --allow-empty -m "ci: re-trigger checks to evaluate the E2E proof"
              if ! perr=$(git -C sys-target push "https://x-access-token:${TOKEN}@github.com/edri2or/${SYSTEM_NAME}.git" "$BRANCH:$BRANCH" 2>&1); then
                echo "FAIL: push re-trigger commit failed: $(printf '%s' "$perr" | sed "s/${TOKEN}/***/g")" >&2; exit 1
              fi
            elif [ -n "$BEHAVIOR_SYNCED" ]; then
              echo "INFO: behavior files changed but the system has no e2e-verify.yml (pre-gate system) — no E2E proof required."
            fi
            # The broker App token has no `checks:read`, so we can't read the PR's
            # status to gate the merge (gh pr checks fails with "Resource not
            # accessible by integration"). Instead, RETRY the protected merge — the
            # branch ruleset enforces the 4 required checks server-side, so the merge
            # only succeeds once CI is green (same approach as prove-on-test-system.yml).
            merged=""
            for attempt in $(seq 1 20); do
              if merr=$(gh pr merge "$PR_URL" --repo "edri2or/${SYSTEM_NAME}" --squash --delete-branch 2>&1); then
                merged="yes"; break
              fi
              echo "INFO: merge attempt ${attempt}/20 not yet allowed (waiting for required checks)…"
              sleep 15
            done
            if [ -z "$merged" ]; then
              echo "FAIL: merge never succeeded after retries: $(printf '%s' "$merr" | sed "s/${TOKEN}/***/g")" >&2; exit 1
            fi
            echo "PASS: merged refreshed \`${PATHS}\` into edri2or/${SYSTEM_NAME}:main"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          # --- Apply live via the system's own workflow (after merge) ---
          # Dispatches post_merge_workflow (default configure-agent-router.yml) so the
          # merged template change takes effect on the live system. Skipped when
          # run_configure=false or post_merge_workflow is empty.
          if [ "$RUN_CONFIGURE" = "true" ] && [ -n "${POST_MERGE_WORKFLOW:-}" ]; then
            if gh workflow run "$POST_MERGE_WORKFLOW" --repo "edri2or/${SYSTEM_NAME}" --ref main 2>/dev/null; then
              echo "PASS: dispatched ${POST_MERGE_WORKFLOW} on edri2or/${SYSTEM_NAME} (watch it to confirm the change is applied live)."
            else
              echo "WARN: could not dispatch ${POST_MERGE_WORKFLOW} — dispatch it manually to apply the change." >&2
            fi
          else
            echo "INFO: post-merge dispatch skipped (run_configure=${RUN_CONFIGURE}, post_merge_workflow='${POST_MERGE_WORKFLOW:-}')."
          fi
