name: Prove on Test System (branch-runnable, sandbox identity)

# "prove -> merge": apply a WORK-BRANCH's change to an already-standing live test system and
# prove it live, BEFORE the change is merged to main. The branch-runnable, sandbox-scoped twin
# of refresh-system-agents.yml.
#
# Why it can run off a branch (unlike every other factory workflow): it authenticates NOT as
# the powerful broker SA (main-locked) but as the minimal, sandbox-only sandbox-tester-sa on
# factory-test-25, via the dedicated github-sandbox-provider whose CEL allows the factory repo
# on ANY ref. Even if a branch were hostile, that identity can only read the per-test
# github-app-* secrets and reach one throwaway test repo — no control project, no real system,
# no broker. See devplans/prove-before-merge.md + scripts/bootstrap-sandbox-tester.sh.
#
# GitHub constraint: a workflow_dispatch workflow must exist on the DEFAULT branch before it
# can be dispatched for ANY ref; once it does, dispatching for a branch ref runs THAT branch's
# version of this file. So this skeleton lands on main first (Stage 2); its full apply body is
# developed and proven from a branch (Stage 3).
#
# Stage 2 (this file): the dispatch interface + sandbox WIF auth + an identity echo that proves
# the run is the sandbox SA (never the broker). The apply/prove body is Stage 3.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: "Existing live TEST system repo to apply the branch's change to (e.g. factory-test-30)."
        required: true
        type: string
      paths:
        description: "Comma-separated template subpaths under templates/system/ to apply from THIS branch (file or dir; e.g. 'workflows/n8n' or 'Caddyfile,workflows/n8n'). Default: the agent-workflow JSONs."
        required: false
        default: "workflows/n8n"
        type: string
      post_apply_workflow:
        description: "System workflow to dispatch after applying, to take the change live (e.g. configure-agent-router.yml, deploy-railway-cloudflare.yml). Empty to skip."
        required: false
        default: "configure-agent-router.yml"
        type: string

concurrency:
  # Serialize every factory run that acts on one live system into a FIFO queue (shared
  # `live-system-<system>` group with refresh / e2e-verify / deploy-verify), so two
  # parallel developments never overwrite each other on the same system. queue:max keeps
  # up to 100 runs queued and REQUIRES cancel-in-progress:false.
  group: live-system-${{ inputs.system_name }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  prove:
    name: Apply a branch change to a live test system and prove it
    runs-on: ubuntu-latest
    environment: production
    # NO `if: github.ref == 'refs/heads/main'` — this workflow is meant to run off a work
    # branch. Its safety comes from the sandbox identity (below), not from a ref guard.
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      # The sandbox "toy key": minimal SA on factory-test-25, reached via a dedicated provider
      # whose CEL allows the factory repo on ANY ref. NOT the broker. (factory-test-25 == 522447289560)
      SANDBOX_WIF_PROVIDER: "projects/522447289560/locations/global/workloadIdentityPools/sandbox-pool/providers/github-sandbox-provider"
      SANDBOX_SA: "sandbox-tester-sa@factory-test-25.iam.gserviceaccount.com"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Validate system_name (refuse control/factory/real targets)
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          echo "$SYSTEM_NAME" | grep -qE '^[a-z][a-z0-9-]{4,28}[a-z0-9]$' \
            || { echo "FAIL: system_name '$SYSTEM_NAME' must match ^[a-z][a-z0-9-]{4,28}[a-z0-9]\$" >&2; exit 1; }
          # HARD refuse: never target the factory itself, a control/master project, or anything
          # that isn't a throwaway TEST system. The sandbox identity can only reach test repos
          # in practice, but fail loud and early on an obvious mistake.
          case "$SYSTEM_NAME" in
            or-factory-master|or-factory-master-control|factory|factory-control-*|*-control)
              echo "FAIL: refusing to target control/factory repo '$SYSTEM_NAME'" >&2; exit 1 ;;
          esac
          echo "OK: target edri2or/${SYSTEM_NAME} (ref: ${GITHUB_REF})"

      - name: Authenticate to GCP as the SANDBOX identity (not the broker)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.SANDBOX_WIF_PROVIDER }}
          service_account: ${{ env.SANDBOX_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Confirm identity, apply the branch's change to the live test system, prove it
        id: apply
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
          PATHS: ${{ inputs.paths }}
          POST_APPLY_WORKFLOW: ${{ inputs.post_apply_workflow }}
          SANDBOX_PROJECT: "factory-test-25"
          RUN_ID: ${{ github.run_id }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          # --- 0) Hard identity guard: this MUST be the sandbox SA, never the broker ---
          ACTIVE=$(gcloud auth list --filter=status:ACTIVE --format="value(account)" 2>/dev/null || true)
          echo "Active credential: ${ACTIVE:-<none>}"
          case "$ACTIVE" in
            *factory-master-broker*)
              echo "FAIL: authenticated as the BROKER — this workflow must use the sandbox SA only." >&2; exit 1 ;;
            sandbox-tester-sa@factory-test-25.iam.gserviceaccount.com)
              echo "PASS: running as the sandbox toy-key identity (${ACTIVE})." ;;
            *)
              echo "FAIL: unexpected active identity '${ACTIVE}' — refusing to continue." >&2; exit 1 ;;
          esac

          # --- 1) Mint a token for the TEST repo from its OWN App creds in the shared SM ---
          # The sandbox SA can read ONLY github-app-* in factory-test-25 (conditioned grant).
          # The per-system App is installed on just edri2or/$SYSTEM_NAME, so the minted token is
          # inherently repo-scoped — it cannot touch any other repo.
          APP_ID=$(gcloud secrets versions access latest --secret=github-app-id --project="$SANDBOX_PROJECT" 2>/dev/null || true)
          INSTALL_ID=$(gcloud secrets versions access latest --secret=github-app-installation-id --project="$SANDBOX_PROJECT" 2>/dev/null || true)
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          gcloud secrets versions access latest --secret=github-app-private-key --project="$SANDBOX_PROJECT" > /tmp/test-app-key.pem 2>/dev/null || true
          TOKEN=""
          # workflows:write is required to push a change to a .github/workflows/* file
          # (GitHub refuses an App push that touches a workflow file without it) — needed
          # to prove changes to the system's own deploy/CI workflows, not just n8n JSONs.
          # The per-system App already holds workflows:write on this one repo (register-system-app).
          if [ -s /tmp/test-app-key.pem ] && [ -n "$APP_ID" ] && [ -n "$INSTALL_ID" ]; then
            TOKEN=$(bash scripts/generate-app-token.sh /tmp/test-app-key.pem "$APP_ID" "$INSTALL_ID" "" \
              '{"contents":"write","pull_requests":"write","actions":"write","workflows":"write"}' "[\"$SYSTEM_NAME\"]" 2>/dev/null || true)
          fi
          shred -u /tmp/test-app-key.pem 2>/dev/null || rm -f /tmp/test-app-key.pem
          [ -n "$TOKEN" ] || { echo "FAIL: could not mint a test-repo token — are github-app-* present in ${SANDBOX_PROJECT} and is the App installed on edri2or/${SYSTEM_NAME}?" >&2; exit 1; }
          echo "::add-mask::$TOKEN"
          export GH_TOKEN="$TOKEN"

          # --- 2) Clone the test repo (shallow), one-shot auth in the URL only ---
          rm -rf sys-target
          if ! git clone --depth 1 \
               "https://x-access-token:${TOKEN}@github.com/edri2or/${SYSTEM_NAME}.git" sys-target 2>/dev/null; then
            echo "FAIL: could not clone edri2or/${SYSTEM_NAME} (provisioned? App scoped to it?)" >&2; exit 1
          fi

          # --- 3) Copy THIS BRANCH's templates/system/<paths> into the test repo ---
          # The workflow runs on the work branch, so templates/system here is the BRANCH version —
          # exactly the unmerged change we want to prove live.
          git -C sys-target config user.name "or-factory-master[bot]"
          git -C sys-target config user.email "sandbox-tester-sa@factory-test-25.iam.gserviceaccount.com"
          IFS=',' read -ra SYNC_PATHS <<< "${PATHS:-workflows/n8n}"
          for raw in "${SYNC_PATHS[@]}"; do
            p="${raw// /}"; [ -n "$p" ] || continue
            case "$p" in
              /*|*..*) echo "FAIL: path '$p' must be relative under templates/system/ (no leading / and no '..')" >&2; exit 1 ;;
            esac
            src="templates/system/${p}"
            [ -e "$src" ] || { echo "FAIL: ${src} not found on this branch" >&2; exit 1; }
            dest_parent="sys-target/$(dirname "$p")"
            mkdir -p "$dest_parent"
            cp -r "$src" "$dest_parent/"
            git -C sys-target add "$p"
            echo "INFO: staged templates/system/${p} -> ${p} (from ${SOURCE_REF})"
          done

          # --- 4) If something changed, go through the SAME PR + CI gate as production ---
          # The test repo protects main (PR + green CI). The per-test App token holds
          # pull_requests:write + contents:write, so the sandbox path can open + merge its
          # own PR (0 approvals) without ever bypassing CI. NOTE: the App has no checks:read,
          # so we DON'T read check status (`gh pr checks` / GraphQL statusCheckRollup fails
          # with "Resource not accessible by integration"). Instead we retry the protected
          # merge: the merge endpoint refuses until the required checks are green, so a
          # successful merge IS the CI gate — no extra permission needed.
          if git -C sys-target diff --cached --quiet; then
            echo "INFO: edri2or/${SYSTEM_NAME} already matches this branch — nothing to apply."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            BRANCH="prove-${RUN_ID}"
            DATE_UTC=$(date -u +%Y-%m-%d)
            mkdir -p sys-target/changelog.d
            {
              echo "### Prove a branch change on this live test system"
              echo
              echo "- Applied \`${PATHS}\` from or-factory-master@${SOURCE_REF} via prove-on-test-system.yml (run ${RUN_ID})."
            } > "sys-target/changelog.d/${DATE_UTC}-prove-${RUN_ID}.md"
            git -C sys-target add changelog.d
            git -C sys-target checkout -q -b "$BRANCH"
            git -C sys-target commit -q -m "ci: prove branch change (${PATHS}) from or-factory-master@${SOURCE_REF}"
            if ! perr=$(git -C sys-target push "https://x-access-token:${TOKEN}@github.com/edri2or/${SYSTEM_NAME}.git" "$BRANCH:$BRANCH" 2>&1); then
              echo "FAIL: push branch failed: $(printf '%s' "$perr" | sed "s/${TOKEN}/***/g")" >&2; exit 1
            fi
            PR_URL=$(gh pr create --repo "edri2or/${SYSTEM_NAME}" --base main --head "$BRANCH" \
              --title "ci: prove branch change (${PATHS}) from or-factory-master@${SOURCE_REF}" \
              --body "Automated by prove-on-test-system.yml (run ${RUN_ID}) — applying a work-branch change to this live test system through the normal PR+CI gate.") \
              || { echo "FAIL: gh pr create failed for edri2or/${SYSTEM_NAME}" >&2; exit 1; }
            echo "INFO: opened ${PR_URL}"
            PR_NUM="${PR_URL##*/}"
            # Retry the protected merge until the test repo's required CI is green (branch
            # protection refuses the merge otherwise). Raw REST PUT — avoids gh's GraphQL
            # mergeStateStatus query, which needs checks:read the App doesn't have.
            merged=""
            for i in $(seq 1 40); do
              if out=$(gh api --method PUT \
                   "/repos/edri2or/${SYSTEM_NAME}/pulls/${PR_NUM}/merge" \
                   -f merge_method=squash 2>&1); then
                merged=1; break
              fi
              if printf '%s' "$out" | grep -qiE "required status check|not mergeable|Base branch was modified|expected|405|409|pending"; then
                echo "INFO: waiting for test-system CI before merge (attempt ${i}/40)..."
                sleep 15; continue
              fi
              echo "FAIL: merge failed: $(printf '%s' "$out" | sed "s/${TOKEN}/***/g")" >&2; exit 1
            done
            [ -n "$merged" ] || { echo "FAIL: test-system CI not green within timeout — PR ${PR_URL} left open." >&2; exit 1; }
            # Best-effort branch cleanup (contents:write); ignore failure.
            gh api --method DELETE "/repos/edri2or/${SYSTEM_NAME}/git/refs/heads/${BRANCH}" >/dev/null 2>&1 || true
            echo "PASS: merged the branch change into edri2or/${SYSTEM_NAME}:main (CI gate satisfied)"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          # --- 5) Apply live via the test system's own workflow (after merge) ---
          if [ -n "${POST_APPLY_WORKFLOW:-}" ]; then
            if gh workflow run "$POST_APPLY_WORKFLOW" --repo "edri2or/${SYSTEM_NAME}" --ref main 2>/dev/null; then
              echo "PASS: dispatched ${POST_APPLY_WORKFLOW} on edri2or/${SYSTEM_NAME} — watch it + probe the live system to confirm."
            else
              echo "WARN: could not dispatch ${POST_APPLY_WORKFLOW} — dispatch it manually to apply live." >&2
            fi
          else
            echo "INFO: no post_apply_workflow — change is merged to the test repo's main; apply/verify live as needed."
          fi
