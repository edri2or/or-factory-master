name: Prove on Test System (branch-runnable, sandbox identity)

# "prove -> merge": apply a WORK-BRANCH's change to an already-standing live test system and
# prove it live, BEFORE the change is merged to main. The branch-runnable, sandbox-scoped twin
# of refresh-system-agents.yml.
#
# Why it can run off a branch (unlike every other factory workflow): it authenticates NOT as
# the powerful broker SA (main-locked) but as the minimal, sandbox-only sandbox-tester-sa on
# factory-test-25, via the dedicated github-sandbox-provider whose CEL allows the factory repo
# on ANY ref. Even if a branch were hostile, that identity can only read the per-test
# github-app-* secrets and reach one throwaway test repo — no control project, no real system,
# no broker. See devplans/prove-before-merge.md + scripts/bootstrap-sandbox-tester.sh.
#
# GitHub constraint: a workflow_dispatch workflow must exist on the DEFAULT branch before it
# can be dispatched for ANY ref; once it does, dispatching for a branch ref runs THAT branch's
# version of this file. So this skeleton lands on main first (Stage 2); its full apply body is
# developed and proven from a branch (Stage 3).
#
# Stage 2 (this file): the dispatch interface + sandbox WIF auth + an identity echo that proves
# the run is the sandbox SA (never the broker). The apply/prove body is Stage 3.

on:
  workflow_dispatch:
    inputs:
      system_name:
        description: "Existing live TEST system repo to apply the branch's change to (e.g. factory-test-30)."
        required: true
        type: string
      paths:
        description: "Comma-separated template subpaths under templates/system/ to apply from THIS branch (file or dir; e.g. 'workflows/n8n' or 'Caddyfile,workflows/n8n'). Default: the agent-workflow JSONs."
        required: false
        default: "workflows/n8n"
        type: string
      post_apply_workflow:
        description: "System workflow to dispatch after applying, to take the change live (e.g. configure-agent-router.yml, deploy-railway-cloudflare.yml). Empty to skip."
        required: false
        default: "configure-agent-router.yml"
        type: string

permissions: {}

jobs:
  prove:
    name: Apply a branch change to a live test system and prove it
    runs-on: ubuntu-latest
    environment: production
    # NO `if: github.ref == 'refs/heads/main'` — this workflow is meant to run off a work
    # branch. Its safety comes from the sandbox identity (below), not from a ref guard.
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      # The sandbox "toy key": minimal SA on factory-test-25, reached via a dedicated provider
      # whose CEL allows the factory repo on ANY ref. NOT the broker. (factory-test-25 == 522447289560)
      SANDBOX_WIF_PROVIDER: "projects/522447289560/locations/global/workloadIdentityPools/sandbox-pool/providers/github-sandbox-provider"
      SANDBOX_SA: "sandbox-tester-sa@factory-test-25.iam.gserviceaccount.com"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Validate system_name (refuse control/factory/real targets)
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          echo "$SYSTEM_NAME" | grep -qE '^[a-z][a-z0-9-]{4,28}[a-z0-9]$' \
            || { echo "FAIL: system_name '$SYSTEM_NAME' must match ^[a-z][a-z0-9-]{4,28}[a-z0-9]\$" >&2; exit 1; }
          # HARD refuse: never target the factory itself, a control/master project, or anything
          # that isn't a throwaway TEST system. The sandbox identity can only reach test repos
          # in practice, but fail loud and early on an obvious mistake.
          case "$SYSTEM_NAME" in
            or-factory-master|or-factory-master-control|factory|factory-control-*|*-control)
              echo "FAIL: refusing to target control/factory repo '$SYSTEM_NAME'" >&2; exit 1 ;;
          esac
          echo "OK: target edri2or/${SYSTEM_NAME} (ref: ${GITHUB_REF})"

      - name: Authenticate to GCP as the SANDBOX identity (not the broker)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.SANDBOX_WIF_PROVIDER }}
          service_account: ${{ env.SANDBOX_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Confirm identity (must be the sandbox SA, never the broker)
        run: |
          set -euo pipefail
          ACTIVE=$(gcloud auth list --filter=status:ACTIVE --format="value(account)" 2>/dev/null || true)
          echo "Active credential: ${ACTIVE:-<none>}"
          case "$ACTIVE" in
            *factory-master-broker*)
              echo "FAIL: authenticated as the BROKER — this workflow must use the sandbox SA only." >&2
              exit 1 ;;
            sandbox-tester-sa@factory-test-25.iam.gserviceaccount.com)
              echo "PASS: running as the sandbox toy-key identity (${ACTIVE})." ;;
            *)
              echo "WARN: unexpected active identity '${ACTIVE}' — review before trusting the run." >&2 ;;
          esac
          echo "Skeleton OK. The apply/prove body (mint test-repo token from factory-test-25 SM," \
               "push templates/system/<paths> from this branch into edri2or/${SYSTEM_NAME}, and" \
               "dispatch the post_apply_workflow) lands in Stage 3."
