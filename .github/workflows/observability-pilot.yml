name: Observability Pilot (emit one event)

# Manual smoke test for the observability foundation. Emits a single
# factory.pilot.test event through scripts/emit-event.sh, which fans out
# (soft-fail) to Axiom + Telegram + Linear depending on severity. Isolated:
# touches no real system, dispatches nothing else.

on:
  workflow_dispatch:
    inputs:
      severity:
        description: "Event severity (info|warning|error|critical)"
        required: false
        type: string
        default: "info"
      action_required:
        description: "Set action_required=true on the event (forces a Linear issue)"
        required: false
        type: boolean
        default: false
      system_name:
        description: "Optional factory.system_name (leave empty for a control-plane event)"
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  pilot-emit:
    name: Emit pilot event
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Emit pilot event
        env:
          # Inputs flow through env (never interpolated into the script line)
          # so a crafted input value can't inject shell.
          SEVERITY: ${{ inputs.severity }}
          ACTION_REQUIRED: ${{ inputs.action_required }}
          SYSTEM_NAME: ${{ inputs.system_name }}
          WF: "observability-pilot.yml"
          RID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          bash scripts/emit-event.sh \
            --name="factory.pilot.test" \
            --severity="${SEVERITY}" \
            --layer="factory" \
            --workflow="${WF}" \
            --run-id="${RID}" \
            --system="${SYSTEM_NAME}" \
            --action-required="${ACTION_REQUIRED}" \
            --body='{"reason":"observability-pilot smoke test","pilot":true}'

      - name: Summary
        if: always()
        env:
          SEVERITY: ${{ inputs.severity }}
          ACTION_REQUIRED: ${{ inputs.action_required }}
          SYSTEM_NAME: ${{ inputs.system_name }}
          RID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          {
            echo "## פיילוט Observability — סיכום"
            echo ""
            echo "נפלט אירוע factory.pilot.test עם הפרמטרים:"
            echo ""
            echo "| שדה | ערך |"
            echo "|---|---|"
            echo "| severity | ${SEVERITY} |"
            echo "| action_required | ${ACTION_REQUIRED} |"
            echo "| system_name | ${SYSTEM_NAME:-(ריק)} |"
            echo "| run_id | ${RID} |"
            echo ""
            echo "### מה לאמת"
            echo '- **Axiom**: ב-dataset `factory-events`, חפש `otel.event.name == "factory.pilot.test"` בשעה האחרונה (תמיד נשלח).'
            echo '- **Telegram**: הודעה אמורה להגיע רק אם severity הוא warning / error / critical.'
            echo '- **Linear**: issue אמור להיווצר רק אם severity הוא error / critical, או אם action_required=true.'
            echo '- **לוג מובנה**: הרץ `read_github_actions_run_logs` עם grep על שורות `[event]` כדי לראות את שורת ה-safety-net ואת תוצאת כל יעד.'
          } >> "$GITHUB_STEP_SUMMARY"
