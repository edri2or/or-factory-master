name: Set factory branch protection (one-shot)

# One-time helper. Puts branch protection on or-factory-master/main so the 4 CI
# checks are REQUIRED before any merge — for everyone, including the OIL
# auto-fix approver App. The Stage-4 live test revealed main had NO protection,
# so the approver merged a red-CI PR; this is the platform-level half of the
# fix (the MCP approver arms native auto-merge, which only completes once these
# required checks pass). Also enables repo auto-merge so the approver's
# enablePullRequestAutoMerge works.
#
# enforce_admins:true = "do not allow bypassing the above settings" — even
# admins / the broker / the approver cannot merge red CI. (GitHub Apps already
# cannot bypass required status checks; this also covers human admins.)
#
# Idempotent (PUT replaces the rule each run). NOT on the dispatch_workflow
# allowlist — the operator dispatches it once from the GitHub UI. Verify after
# with the MCP `list_branch_protection_rules`.

on:
  workflow_dispatch:

permissions: {}

jobs:
  protect:
    name: Set branch protection on or-factory-master/main
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: "or-factory-master-control"
      WIF_PROVIDER: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      BROKER_SA: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"
      TARGET_REPO: "or-factory-master"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BROKER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Set branch protection + enable auto-merge
        run: |
          set -euo pipefail
          # Mint a broker App token scoped to administration:write on the factory
          # repo only (least privilege). The broker is installed org-wide and sets
          # branch protection on every system repo, so it has administration:write.
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$GCP_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$GCP_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$GCP_PROJECT" > /tmp/bp-key.pem
          chmod 600 /tmp/bp-key.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"
          TOKEN=$(bash scripts/generate-app-token.sh /tmp/bp-key.pem "$APP_ID" "$INSTALL_ID" "" '{"administration":"write"}' "[\"$TARGET_REPO\"]")
          shred -u /tmp/bp-key.pem 2>/dev/null || rm -f /tmp/bp-key.pem
          [ -n "$TOKEN" ] || { echo "::error::could not mint broker token"; exit 1; }
          echo "::add-mask::$TOKEN"

          # Same shape as provision-system.yml's per-system branch protection, but
          # enforce_admins:true (no bypass) for the control repo. strict:true keeps
          # PR branches up to date with main before merge.
          BODY=$(jq -cn '{
            required_status_checks: {
              strict: true,
              contexts: [
                "Changelog gates",
                "shellcheck + yamllint",
                "Scan for committed secrets",
                "Supply chain gates"
              ]
            },
            enforce_admins: true,
            required_pull_request_reviews: {
              required_approving_review_count: 0,
              dismiss_stale_reviews: false
            },
            restrictions: null,
            allow_force_pushes: false,
            allow_deletions: false
          }')
          code=$(curl -sS -o /tmp/bp.json -w '%{http_code}' -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${TARGET_REPO}/branches/main/protection" \
            -d "$BODY")
          echo "PUT branch protection -> HTTP ${code}"
          [ "$code" = "200" ] || { echo "::error::branch protection HTTP ${code}: $(head -c 400 /tmp/bp.json)"; exit 1; }

          # Enable repo-level auto-merge so the approver's enablePullRequestAutoMerge works.
          acode=$(curl -sS -o /tmp/am.json -w '%{http_code}' -X PATCH \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${TARGET_REPO}" \
            -d '{"allow_auto_merge": true}')
          echo "PATCH allow_auto_merge -> HTTP ${acode}"
          [ "$acode" = "200" ] || { echo "::error::allow_auto_merge HTTP ${acode}: $(head -c 400 /tmp/am.json)"; exit 1; }

          rm -f /tmp/bp.json /tmp/am.json
          {
            echo "## ✅ Branch protection set on \`${TARGET_REPO}/main\`"
            echo ""
            echo "- Required checks: \`Changelog gates\`, \`shellcheck + yamllint\`, \`Scan for committed secrets\`, \`Supply chain gates\`"
            echo "- \`enforce_admins: true\` (no bypass) · PR required (0 approvals) · no force-push/deletion · \`strict: true\`"
            echo "- \`allow_auto_merge: true\` (lets the OIL approver arm native auto-merge)"
            echo ""
            echo "From now, every merge to main needs a PR with the 4 checks green — including the OIL approver."
          } >> "$GITHUB_STEP_SUMMARY"
