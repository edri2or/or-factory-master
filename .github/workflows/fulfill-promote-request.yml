name: Fulfill Promote Request (broker-side, human-gated)

# The broker side of the REVERSE channel (system -> factory template). A system
# RAISES a `promote` request via scripts/emit-event.sh -> a Linear ticket; the
# MCP triage dispatches THIS workflow (system-request.ts routes `promote` here,
# not to fulfill-system-request.yml). Two phases:
#
#   phase=register : validate the request (scripts/validate-system-request.sh)
#                    then ask the MCP to send Or one Telegram approval card.
#                    Creates NOTHING.
#   phase=fulfill  : (dispatched by the MCP only after Or taps ✅) fetch the doc
#                    from the requesting system's repo, write it under
#                    templates/system/<target_path>, refresh the golden, add a
#                    changelog fragment + a devplan stub, and open a DRAFT PR on
#                    or-factory-master. The PR is Or's to review + merge; the
#                    factory's own CI gates run on it. Nothing lands in the
#                    template until Or merges.
#
# MVP: docs-only (.md/.txt) — enforced by validate-system-request.sh. The system
# itself cannot write to the factory (its App is locked to its own repo); the
# broker performs the promote, after Or's ✅, and the draft PR is double-gated by
# Or's merge. NOT on the dispatch_workflow allowlist (approval-path only, like
# fulfill-system-request.yml).

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "register (send approval card) | fulfill (open the draft PR, post-approval)"
        required: true
        type: string
      request_type:
        description: "promote"
        required: true
        type: string
      system_name:
        description: "The system repo the artifact is promoted FROM."
        required: true
        type: string
      source_path:
        description: "Path of the doc in the system repo (relative; .md/.txt)."
        required: false
        type: string
        default: ""
      target_path:
        description: "Destination under templates/system/ (relative; .md/.txt)."
        required: false
        type: string
        default: ""
      issue_id:
        description: "The Linear issue identifier the request came from."
        required: false
        type: string
        default: ""
      reason:
        description: "Free-text reason from the requesting system (shown on the card + PR)."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  fulfill:
    name: Fulfill promote request
    runs-on: ubuntu-latest
    environment: production
    # Broker WIF CEL pins ref=refs/heads/main; running off other branches fails to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # WIF OIDC token

    env:
      CONTROL_PROJECT: or-factory-master-control
      MCP_URL: https://factory-master-actions-mcp-140345952904.me-west1.run.app

    steps:
      - name: Checkout (the factory template tree)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # Do NOT persist the default GITHUB_TOKEN in git config — it embeds an
          # Authorization extraheader for github.com that overrides the broker
          # App token we inject in the push URL, so the branch push would fail.
          persist-credentials: false

      - name: Validate inputs
        env:
          PHASE: ${{ inputs.phase }}
          REQUEST_TYPE: ${{ inputs.request_type }}
          SYSTEM_NAME: ${{ inputs.system_name }}
        run: |
          set -euo pipefail
          case "$PHASE" in
            register|fulfill) ;;
            *) echo "FAIL: phase must be 'register' or 'fulfill' (got '$PHASE')" >&2; exit 1 ;;
          esac
          [ "$REQUEST_TYPE" = "promote" ] || { echo "FAIL: this workflow only handles request_type=promote" >&2; exit 1; }
          if ! [[ "$SYSTEM_NAME" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "FAIL: system_name '$SYSTEM_NAME' is not a valid system name" >&2; exit 1
          fi

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: "projects/140345952904/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "factory-master-broker@or-factory-master-control.iam.gserviceaccount.com"

      - name: Validate request (deterministic gate)
        env:
          REQUEST_TYPE: ${{ inputs.request_type }}
          SYSTEM_NAME: ${{ inputs.system_name }}
          SOURCE_PATH: ${{ inputs.source_path }}
          TARGET_PATH: ${{ inputs.target_path }}
        run: |
          set -euo pipefail
          out=$(bash scripts/validate-system-request.sh) || { echo "$out"; echo "Gate refused — aborting." >&2; exit 1; }
          printf '%s\n' "$out"

      # ---- register phase: ask the MCP to send the Telegram approval card -------
      - name: Send Telegram approval card (register phase)
        if: inputs.phase == 'register'
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
          SOURCE_PATH: ${{ inputs.source_path }}
          TARGET_PATH: ${{ inputs.target_path }}
          ISSUE_ID: ${{ inputs.issue_id }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          MCP_ADMIN=$(gcloud secrets versions access latest --secret=mcp-server-admin-secret --project="$CONTROL_PROJECT" | tr -d '\r\n')
          echo "::add-mask::$MCP_ADMIN"
          REQ=$(jq -cn \
            --arg sys "$SYSTEM_NAME" --arg src "$SOURCE_PATH" --arg tgt "$TARGET_PATH" \
            --arg issue "$ISSUE_ID" --arg reason "$REASON" \
            '{request_type:"promote", system_name:$sys, gcp_project:"", source_path:$src, target_path:$tgt, issue_id:$issue, reason:$reason}')
          CODE=$(curl -sS -m 30 -o /tmp/fpr-reg.body -w '%{http_code}' \
            -X POST "${MCP_URL}/system-request-register" \
            -H "X-Admin-Secret: ${MCP_ADMIN}" \
            -H "Content-Type: application/json" \
            --data "$REQ" || echo "000")
          echo "POST /system-request-register -> HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            echo "FAIL: could not send approval card (HTTP ${CODE}): $(jq -r '.error // empty' /tmp/fpr-reg.body 2>/dev/null || true)" >&2
            rm -f /tmp/fpr-reg.body; exit 1
          fi
          rm -f /tmp/fpr-reg.body
          echo "PASS: approval card sent to Telegram (awaiting Or's ✅)."

      # ---- fulfill phase: open the draft PR on the factory ----------------------
      - name: Open the promote draft PR (fulfill phase)
        if: inputs.phase == 'fulfill'
        id: openpr
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
          SOURCE_PATH: ${{ inputs.source_path }}
          TARGET_PATH: ${{ inputs.target_path }}
          ISSUE_ID: ${{ inputs.issue_id }}
          REASON: ${{ inputs.reason }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # Broker App creds (control SM) — used to mint two narrowly-scoped tokens.
          APP_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-id --project="$CONTROL_PROJECT")
          INSTALL_ID=$(gcloud secrets versions access latest --secret=factory-master-broker-app-installation-id --project="$CONTROL_PROJECT")
          gcloud secrets versions access latest --secret=factory-master-broker-app-private-key --project="$CONTROL_PROJECT" > /tmp/fpr-key.pem
          echo "::add-mask::$APP_ID"; echo "::add-mask::$INSTALL_ID"

          # Token A — read-only on the SYSTEM repo, to fetch the source doc.
          READ_TOKEN=$(bash scripts/generate-app-token.sh /tmp/fpr-key.pem "$APP_ID" "$INSTALL_ID" '' '{"contents":"read"}' "[\"${SYSTEM_NAME}\"]")
          echo "::add-mask::$READ_TOKEN"
          RESP=$(curl -sS -m 30 -w $'\n%{http_code}' \
            -H "Authorization: Bearer ${READ_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/${SYSTEM_NAME}/contents/${SOURCE_PATH}")
          HTTP=$(printf '%s' "$RESP" | tail -1)
          if [ "$HTTP" != "200" ]; then
            echo "FAIL: could not read edri2or/${SYSTEM_NAME}/${SOURCE_PATH} (HTTP ${HTTP})" >&2; exit 1
          fi
          # Decode the base64 content into the destination under templates/system/.
          mkdir -p "$(dirname "$TARGET_PATH")"
          printf '%s' "$RESP" | sed '$d' | jq -r '.content' | base64 -d > "$TARGET_PATH"
          [ -s "$TARGET_PATH" ] || { echo "FAIL: fetched doc is empty" >&2; exit 1; }
          echo "PASS: wrote $(wc -c < "$TARGET_PATH") bytes to $TARGET_PATH"

          # Refresh the golden so the templates/system change satisfies the golden gates.
          bash scripts/check-system-golden.sh --update
          echo "PASS: golden refreshed"

          # A dated changelog fragment + a completed devplan stub (record + CI-safe).
          DATESTR=$(date -u +%Y-%m-%d)
          SLUG=$(printf 'promote-%s' "$SYSTEM_NAME" | tr -cd 'a-z0-9-')
          FRAG="changelog.d/${DATESTR}-${SLUG}-$(printf '%s' "$RUN_ID" | tail -c 6).md"
          {
            echo "## ${DATESTR} — promote: \`${SOURCE_PATH}\` from ${SYSTEM_NAME} → \`${TARGET_PATH}\`"
            echo ""
            echo "Reverse channel (\`promote\`): a doc developed in \`${SYSTEM_NAME}\` was promoted UP into the"
            echo "factory template via a broker-opened draft PR, after Or's Telegram ✅. Reason: ${REASON:-n/a}."
            echo "Golden refreshed. Or reviews + merges (or closes) the draft PR."
          } > "$FRAG"
          DEV="devplans/${SLUG}-$(printf '%s' "$RUN_ID" | tail -c 6).md"
          {
            echo "---"
            echo "dev_name: קידום מסמך מ-${SYSTEM_NAME} לתבנית"
            echo "slug: ${SLUG}-record"
            echo "opened: ${DATESTR}"
            echo "status: completed"
            echo "---"
            echo ""
            echo "# קידום \`${SOURCE_PATH}\` מ-${SYSTEM_NAME} → \`${TARGET_PATH}\`"
            echo ""
            echo "רשומת promote אוטומטית (ערוץ הפוך). המסמך נמשך מהריפו של המערכת ונפתח כ-PR-טיוטה בפקטורי,"
            echo "אחרי אישור טלגרם של Or. סגירה = מיזוג/סגירה של ה-PR ע\"י Or."
          } > "$DEV"

          BRANCH="promote/${SLUG}-$(printf '%s' "$RUN_ID" | tail -c 6)"
          git checkout -q -b "$BRANCH"
          git -c user.email="factory-master-broker[bot]@users.noreply.github.com" \
              -c user.name="factory-master-broker[bot]" \
              -c commit.gpgsign=false \
              add -A
          git -c user.email="factory-master-broker[bot]@users.noreply.github.com" \
              -c user.name="factory-master-broker[bot]" \
              -c commit.gpgsign=false \
              commit -q -m "promote: ${SOURCE_PATH} from ${SYSTEM_NAME} -> ${TARGET_PATH} (${ISSUE_ID:-promote})"

          # Token B — write on the FACTORY repo, to push the branch + open the PR.
          WRITE_TOKEN=$(bash scripts/generate-app-token.sh /tmp/fpr-key.pem "$APP_ID" "$INSTALL_ID" '' '{"contents":"write","pull_requests":"write"}' '["or-factory-master"]')
          echo "::add-mask::$WRITE_TOKEN"
          rm -f /tmp/fpr-key.pem
          if ! PUSH_ERR=$(git push "https://x-access-token:${WRITE_TOKEN}@github.com/edri2or/or-factory-master.git" "$BRANCH:$BRANCH" 2>&1); then
            # Scrub the token from any echoed remote URL before surfacing the error.
            echo "FAIL: could not push promote branch:" >&2
            printf '%s\n' "$PUSH_ERR" | sed "s/${WRITE_TOKEN}/***/g" >&2
            exit 1
          fi
          BODY=$(printf 'Reverse-channel **promote** (system → factory template) for **%s**, after Or'"'"'s Telegram ✅.\n\n**Source:** `edri2or/%s:%s`\n**Target:** `%s`\n**Reason:** %s\n\n:warning: DRAFT — Or reviews + merges (or closes). Nothing lands in the template unless merged. MVP is docs-only; the golden was refreshed here. The factory CI gates run on this PR as usual.' \
            "${SYSTEM_NAME}" "${SYSTEM_NAME}" "${SOURCE_PATH}" "${TARGET_PATH}" "${REASON:-n/a}")
          PR_JSON=$(jq -cn --arg t "promote: ${SOURCE_PATH} from ${SYSTEM_NAME}" --arg h "$BRANCH" --arg b "$BODY" \
            '{title:$t, head:$h, base:"main", body:$b, draft:true}')
          PR_RESP=$(curl -sS -m 30 -X POST \
            -H "Authorization: Bearer ${WRITE_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/edri2or/or-factory-master/pulls" \
            -d "$PR_JSON" 2>/dev/null || true)
          PR_URL=$(printf '%s' "$PR_RESP" | jq -r '.html_url // empty' 2>/dev/null || true)
          PR_NUMBER=$(printf '%s' "$PR_RESP" | jq -r '.number // empty' 2>/dev/null || true)
          if [ -z "$PR_URL" ]; then
            echo "FAIL: PR creation failed: $(printf '%s' "$PR_RESP" | jq -r '.message // "unknown"' 2>/dev/null || echo unknown)" >&2
            exit 1
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "PASS: opened promote draft PR: $PR_URL"

      - name: Audit + notify (fulfill phase)
        if: inputs.phase == 'fulfill' && success()
        continue-on-error: true
        env:
          SYSTEM_NAME: ${{ inputs.system_name }}
          SOURCE_PATH: ${{ inputs.source_path }}
          TARGET_PATH: ${{ inputs.target_path }}
          ISSUE_ID: ${{ inputs.issue_id }}
          PR_URL: ${{ steps.openpr.outputs.pr_url }}
        run: |
          set -uo pipefail
          bash scripts/emit-event.sh \
            --name="factory.system_request.promoted" \
            --severity="info" --layer="factory" \
            --workflow="fulfill-promote-request.yml" --run-id="${GITHUB_RUN_ID}" \
            --system="${SYSTEM_NAME}" \
            --body="$(jq -cn --arg s "$SOURCE_PATH" --arg t "$TARGET_PATH" --arg u "${PR_URL:-}" '{source:$s, target:$t, pr_url:$u}')" || true

          BOT=$(gcloud secrets versions access latest --secret=telegram-bot-token --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          CHAT=$(gcloud secrets versions access latest --secret=telegram-chat-id --project="$CONTROL_PROJECT" 2>/dev/null | tr -d '\r\n' || true)
          if [ -n "$BOT" ] && [ -n "$CHAT" ]; then
            echo "::add-mask::$BOT"
            MSG="✅ נפתח PR-טיוטה לקידום \`${SOURCE_PATH}\` מ-${SYSTEM_NAME} → \`${TARGET_PATH}\`. לבדיקה ומיזוג: ${PR_URL:-}"
            curl -sS -m 20 -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              --data-urlencode "chat_id=${CHAT}" \
              --data-urlencode "text=${MSG}" >/dev/null || true
          fi
          echo "PASS: audit + notify done."
