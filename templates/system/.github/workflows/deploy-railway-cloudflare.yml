name: Deploy n8n on Railway + Cloudflare DNS

# Lives in every system repo; pushed by or-factory-master's provision-system.yml.
# Manual dispatch only. Creates/updates a Railway project (Postgres + n8n +
# persistent volume), sets n8n env vars, attaches a custom domain, and
# configures the matching Cloudflare CNAME. Idempotent: every step finds
# existing resources by name before creating.
#
# Reads from this repo's variables (set by the factory):
#   GCP_WIF_PROVIDER, GCP_DEPLOY_SA, GCP_PROJECT_ID, SYSTEM_NAME
# Reads from its own GCP Secret Manager:
#   railway-api-token, cloudflare-token-creator, cloudflare-zone-id-or-infra
# Generates/persists in its own SM on first run:
#   n8n-encryption-key, railway-project-id, railway-n8n-service-id,
#   railway-postgres-service-id

on:
  workflow_dispatch: {}

permissions: {}

env:
  N8N_IMAGE: n8nio/n8n:1.85.4
  RAILWAY_GQL: https://backboard.railway.com/graphql/v2
  CF_API: https://api.cloudflare.com/client/v4
  TIMEZONE: Asia/Jerusalem

jobs:
  deploy:
    name: Deploy n8n
    runs-on: ubuntu-latest
    # WIF CEL pins ref=refs/heads/main; running off other branches will fail to auth.
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # WIF OIDC token

    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Read API tokens from system SM
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          _sm_read() {
            local name="$1"
            gcloud secrets versions access latest \
              --secret="$name" --project="$PROJECT_ID" 2>/dev/null
          }

          RAILWAY_TOKEN=$(_sm_read "railway-api-token")
          [ -n "$RAILWAY_TOKEN" ] || { echo "FAIL: railway-api-token missing or empty in $PROJECT_ID SM" >&2; exit 1; }
          echo "::add-mask::${RAILWAY_TOKEN}"

          CF_TOKEN_CREATOR=$(_sm_read "cloudflare-token-creator")
          [ -n "$CF_TOKEN_CREATOR" ] || { echo "FAIL: cloudflare-token-creator missing or empty in $PROJECT_ID SM" >&2; exit 1; }
          echo "::add-mask::${CF_TOKEN_CREATOR}"

          CF_ZONE_ID=$(_sm_read "cloudflare-zone-id-or-infra")
          [ -n "$CF_ZONE_ID" ] || { echo "FAIL: cloudflare-zone-id-or-infra missing or empty in $PROJECT_ID SM" >&2; exit 1; }

          # Verify the creator token is alive (we'll use it to mint a child
          # DNS token in the Configure Cloudflare DNS step).
          resp=$(curl -sS -H "Authorization: Bearer ${CF_TOKEN_CREATOR}" "${CF_API}/user/tokens/verify")
          ok=$(printf '%s' "$resp" | jq -r '.success')
          [ "$ok" = "true" ] || { echo "FAIL: cloudflare token /user/tokens/verify: $resp" >&2; exit 1; }
          echo "PASS: cloudflare token-creator verified (will mint scoped DNS token at DNS step)."

          {
            echo "RAILWAY_TOKEN=${RAILWAY_TOKEN}"
            echo "CF_TOKEN_CREATOR=${CF_TOKEN_CREATOR}"
            echo "CF_ZONE_ID=${CF_ZONE_ID}"
          } >> "$GITHUB_ENV"

      - name: Resolve or generate n8n encryption key
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail
          # The shell is pre-created by provision-system.yml's
          # "Pre-create runtime secret shells" step. This step only adds
          # a version on first run, or reads the existing version on later
          # runs.
          SECRET="n8n-encryption-key"

          if N8N_KEY=$(gcloud secrets versions access latest \
                       --secret="$SECRET" --project="$PROJECT_ID" 2>/dev/null) \
             && [ -n "$N8N_KEY" ]; then
            echo "INFO: $SECRET already has a version — reusing existing key."
          else
            N8N_KEY=$(openssl rand -hex 32)
            printf '%s' "$N8N_KEY" | gcloud secrets versions add "$SECRET" \
              --project="$PROJECT_ID" --data-file=- --quiet
            echo "PASS: generated 32-byte $SECRET and stored new version."
          fi

          echo "::add-mask::${N8N_KEY}"
          echo "N8N_KEY=${N8N_KEY}" >> "$GITHUB_ENV"

      - name: Provision Railway (project + Postgres + n8n + volume + env vars + domain)
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail

          # GraphQL helper: posts a query/mutation, fails on .errors[].
          _gql() {
            local query="$1"
            # Bash brace-counting in ${param:-default} mis-handles a literal
            # {} default — when $2 is set, the closing brace of the parameter
            # expansion is consumed by the default's first }, leaving a stray
            # } that gets appended to $2 (breaking the JSON). Use explicit
            # if/else instead.
            local variables="${2:-}"
            [ -n "$variables" ] || variables='{}'
            local body resp
            body=$(jq -cn --arg q "$query" --argjson v "$variables" \
              '{query: $q, variables: $v}')
            resp=$(curl -sS -X POST "$RAILWAY_GQL" \
              -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body")
            if printf '%s' "$resp" | jq -e '.errors' >/dev/null 2>&1; then
              echo "FAIL: Railway GraphQL errors:" >&2
              printf '%s\n' "$resp" | jq -r '.errors[] | "  - " + .message' >&2
              return 1
            fi
            printf '%s' "$resp"
          }

          DOMAIN="n8n.${SYSTEM_NAME}.or-infra.com"

          # ===== Workspace: required by projectCreate when token sees >1 =====
          # Railway requires an explicit workspaceId on projectCreate when the
          # token has access to multiple workspaces. me.workspaces is a plain
          # list of Workspace (not a Connection), so no edges/node wrapping.
          # Pick the "edri2or" workspace by name; fall back to the first one.
          echo "=== Railway: resolve workspace id ==="
          resp=$(_gql 'query { me { workspaces { id name } } }')
          WORKSPACE_ID=$(printf '%s' "$resp" | jq -r \
            '.data.me.workspaces
             | ((map(select(.name=="edri2or")) | .[0].id) // .[0].id // "")')
          [ -n "$WORKSPACE_ID" ] && [ "$WORKSPACE_ID" != "null" ] \
            || { echo "FAIL: no Railway workspace visible to this token; resp=$resp" >&2; exit 1; }
          echo "INFO: using workspace: $WORKSPACE_ID"

          # ===== Project: SM-first, find, then create =====
          # SM is the source of truth for resource ids — Railway's listing
          # APIs return 0 for this token's scope, so we can't rely on
          # find-by-name. The PROJECT shell is pre-created by provision-
          # system.yml; we add a version here after the first successful
          # projectCreate, and every subsequent run reads it back.
          echo "=== Railway: project (SM-first lookup) ==="
          PROJECT_ID_RW=""

          # 1. SM
          PROJECT_ID_RW=$(gcloud secrets versions access latest \
            --secret=railway-project-id --project="$PROJECT_ID" 2>/dev/null || echo "")
          if [ -n "$PROJECT_ID_RW" ] && [ "$PROJECT_ID_RW" != "null" ]; then
            echo "INFO: reusing project_id from SM: $PROJECT_ID_RW"
          else
            # 2. Best-effort Railway find (may return 0 with this token's
            # scope — that's fine, we fall through to create).
            resp=$(_gql 'query($wid: String!) { workspace(id: $wid) { projects { edges { node { id name } } } } }' \
              "$(jq -cn --arg wid "$WORKSPACE_ID" '{wid: $wid}')" 2>/dev/null || echo '{}')
            ws_count=$(printf '%s' "$resp" | jq '(.data.workspace.projects.edges // []) | length' 2>/dev/null || echo 0)
            echo "DEBUG: workspace($WORKSPACE_ID).projects returned $ws_count projects"
            PROJECT_ID_RW=$(printf '%s' "$resp" | jq -r --arg n "$SYSTEM_NAME" \
              '(.data.workspace.projects.edges // []) | map(select(.node.name==$n)) | .[0].node.id // ""' 2>/dev/null || echo "")

            if [ -z "$PROJECT_ID_RW" ] || [ "$PROJECT_ID_RW" = "null" ]; then
              resp=$(_gql 'query { projects(first:100) { edges { node { id name } } } }' 2>/dev/null || echo '{}')
              tl_count=$(printf '%s' "$resp" | jq '(.data.projects.edges // []) | length' 2>/dev/null || echo 0)
              echo "DEBUG: top-level projects(first:100) returned $tl_count projects"
              PROJECT_ID_RW=$(printf '%s' "$resp" | jq -r --arg n "$SYSTEM_NAME" \
                '(.data.projects.edges // []) | map(select(.node.name==$n)) | .[0].node.id // ""' 2>/dev/null || echo "")
            fi

            # 3. Create
            if [ -z "$PROJECT_ID_RW" ] || [ "$PROJECT_ID_RW" = "null" ]; then
              resp=$(_gql 'mutation($input: ProjectCreateInput!) { projectCreate(input: $input) { id } }' \
                "$(jq -cn --arg name "$SYSTEM_NAME" --arg ws "$WORKSPACE_ID" \
                  '{input: {name: $name, defaultEnvironmentName: "production", workspaceId: $ws}}')")
              PROJECT_ID_RW=$(printf '%s' "$resp" | jq -r '.data.projectCreate.id' 2>/dev/null || echo "")
              [ -n "$PROJECT_ID_RW" ] && [ "$PROJECT_ID_RW" != "null" ] \
                || { echo "FAIL: projectCreate returned no id; resp=$resp" >&2; exit 1; }
              echo "PASS: project created: $PROJECT_ID_RW"
              # Give Railway a moment for the project to be fully queryable.
              sleep 5
            else
              echo "INFO: project found via Railway: $PROJECT_ID_RW"
            fi

            # Persist immediately so future runs (and the rest of THIS run
            # if it fails downstream) start from SM.
            printf '%s' "$PROJECT_ID_RW" | gcloud secrets versions add railway-project-id \
              --project="$PROJECT_ID" --data-file=- --quiet
            echo "PASS: railway-project-id persisted to SM."
          fi

          # ===== Production environment id =====
          # Defensive jq: response may be malformed under various edge cases;
          # we want a clear FAIL message rather than a jq-parse-error exit.
          resp=$(_gql 'query($id: String!) { project(id: $id) { environments { edges { node { id name } } } } }' \
            "$(jq -cn --arg id "$PROJECT_ID_RW" '{id: $id}')" 2>/dev/null || echo '{}')
          ENV_ID=$(printf '%s' "$resp" | jq -r \
            '(.data.project.environments.edges // []) | map(select(.node.name=="production")) | .[0].node.id // ""' 2>/dev/null || echo "")
          if [ -z "$ENV_ID" ] || [ "$ENV_ID" = "null" ]; then
            echo "FAIL: production environment not found on project $PROJECT_ID_RW" >&2
            echo "DEBUG: env query response: $(printf '%s' "$resp" | head -c 500)" >&2
            exit 1
          fi
          echo "INFO: production environment id: $ENV_ID"

          # ===== Generic env-var upsert helper =====
          # Takes an explicit service id so we can set env vars on both
          # Postgres and n8n services.
          _upsert() {
            local sid="$1" name="$2" value="$3"
            _gql 'mutation($input: VariableUpsertInput!) { variableUpsert(input: $input) }' \
              "$(jq -cn --arg pid "$PROJECT_ID_RW" --arg eid "$ENV_ID" --arg sid "$sid" \
                --arg n "$name" --arg v "$value" \
                '{input: {projectId: $pid, environmentId: $eid, serviceId: $sid, name: $n, value: $v}}')" \
              > /dev/null
            echo "  PASS: $name"
          }

          # ===== Postgres: SM-first, find, then create =====
          # Mirrors edri2or/factory's order verbatim:
          #   1. serviceCreate
          #   2. attach volume (with environmentId — required to bind the
          #      volume to the production service-instance; without it,
          #      Postgres hangs in DEPLOYING because PGDATA path isn't mounted)
          #   3. configure env vars in parallel (matches old factory's
          #      `& pids+=($!)` pattern — sequential upserts each trigger a
          #      separate Railway redeploy, causing thrash; parallel batches
          #      changes into a single redeploy with the final state)
          echo "=== Railway: Postgres service (SM-first lookup) ==="
          PG_ID=$(gcloud secrets versions access latest \
            --secret=railway-postgres-service-id --project="$PROJECT_ID" 2>/dev/null || echo "")
          PG_FIRST_TIME=false
          if [ -n "$PG_ID" ] && [ "$PG_ID" != "null" ]; then
            echo "INFO: reusing Postgres service_id from SM: $PG_ID"
          else
            resp=$(_gql 'query($id: String!) { project(id: $id) { services { edges { node { id name } } } } }' \
              "$(jq -cn --arg id "$PROJECT_ID_RW" '{id: $id}')" 2>/dev/null || echo '{}')
            PG_ID=$(printf '%s' "$resp" | jq -r \
              '(.data.project.services.edges // []) | map(select(.node.name=="Postgres")) | .[0].node.id // ""' 2>/dev/null || echo "")

            if [ -z "$PG_ID" ] || [ "$PG_ID" = "null" ]; then
              resp=$(_gql 'mutation($input: ServiceCreateInput!) { serviceCreate(input: $input) { id } }' \
                "$(jq -cn --arg pid "$PROJECT_ID_RW" \
                  '{input: {projectId: $pid, name: "Postgres", source: {image: "ghcr.io/railwayapp-templates/postgres-ssl:17"}}}')")
              PG_ID=$(printf '%s' "$resp" | jq -r '.data.serviceCreate.id' 2>/dev/null || echo "")
              [ -n "$PG_ID" ] && [ "$PG_ID" != "null" ] \
                || { echo "FAIL: Postgres serviceCreate returned no id; resp=$resp" >&2; exit 1; }
              echo "PASS: Postgres service created: $PG_ID"
              PG_FIRST_TIME=true
            else
              echo "INFO: Postgres service found in project: $PG_ID"
            fi

            printf '%s' "$PG_ID" | gcloud secrets versions add railway-postgres-service-id \
              --project="$PROJECT_ID" --data-file=- --quiet
            echo "PASS: railway-postgres-service-id persisted to SM."
          fi

          # ===== Postgres volume: SM-first, find, then create =====
          echo "=== Railway: postgres-data volume (SM-first lookup) ==="
          PG_VOLUME_ID=$(gcloud secrets versions access latest \
            --secret=railway-postgres-volume-id --project="$PROJECT_ID" 2>/dev/null || echo "")
          if [ -n "$PG_VOLUME_ID" ] && [ "$PG_VOLUME_ID" != "null" ]; then
            echo "INFO: reusing postgres-data volume_id from SM: $PG_VOLUME_ID"
          else
            resp=$(_gql 'query($id: String!) { project(id: $id) { volumes { edges { node { id name } } } } }' \
              "$(jq -cn --arg id "$PROJECT_ID_RW" '{id: $id}')" 2>/dev/null || echo '{}')
            PG_VOLUME_ID=$(printf '%s' "$resp" | jq -r \
              '(.data.project.volumes.edges // []) | map(select(.node.name=="postgres-data")) | .[0].node.id // ""' 2>/dev/null || echo "")

            if [ -z "$PG_VOLUME_ID" ] || [ "$PG_VOLUME_ID" = "null" ]; then
              # environmentId is REQUIRED — without it the volume isn't
              # bound to the production service-instance and Postgres hangs.
              resp=$(_gql 'mutation($input: VolumeCreateInput!) { volumeCreate(input: $input) { id } }' \
                "$(jq -cn --arg pid "$PROJECT_ID_RW" --arg sid "$PG_ID" --arg eid "$ENV_ID" \
                  '{input: {projectId: $pid, serviceId: $sid, environmentId: $eid, mountPath: "/var/lib/postgresql/data"}}')")
              PG_VOLUME_ID=$(printf '%s' "$resp" | jq -r '.data.volumeCreate.id' 2>/dev/null || echo "")
              [ -n "$PG_VOLUME_ID" ] && [ "$PG_VOLUME_ID" != "null" ] \
                || { echo "FAIL: Postgres volumeCreate returned no id; resp=$resp" >&2; exit 1; }
              echo "PASS: postgres-data volume created and attached: $PG_VOLUME_ID"
            else
              echo "INFO: postgres-data volume found in project: $PG_VOLUME_ID"
            fi

            printf '%s' "$PG_VOLUME_ID" | gcloud secrets versions add railway-postgres-volume-id \
              --project="$PROJECT_ID" --data-file=- --quiet
            echo "PASS: railway-postgres-volume-id persisted to SM."
          fi

          # ===== Postgres env vars (only on first create, in parallel) =====
          if [ "$PG_FIRST_TIME" = "true" ]; then
            echo "=== Railway: Postgres env vars (parallel upsert) ==="
            POSTGRES_PASSWORD=$(openssl rand -hex 24)
            echo "::add-mask::${POSTGRES_PASSWORD}"
            # DATABASE_URL uses Railway runtime reference syntax for the
            # password + private-domain values. Assemble the prefix with
            # bash so the dollar-double-brace sequence never appears
            # verbatim in this YAML source (GitHub Actions would parse it
            # as an expression and reject the workflow at load time).
            # Matches edri2or/factory's 5th Postgres env var.
            DLR='$'
            DATABASE_URL="postgresql://postgres:${DLR}{{POSTGRES_PASSWORD}}@${DLR}{{RAILWAY_PRIVATE_DOMAIN}}:5432/railway"
            pg_pids=()
            _upsert "$PG_ID" POSTGRES_USER     postgres & pg_pids+=($!)
            _upsert "$PG_ID" POSTGRES_DB       railway & pg_pids+=($!)
            _upsert "$PG_ID" POSTGRES_PASSWORD "$POSTGRES_PASSWORD" & pg_pids+=($!)
            _upsert "$PG_ID" PGDATA            /var/lib/postgresql/data/pgdata & pg_pids+=($!)
            _upsert "$PG_ID" DATABASE_URL      "$DATABASE_URL" & pg_pids+=($!)
            for pid in "${pg_pids[@]}"; do wait "$pid" || { echo "FAIL: a Postgres env var upsert failed" >&2; exit 1; }; done
            echo "PASS: Postgres env vars set (5 vars in parallel)."
          fi

          # ===== n8n service: SM-first, find, then create =====
          echo "=== Railway: n8n service (SM-first lookup) ==="
          N8N_ID=$(gcloud secrets versions access latest \
            --secret=railway-n8n-service-id --project="$PROJECT_ID" 2>/dev/null || echo "")
          if [ -n "$N8N_ID" ] && [ "$N8N_ID" != "null" ]; then
            echo "INFO: reusing n8n service_id from SM: $N8N_ID"
          else
            resp=$(_gql 'query($id: String!) { project(id: $id) { services { edges { node { id name } } } } }' \
              "$(jq -cn --arg id "$PROJECT_ID_RW" '{id: $id}')" 2>/dev/null || echo '{}')
            N8N_ID=$(printf '%s' "$resp" | jq -r \
              '(.data.project.services.edges // []) | map(select(.node.name=="n8n")) | .[0].node.id // ""' 2>/dev/null || echo "")

            if [ -z "$N8N_ID" ] || [ "$N8N_ID" = "null" ]; then
              resp=$(_gql 'mutation($input: ServiceCreateInput!) { serviceCreate(input: $input) { id } }' \
                "$(jq -cn --arg pid "$PROJECT_ID_RW" --arg img "$N8N_IMAGE" \
                  '{input: {projectId: $pid, name: "n8n", source: {image: $img}}}')")
              N8N_ID=$(printf '%s' "$resp" | jq -r '.data.serviceCreate.id' 2>/dev/null || echo "")
              [ -n "$N8N_ID" ] && [ "$N8N_ID" != "null" ] \
                || { echo "FAIL: n8n serviceCreate returned no id; resp=$resp" >&2; exit 1; }
              echo "PASS: n8n service created: $N8N_ID"
            else
              echo "INFO: n8n service found in project: $N8N_ID"
            fi

            printf '%s' "$N8N_ID" | gcloud secrets versions add railway-n8n-service-id \
              --project="$PROJECT_ID" --data-file=- --quiet
            echo "PASS: railway-n8n-service-id persisted to SM."
          fi

          # No n8n-data volume: n8n's official Docker image runs as user
          # `node` (uid 1000), but Railway volumes mount as root. Attaching
          # a volume to /home/node/.n8n causes EACCES on n8n's runtime
          # config file. The old factory (edri2or/factory) deliberately
          # skips n8n's volume — all persistent state (workflows,
          # credentials) lives in Postgres, which IS volume-backed. n8n's
          # local user folder is ephemeral and fine to reset on redeploy.
          VOLUME_ID=""

          # ===== n8n env vars: upsert =====
          # DB_* values use Railway reference syntax — resolved at container
          # start from the Postgres service's env we just set. Restart-safe.
          echo "=== Railway: upsert n8n env vars ==="
          # GitHub Actions parses the dollar-double-brace expression syntax at
          # YAML load time and will reject the workflow if it sees Railway's
          # reference syntax verbatim. Assemble the prefix at bash runtime so
          # that sequence never appears literally in this YAML source.
          DLR='$'
          # Parallel upserts (matches edri2or/factory): each upsert in
          # series triggers its own Railway redeploy, so 14 sequential
          # = 14 redeploys. Batching with `&` + wait lands a single
          # redeploy with the final state.
          # N8N_HOST is the BIND address (Express listen interface), not
          # the public hostname. WEBHOOK_URL carries the public domain.
          n8n_pids=()
          _upsert "$N8N_ID" DB_TYPE                postgresdb & n8n_pids+=($!)
          _upsert "$N8N_ID" DB_POSTGRESDB_HOST     "${DLR}{{Postgres.RAILWAY_PRIVATE_DOMAIN}}" & n8n_pids+=($!)
          _upsert "$N8N_ID" DB_POSTGRESDB_PORT     5432 & n8n_pids+=($!)
          _upsert "$N8N_ID" DB_POSTGRESDB_DATABASE "${DLR}{{Postgres.POSTGRES_DB}}" & n8n_pids+=($!)
          _upsert "$N8N_ID" DB_POSTGRESDB_USER     "${DLR}{{Postgres.POSTGRES_USER}}" & n8n_pids+=($!)
          _upsert "$N8N_ID" DB_POSTGRESDB_PASSWORD "${DLR}{{Postgres.POSTGRES_PASSWORD}}" & n8n_pids+=($!)
          _upsert "$N8N_ID" DB_POSTGRESDB_SCHEMA   public & n8n_pids+=($!)
          _upsert "$N8N_ID" N8N_HOST               "0.0.0.0" & n8n_pids+=($!)
          _upsert "$N8N_ID" N8N_PROTOCOL           https & n8n_pids+=($!)
          _upsert "$N8N_ID" N8N_PORT               5678 & n8n_pids+=($!)
          _upsert "$N8N_ID" PORT                   5678 & n8n_pids+=($!)
          _upsert "$N8N_ID" WEBHOOK_URL            "https://${DOMAIN}" & n8n_pids+=($!)
          _upsert "$N8N_ID" GENERIC_TIMEZONE       "$TIMEZONE" & n8n_pids+=($!)
          _upsert "$N8N_ID" N8N_ENCRYPTION_KEY     "$N8N_KEY" & n8n_pids+=($!)
          _upsert "$N8N_ID" N8N_RUNNERS_ENABLED    true & n8n_pids+=($!)
          for pid in "${n8n_pids[@]}"; do wait "$pid" || { echo "FAIL: an n8n env var upsert failed" >&2; exit 1; }; done
          echo "PASS: n8n env vars set (15 vars in parallel)."

          # ===== Custom domain on n8n service =====
          # Railway returns multiple dnsRecords for multi-level subdomains:
          # a CNAME for routing AND a TXT (_railway-verify.<host>) for
          # ownership verification. Until BOTH are present in Cloudflare,
          # Railway will not issue a Let's Encrypt cert and the host serves
          # the *.up.railway.app wildcard cert (which trips CERT_COMMON_NAME_INVALID
          # in the browser). Capture the full list and let the Cloudflare
          # step upsert every record Railway requires.
          echo "=== Railway: find-or-create custom domain ${DOMAIN} ==="
          resp=$(_gql 'query($id: String!) {
              service(id: $id) {
                serviceInstances {
                  edges {
                    node {
                      environmentId
                      domains {
                        customDomains { id domain status { dnsRecords { hostlabel recordType requiredValue } } }
                      }
                    }
                  }
                }
              }
            }' \
            "$(jq -cn --arg id "$N8N_ID" '{id: $id}')")

          DNS_RECORDS_JSON=$(printf '%s' "$resp" | jq -c --arg eid "$ENV_ID" --arg d "$DOMAIN" \
            '.data.service.serviceInstances.edges
             | map(select(.node.environmentId==$eid))
             | .[0].node.domains.customDomains
             | map(select(.domain==$d))
             | .[0].status.dnsRecords // []')

          if [ "$(printf '%s' "$DNS_RECORDS_JSON" | jq 'length')" -gt 0 ]; then
            echo "INFO: custom domain $DOMAIN exists on Railway."
          else
            # CustomDomainCreateInput required fields (confirmed via __type
            # introspection on PR #14's run): domain, environmentId,
            # projectId, serviceId. targetPort is optional.
            resp=$(_gql 'mutation($input: CustomDomainCreateInput!) {
                customDomainCreate(input: $input) {
                  id status { dnsRecords { hostlabel recordType requiredValue } }
                }
              }' \
              "$(jq -cn --arg pid "$PROJECT_ID_RW" --arg eid "$ENV_ID" --arg sid "$N8N_ID" --arg d "$DOMAIN" \
                '{input: {projectId: $pid, environmentId: $eid, serviceId: $sid, domain: $d, targetPort: 5678}}')")
            DNS_RECORDS_JSON=$(printf '%s' "$resp" | jq -c '.data.customDomainCreate.status.dnsRecords // []')
            [ "$(printf '%s' "$DNS_RECORDS_JSON" | jq 'length')" -gt 0 ] \
              || { echo "FAIL: customDomainCreate returned no dnsRecords; resp=$resp" >&2; exit 1; }
            echo "PASS: custom domain created."
          fi

          echo "Railway-required DNS records for ${DOMAIN}:"
          printf '%s' "$DNS_RECORDS_JSON" | jq -r '.[] | "  - \(.recordType) \(.hostlabel) -> \(.requiredValue)"'

          # Derive CNAME_TARGET for the Summary step.
          CNAME_TARGET=$(printf '%s' "$DNS_RECORDS_JSON" | jq -r \
            'map(select(.recordType=="CNAME")) | .[0].requiredValue // ""')

          # Persist for the next steps
          {
            echo "PROJECT_ID_RW=${PROJECT_ID_RW}"
            echo "ENV_ID=${ENV_ID}"
            echo "PG_ID=${PG_ID}"
            echo "N8N_ID=${N8N_ID}"
            echo "VOLUME_ID=${VOLUME_ID}"
            echo "CNAME_TARGET=${CNAME_TARGET}"
            echo "DNS_RECORDS_JSON=${DNS_RECORDS_JSON}"
            echo "DOMAIN=${DOMAIN}"
          } >> "$GITHUB_ENV"

      - name: Configure Cloudflare DNS
        env:
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euxo pipefail
          # CF_TOKEN_CREATOR is a token-MANAGEMENT token (User:API Tokens:Edit
          # only). It cannot do DNS edits directly — calls return code 10000
          # "Authentication error" because it lacks Zone:DNS:Edit.
          #
          # Pattern (matches edri2or/factory's working flow): use the creator
          # to MINT a short-lived (1h) scoped DNS-only token, use that for
          # the actual DNS write, then revoke it. Cloudflare permission group
          # 4755a26eedb94da69e1066d98aa820be == "Zone:DNS:Edit".

          TOKEN_NAME="bootstrap-n8n-${SYSTEM_NAME}"

          # 1. Clean up any stale bootstrap-n8n-* tokens from prior runs.
          # Cloudflare has a 50-token account limit, and tokens minted by
          # this workflow are 1h-expiry but DON'T auto-purge from the count
          # after expiry. Use a wildcard prefix match so accumulated tokens
          # from sibling systems (test runs, decommissioned systems) also
          # get reaped — otherwise the limit eventually blocks fresh mints.
          # Safe to delete: all such tokens are minted by THIS workflow.
          echo "Cleaning up any stale bootstrap-n8n-* tokens..."
          STALE_TOKENS=$(curl -sS \
            "${CF_API}/user/tokens" \
            -H "Authorization: Bearer ${CF_TOKEN_CREATOR}" \
            | jq -r '.result[]? | select(.name | startswith("bootstrap-n8n-")) | .id')
          for stale_id in $STALE_TOKENS; do
            curl -sS -X DELETE "${CF_API}/user/tokens/$stale_id" \
              -H "Authorization: Bearer ${CF_TOKEN_CREATOR}" > /dev/null \
              && echo "  deleted stale token $stale_id" \
              || echo "::warning::could not delete stale token $stale_id"
          done

          # 2. Mint a fresh DNS:Edit token scoped to this zone, 1h expiry.
          EXPIRES=$(date -u -d '+1 hour' +%Y-%m-%dT%H:%M:%SZ)
          echo "Minting scoped Cloudflare DNS token (expires ${EXPIRES})..."
          TOKEN_RESP=$(curl -sS -X POST "${CF_API}/user/tokens" \
            -H "Authorization: Bearer ${CF_TOKEN_CREATOR}" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg name "$TOKEN_NAME" \
              --arg zone "$CF_ZONE_ID" \
              --arg exp "$EXPIRES" \
              '{name:$name,policies:[{effect:"allow",resources:{("com.cloudflare.api.account.zone."+$zone):"*"},permission_groups:[{id:"4755a26eedb94da69e1066d98aa820be"}]}],expires_on:$exp}')")
          DNS_TOKEN=$(printf '%s' "$TOKEN_RESP" | jq -r '.result.value // empty')
          DNS_TOKEN_ID=$(printf '%s' "$TOKEN_RESP" | jq -r '.result.id // empty')
          if [ -z "$DNS_TOKEN" ] || [ "$DNS_TOKEN" = "null" ]; then
            echo "FAIL: could not mint scoped Cloudflare DNS token" >&2
            printf '%s' "$TOKEN_RESP" | jq '{success, errors, messages}' >&2
            exit 1
          fi
          echo "::add-mask::${DNS_TOKEN}"
          echo "PASS: DNS token minted (id=${DNS_TOKEN_ID})"

          # 3. Idempotent CNAME create/update using the scoped token.
          # Trap to revoke the token on script exit (success or failure).
          revoke_token() {
            if [ -n "${DNS_TOKEN_ID:-}" ]; then
              curl -sS -X DELETE "${CF_API}/user/tokens/${DNS_TOKEN_ID}" \
                -H "Authorization: Bearer ${CF_TOKEN_CREATOR}" > /dev/null 2>&1 \
                && echo "Scoped DNS token revoked." \
                || echo "::warning::could not revoke DNS token ${DNS_TOKEN_ID} (will auto-expire in 1h)"
            fi
          }
          trap revoke_token EXIT

          # 3. Idempotent upsert of every record Railway requires.
          # For multi-level subdomains, Railway returns BOTH a CNAME (routing)
          # and a TXT (_railway-verify.<host>, ownership). Both must exist in
          # Cloudflare or Railway will not issue the per-domain LE cert and
          # the host keeps serving *.up.railway.app (CERT_COMMON_NAME_INVALID).
          # ttl:1 = "automatic". proxied:false because Railway terminates TLS;
          # CF proxying would break LE validation (cert chain).
          while read -r record; do
            HOSTLABEL=$(printf '%s' "$record" | jq -r '.hostlabel')
            RECTYPE=$(printf '%s' "$record" | jq -r '.recordType')
            REQVAL=$(printf '%s' "$record" | jq -r '.requiredValue')

            # Railway's recordType is an enum: DNS_RECORD_TYPE_CNAME /
            # DNS_RECORD_TYPE_TXT / etc. Cloudflare expects the bare type
            # (CNAME / TXT). Strip the enum prefix.
            CF_TYPE="${RECTYPE#DNS_RECORD_TYPE_}"

            # Railway's hostlabel is RELATIVE to the zone (e.g. "n8n.factory-test-12"
            # for the CNAME, "_railway-verify.n8n.factory-test-12" for the TXT).
            # Append the zone name to get the FQDN for Cloudflare.
            case "$HOSTLABEL" in
              *.or-infra.com|or-infra.com) CF_NAME="$HOSTLABEL" ;;
              *) CF_NAME="${HOSTLABEL}.or-infra.com" ;;
            esac

            resp=$(curl -sS \
              "${CF_API}/zones/${CF_ZONE_ID}/dns_records?type=${CF_TYPE}&name=${CF_NAME}" \
              -H "Authorization: Bearer ${DNS_TOKEN}")
            ok=$(printf '%s' "$resp" | jq -r '.success')
            [ "$ok" = "true" ] || { echo "FAIL: cloudflare list $CF_NAME ($CF_TYPE): $resp" >&2; exit 1; }

            REC_ID=$(printf '%s' "$resp" | jq -r '.result[0].id // ""')
            REC_CONTENT=$(printf '%s' "$resp" | jq -r '.result[0].content // ""')

            BODY=$(jq -cn --arg name "$CF_NAME" --arg content "$REQVAL" --arg type "$CF_TYPE" \
              '{type:$type, name:$name, content:$content, ttl:1, proxied:false, comment:"managed-by=or-factory-master"}')

            if [ -z "$REC_ID" ]; then
              resp=$(curl -sS -X POST "${CF_API}/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${DNS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$BODY")
              ok=$(printf '%s' "$resp" | jq -r '.success')
              [ "$ok" = "true" ] || { echo "FAIL: cloudflare create $CF_NAME ($CF_TYPE): $resp" >&2; exit 1; }
              echo "PASS: CF $CF_TYPE created: $CF_NAME -> $REQVAL"
            elif [ "$REC_CONTENT" != "$REQVAL" ]; then
              resp=$(curl -sS -X PUT "${CF_API}/zones/${CF_ZONE_ID}/dns_records/${REC_ID}" \
                -H "Authorization: Bearer ${DNS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$BODY")
              ok=$(printf '%s' "$resp" | jq -r '.success')
              [ "$ok" = "true" ] || { echo "FAIL: cloudflare update $CF_NAME ($CF_TYPE): $resp" >&2; exit 1; }
              echo "PASS: CF $CF_TYPE updated: $CF_NAME -> $REQVAL (was $REC_CONTENT)"
            else
              echo "INFO: CF $CF_TYPE unchanged: $CF_NAME -> $REQVAL"
            fi
          done < <(printf '%s' "$DNS_RECORDS_JSON" | jq -c '.[]')
          # trap fires here to revoke the token.

      - name: Wait for Railway TLS cert
        env:
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail
          # Observational, non-blocking: Railway issues a Let's Encrypt cert
          # for the custom domain only after its periodic DNS check passes.
          # This step polls the TLS handshake from outside and reports when
          # the cert CN matches our domain. Times out with a warning (not a
          # failure) so deploys don't block on Railway's async issuance.
          DOMAIN="n8n.${SYSTEM_NAME}.or-infra.com"
          echo "=== Polling TLS cert on https://${DOMAIN} (up to 5min) ==="
          for i in $(seq 1 30); do
            cn=$(echo | timeout 5 openssl s_client \
                   -connect "${DOMAIN}:443" -servername "${DOMAIN}" 2>/dev/null \
                 | openssl x509 -noout -subject 2>/dev/null \
                 | sed -n 's|.*CN *= *\([^,]*\).*|\1|p')
            if [ "$cn" = "${DOMAIN}" ]; then
              echo "PASS: Railway issued cert for ${DOMAIN} after $((i*10))s"
              exit 0
            fi
            echo "[poll $i/30] CN=${cn:-<no cert>}; sleeping 10s..."
            sleep 10
          done
          echo "::warning::Railway did not issue cert for ${DOMAIN} within 5min. Cert issuance can continue async — check the Railway dashboard for verification status, and retry the URL in a few minutes."

      - name: Persist Railway IDs to system SM
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail

          _persist_id() {
            local secret="$1" want="$2" existing
            if existing=$(gcloud secrets versions access latest \
                         --secret="$secret" --project="$PROJECT_ID" 2>/dev/null); then
              if [ "$existing" = "$want" ]; then
                echo "INFO: $secret unchanged (${want})"
                return 0
              fi
              echo "WARN: $secret mismatch — SM has '$existing', Railway returned '$want'. NOT overwriting; surface and continue." >&2
              return 0
            fi
            # Shell pre-created by provision-system.yml — only add a version here.
            printf '%s' "$want" | gcloud secrets versions add "$secret" \
              --project="$PROJECT_ID" --data-file=- --quiet
            echo "PASS: $secret = ${want}"
          }

          _persist_id "railway-project-id"           "$PROJECT_ID_RW"
          _persist_id "railway-n8n-service-id"       "$N8N_ID"
          _persist_id "railway-postgres-service-id"  "$PG_ID"

      - name: Summary
        env:
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail
          {
            echo "## Deployed: \`${SYSTEM_NAME}\`"
            echo ""
            echo "| Resource | Value |"
            echo "|---|---|"
            echo "| Railway project | \`${PROJECT_ID_RW}\` |"
            echo "| Production env | \`${ENV_ID}\` |"
            echo "| Postgres service | \`${PG_ID}\` |"
            echo "| n8n service | \`${N8N_ID}\` |"
            echo "| n8n image | \`${N8N_IMAGE}\` |"
            echo "| Custom domain | \`${DOMAIN}\` |"
            echo "| CNAME target | \`${CNAME_TARGET}\` |"
            echo ""
            echo "**DEPLOY COMPLETE.** Visit https://${DOMAIN} — first load opens n8n owner-account setup. Allow 1-3 min after first run for Let's Encrypt cert."
          } >> "$GITHUB_STEP_SUMMARY"
