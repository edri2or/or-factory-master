name: Request Factory Resource (ask the broker to open a secret / IAM grant)

# The system-side "messenger" for a system → broker resource-request.
#
# WHY this is a workflow and not a plain script call: a system can only RAISE a
# request by emitting an event to Linear (scripts/emit-event.sh), which reads the
# system's own Secret Manager (linear-*, telegram-*, axiom-*) — and that read
# needs GCP credentials. An interactive Claude Code session on the system repo has
# NO cloud credentials (WIF works only inside GitHub Actions), so it cannot emit
# directly. This workflow is the permissioned environment that CAN: it authenticates
# as the system's own deploy-sa via WIF, then runs the already-shipped emitter.
#
# The system's /request-factory-resource command DISPATCHES this workflow (a plain
# GitHub API call — no cloud creds needed), passing the request as inputs. From
# there the proven channel takes over: emit-event.sh opens a deduped Linear ticket
# → the factory MCP triage dispatches fulfill-system-request.yml (register) → Or
# gets ONE Telegram card → Or taps ✅ → the broker creates the secret shell / grants
# the role. This workflow ONLY asks; it creates nothing and never reads a secret
# value. The authoritative security gate (scripts/validate-system-request.sh) runs
# broker-side in fulfill-system-request.yml, before the card and before any action.
#
# Ref: docs/system-resource-requests.md (in the factory repo).

on:
  workflow_dispatch:
    inputs:
      request_type:
        description: "secret | iam"
        required: true
        type: string
      secret_name:
        description: "Secret id to create (required when request_type=secret)."
        required: false
        default: ""
        type: string
      role:
        description: "One allowlisted IAM role, e.g. roles/storage.objectViewer (required when request_type=iam)."
        required: false
        default: ""
        type: string
      reason:
        description: "One line: why this is needed (shown on Or's approval card)."
        required: true
        type: string

permissions: {}

jobs:
  request:
    name: Emit a system → broker resource-request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The system's WIF CEL pins ref=refs/heads/main; running off another branch
    # fails to auth. workflow_dispatch defaults to the default branch (main).
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read    # actions/checkout reads the scaffolded scripts/emit-event.sh
      id-token: write   # WIF OIDC token

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Validate inputs (shape only; the broker gate is authoritative)
        env:
          REQUEST_TYPE: ${{ inputs.request_type }}
          SECRET_NAME: ${{ inputs.secret_name }}
          ROLE: ${{ inputs.role }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          case "$REQUEST_TYPE" in
            secret)
              [ -n "$SECRET_NAME" ] || { echo "FAIL: request_type=secret needs secret_name" >&2; exit 1; }
              echo "$SECRET_NAME" | grep -Eq '^[a-z][a-z0-9-]{1,62}$' \
                || { echo "FAIL: secret_name '$SECRET_NAME' is not a safe secret id" >&2; exit 1; }
              ;;
            iam)
              [ -n "$ROLE" ] || { echo "FAIL: request_type=iam needs role" >&2; exit 1; }
              echo "$ROLE" | grep -Eq '^roles/[a-zA-Z0-9._-]+$' \
                || { echo "FAIL: role '$ROLE' is not a valid role id" >&2; exit 1; }
              ;;
            *)
              echo "FAIL: request_type must be 'secret' or 'iam' (got '$REQUEST_TYPE')" >&2; exit 1 ;;
          esac
          [ -n "$REASON" ] || { echo "FAIL: reason is required" >&2; exit 1; }
          echo "OK: input shape valid (request_type=$REQUEST_TYPE)."

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Emit the resource-request (opens the Linear ticket → Telegram card)
        env:
          EMIT_SM_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ github.event.repository.name }}
          REQUEST_TYPE: ${{ inputs.request_type }}
          SECRET_NAME: ${{ inputs.secret_name }}
          ROLE: ${{ inputs.role }}
          REASON: ${{ inputs.reason }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Build the request body server-side with jq (safe quoting; no value ever
          # touches a secret). request_type decides which fields ride along.
          if [ "$REQUEST_TYPE" = "secret" ]; then
            BODY="$(jq -cn --arg s "$SECRET_NAME" --arg r "$REASON" \
              '{request_type:"secret", secret_name:$s, reason:$r}')"
          else
            BODY="$(jq -cn --arg role "$ROLE" --arg r "$REASON" \
              '{request_type:"iam", role:$role, reason:$r}')"
          fi
          echo "Emitting system.request.${REQUEST_TYPE} for ${SYSTEM_NAME} (project ${EMIT_SM_PROJECT})."
          bash scripts/emit-event.sh \
            --name="system.request.${REQUEST_TYPE}" \
            --severity=info --action-required=true \
            --layer=system --workflow=request-factory-resource --run-id="$RUN_ID" \
            --system="$SYSTEM_NAME" \
            --body="$BODY"
          echo "Request emitted. If the Linear/Telegram secrets are readable, Or now gets an approval card."
