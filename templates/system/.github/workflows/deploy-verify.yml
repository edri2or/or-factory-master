name: Deploy Verify

# Proof producer for the "deploy-edge" surface (the Caddy/HMAC security edge).
# It drives the LIVE edge via scripts/deploy-verify.sh (a /webhook/* request with
# no signature -> 401, a bad signature -> 401, a valid signature -> not 401, and a
# rate-limit burst -> 429) and, ONLY on a real pass, writes a signed
# e2e-proofs/deploy-edge-<slug>.json, commits it to the branch, and uploads it as
# the `e2e-proof` artifact. A failed edge produces NO proof, so the gate stays red.
#
# WIF note: this system's WIF CEL pins ref=refs/heads/main, so dispatch this on
# main (for auth) while it checks out target_ref's content (to hash + commit).

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: The branch whose deploy-edge to prove and to commit the proof onto.
        required: true
      slug:
        description: Proof slug — MUST start with "deploy-edge-" (e.g. deploy-edge-mysys).
        required: true

concurrency:
  group: deploy-verify-${{ github.event.inputs.target_ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  verify:
    name: Deploy edge verify (live)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # commit + push the proof onto target_ref
      id-token: write    # WIF OIDC token (workflow_dispatch only — never on PR)
    steps:
      - name: Checkout the branch under proof
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ github.event.inputs.target_ref }}
          fetch-depth: 2

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Drive the live HMAC edge and assert it enforces
        id: drive
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail
          HMAC_SECRET=$(gcloud secrets versions access latest --secret=webhook-hmac-secret --project="$PROJECT_ID" 2>/dev/null) || true
          [ -n "$HMAC_SECRET" ] || { echo "FAIL: webhook-hmac-secret missing/empty in $PROJECT_ID SM" >&2; exit 1; }
          echo "::add-mask::${HMAC_SECRET}"
          export HMAC_SECRET SYSTEM_NAME
          export E2E_RESULT_FILE="${RUNNER_TEMP}/edge-result.json"
          bash scripts/deploy-verify.sh

      - name: Build and sign the proof
        id: proof
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source scripts/lib.sh
          CONTENT_HASH=$(e2e_surface_hash deploy-edge)
          DRIVE=$(cat "${RUNNER_TEMP}/edge-result.json")

          mkdir -p e2e-proofs
          NOSIG="${RUNNER_TEMP}/proof-nosig.json"
          jq -n \
            --arg schema "e2e-proof/v1" --arg surface "deploy-edge" \
            --arg slug "$SLUG" --arg repo "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" --arg chash "$CONTENT_HASH" \
            --argjson d "$DRIVE" \
            '{schema:$schema, surface:$surface, slug:$slug, repo:$repo, run_id:$run_id,
              content_hash:$chash, system:($d.system), domain:($d.domain),
              checks:($d.checks), result:($d.result), executed_at:($d.executed_at)}' > "$NOSIG"

          KEY=$(gcloud secrets versions access latest --secret=mcp-server-bearer-signing-key --project="$PROJECT_ID" 2>/dev/null) || true
          if [ -n "$KEY" ]; then
            echo "::add-mask::${KEY}"
            CANON=$(jq -Sc 'del(.signature)' "$NOSIG")
            SIG=$(printf '%s' "$CANON" | openssl dgst -sha256 -hmac "$KEY" -hex | awk '{print $NF}')
            jq --arg s "hmac-sha256:${SIG}" '.signature=$s' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          else
            jq '.signature="unsigned"' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          fi
          echo "proof_path=e2e-proofs/${SLUG}.json" >> "$GITHUB_OUTPUT"
          echo "Proof written:"; jq . "e2e-proofs/${SLUG}.json"

      - name: Upload the proof artifact (the gate cross-checks this)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-proof
          path: ${{ steps.proof.outputs.proof_path }}
          if-no-files-found: error

      - name: Commit the proof onto the branch
        env:
          TARGET_REF: ${{ github.event.inputs.target_ref }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          git config user.name "deploy-verify[bot]"
          git config user.email "actions@github.com"
          git add "e2e-proofs/${SLUG}.json"
          if git diff --cached --quiet; then
            echo "Proof unchanged — nothing to commit."
          else
            git commit -q -m "e2e: deploy-edge proof for ${SLUG} (run ${GITHUB_RUN_ID})"
            git push origin "HEAD:${TARGET_REF}"
          fi
