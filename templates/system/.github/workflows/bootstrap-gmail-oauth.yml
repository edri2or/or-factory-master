name: Bootstrap Gmail OAuth (n8n env vars for headless self-mint)

# Publishes the SHARED Gmail OAuth secrets (client id/secret + refresh token) to this
# system's n8n service as ENV VARS, so workflows (email-form-intake) mint their OWN
# Google access token at runtime and call the Gmail REST API with a Bearer header.
#
# Why env vars and not an n8n credential: n8n does NOT use an OAuth2 access token
# injected via its REST credentials API (proven live on or-edri-4 — "Unable to sign
# without access token"), and the per-system consent redirect_uri isn't registered on the
# shared Google client, so the in-UI "Connect" flow can't run headlessly either. Minting
# from the refresh token in env vars is exactly how the Workspace MCP sidecar stays
# connected headlessly. Idempotent. Secrets are masked, never printed.
#
# Secrets used (this system's own Secret Manager, propagated by copy-generic-secrets at
# provision time): gmail-oauth-client-id, gmail-oauth-client-secret,
# gmail-oauth-refresh-token, railway-api-token, railway-project-id, railway-n8n-service-id.

on:
  workflow_dispatch: {}

permissions: {}

env:
  RAILWAY_GQL: https://backboard.railway.com/graphql/v2

jobs:
  bootstrap-gmail:
    name: Publish Gmail env vars to the n8n service
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Publish Gmail OAuth env vars to n8n, validate token, notify
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
        run: |
          set -euo pipefail

          _sm_read() { gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null; }

          _soft_exit0() {
            local reason="$1"
            {
              echo "## ⚠️ Bootstrap Gmail OAuth דילג"
              echo "סיבה: ${reason}."
              echo ""
              echo "אפשר להריץ מחדש את ה-workflow אחרי תיקון (אידמפוטנטי)."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "WARN: ${reason}" >&2
            exit 0
          }

          # 1. Gmail OAuth secrets (the values the workflow mints with).
          CID=$(_sm_read "gmail-oauth-client-id" || echo "")
          CSEC=$(_sm_read "gmail-oauth-client-secret" || echo "")
          RT=$(_sm_read "gmail-oauth-refresh-token" || echo "")
          { [ -n "$CID" ] && [ -n "$CSEC" ] && [ -n "$RT" ]; } || _soft_exit0 "סודות Gmail OAuth חסרים (client-id / client-secret / refresh-token)"
          echo "::add-mask::${CID}"; echo "::add-mask::${CSEC}"; echo "::add-mask::${RT}"

          # 2. Validate the shared refresh token at Google (health check only).
          GH=$(curl -sS -o /tmp/gob-tok.json -w '%{http_code}' --max-time 20 \
            -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${CID}" -d "client_secret=${CSEC}" \
            -d "refresh_token=${RT}" -d "grant_type=refresh_token" || echo "000")
          if [ "$GH" = "200" ] && jq -e '.access_token' /tmp/gob-tok.json >/dev/null 2>&1; then
            echo "PASS: shared refresh token is valid at Google."
          else
            echo "WARN: shared refresh token did not validate at Google (HTTP $GH) — publishing anyway; the runtime mint will fail until the token is fixed." >&2
          fi
          rm -f /tmp/gob-tok.json

          # 3. Railway creds + service ids (this system's own SM).
          RAILWAY_TOKEN=$(_sm_read "railway-api-token" || echo "")
          PROJECT_ID_RW=$(_sm_read "railway-project-id" || echo "")
          N8N_SID=$(_sm_read "railway-n8n-service-id" || echo "")
          { [ -n "$RAILWAY_TOKEN" ] && [ -n "$PROJECT_ID_RW" ] && [ -n "$N8N_SID" ]; } || _soft_exit0 "סודות Railway חסרים (api-token / project-id / n8n-service-id)"
          echo "::add-mask::${RAILWAY_TOKEN}"

          _gql() {
            local query="$1" variables="${2:-}"
            [ -n "$variables" ] || variables='{}'
            curl -sS -X POST "$RAILWAY_GQL" \
              -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg q "$query" --argjson v "$variables" '{query: $q, variables: $v}')"
          }

          # 4. Resolve the production environment id.
          resp=$(_gql 'query($id: String!) { project(id: $id) { environments { edges { node { id name } } } } }' \
            "$(jq -cn --arg id "$PROJECT_ID_RW" '{id: $id}')" 2>/dev/null || echo '{}')
          ENV_ID=$(printf '%s' "$resp" | jq -r \
            '(.data.project.environments.edges // []) | map(select(.node.name=="production")) | .[0].node.id // ""' 2>/dev/null || echo "")
          { [ -n "$ENV_ID" ] && [ "$ENV_ID" != "null" ]; } || _soft_exit0 "סביבת production לא נמצאה ב-Railway project ${PROJECT_ID_RW}"
          echo "INFO: production environment id resolved."

          # 5. Upsert each var INDIVIDUALLY. variableUpsert sets exactly ONE variable and
          #    leaves every other var untouched — unlike variableCollectionUpsert, which
          #    REPLACES the whole collection (and would wipe the n8n DB/${{...}} reference
          #    vars). Each upsert may trigger a Railway redeploy; n8n is restart-safe.
          _setvar() {
            local name="$1" value="$2"
            _gql 'mutation($input: VariableUpsertInput!) { variableUpsert(input: $input) }' \
              "$(jq -cn --arg pid "$PROJECT_ID_RW" --arg eid "$ENV_ID" --arg sid "$N8N_SID" --arg n "$name" --arg v "$value" \
                '{input: {projectId: $pid, environmentId: $eid, serviceId: $sid, name: $n, value: $v}}')" \
              > /dev/null
          }
          _setvar "GMAIL_OAUTH_CLIENT_ID" "$CID"
          _setvar "GMAIL_OAUTH_CLIENT_SECRET" "$CSEC"
          _setvar "GMAIL_OAUTH_REFRESH_TOKEN" "$RT"
          # Allow $env access in n8n expressions/Code (default is already allowed; set
          # explicitly so the mint never breaks if a future default flips).
          _setvar "N8N_BLOCK_ENV_ACCESS_IN_NODE" "false"
          echo "PASS: published GMAIL_OAUTH_* + N8N_BLOCK_ENV_ACCESS_IN_NODE to the n8n service (Railway redeploys n8n to pick them up)."

          # 6. Notify the operator.
          TG_BOT_TOKEN=$(_sm_read "n8n-telegram-bot-token" || echo "")
          TG_CHAT_ID=$(_sm_read "n8n-telegram-chat-id" || echo "")
          [ -n "$TG_BOT_TOKEN" ] && echo "::add-mask::${TG_BOT_TOKEN}" || true
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -sS -o /dev/null --max-time 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=🔐 Gmail מחובר למערכת הזו ✅ (מפתח משותף, דרך משתני-סביבה — ה-n8n מתאתחל לרגע)." || echo "WARN: Telegram send failed."
          fi
          { echo "## ✅ Gmail env vars published to n8n"; echo ""; echo "GMAIL_OAUTH_CLIENT_ID / CLIENT_SECRET / REFRESH_TOKEN + N8N_BLOCK_ENV_ACCESS_IN_NODE set on the n8n service. n8n redeploys to pick them up."; } >> "$GITHUB_STEP_SUMMARY"
          echo "DONE"
