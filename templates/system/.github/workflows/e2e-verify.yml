name: E2E Verify

# Produces the behavioral E2E proof the "E2E verification gate" requires.
# It drives a REAL message through this system's live inbound path
# (telegram-in/inbound -> Caddy -> tg-inbound -> agent-router), asserts on the
# actual reply via scripts/e2e-verify-inbound.sh, and ONLY on a real pass writes
# a signed e2e-proofs/<slug>.json, commits it to the work branch, and uploads it
# as the `e2e-proof` artifact. A failed E2E produces NO proof, so the gate stays red.
#
# WIF note: this system's WIF CEL pins ref=refs/heads/main, so this workflow must
# be DISPATCHED on main (github.ref = refs/heads/main, for auth) while it checks
# out the target branch's content (to hash and to commit the proof there).

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: The branch whose behavior to prove and to commit the proof onto.
        required: true
      slug:
        description: Dev slug — the proof is written to e2e-proofs/<slug>.json.
        required: true
      expect_substr:
        description: Optional substring the bot's reply MUST contain (stronger assert).
        required: false
        default: ""

concurrency:
  group: e2e-verify-${{ github.event.inputs.target_ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  verify:
    name: E2E verify (live)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # WIF CEL pins ref=refs/heads/main; dispatch on main so auth succeeds.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # commit + push the proof onto target_ref
      id-token: write    # WIF OIDC token (workflow_dispatch only — never on PR)
    steps:
      - name: Checkout the branch under proof
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ github.event.inputs.target_ref }}
          fetch-depth: 2

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Drive the live inbound E2E and assert on the reply
        id: drive
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SYSTEM_NAME: ${{ vars.SYSTEM_NAME }}
          EXPECT_SUBSTR: ${{ github.event.inputs.expect_substr }}
        run: |
          set -euo pipefail
          _sm() { gcloud secrets versions access latest --secret="$1" --project="$PROJECT_ID" 2>/dev/null; }

          N8N_WEBHOOK_SECRET=$(_sm n8n-telegram-webhook-secret) || true
          N8N_CHAT_ID=$(_sm n8n-telegram-chat-id) || true
          N8N_API_KEY=$(_sm n8n-api-key) || true
          for v in N8N_WEBHOOK_SECRET N8N_CHAT_ID N8N_API_KEY; do
            [ -n "${!v}" ] || { echo "FAIL: $v missing/empty in $PROJECT_ID SM" >&2; exit 1; }
            echo "::add-mask::${!v}"
          done
          export N8N_WEBHOOK_SECRET N8N_CHAT_ID N8N_API_KEY SYSTEM_NAME EXPECT_SUBSTR
          export E2E_RESULT_FILE="${RUNNER_TEMP}/e2e-result.json"
          # The driver exits non-zero on a behavioral failure -> this step fails ->
          # the job fails -> NO proof is produced (exactly what the gate wants).
          bash scripts/e2e-verify-inbound.sh

      - name: Build and sign the proof
        id: proof
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source scripts/lib.sh
          CONTENT_HASH=$(e2e_behavior_hash)
          DRIVE=$(cat "${RUNNER_TEMP}/e2e-result.json")

          mkdir -p e2e-proofs
          NOSIG="${RUNNER_TEMP}/proof-nosig.json"
          jq -n \
            --arg schema "e2e-proof/v1" \
            --arg slug "$SLUG" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg chash "$CONTENT_HASH" \
            --argjson d "$DRIVE" \
            '{schema:$schema, slug:$slug, repo:$repo, run_id:$run_id,
              content_hash:$chash, system:($d.system), domain:($d.domain),
              execution_id:($d.execution_id), reply_excerpt:($d.reply_excerpt),
              result:($d.result), executed_at:($d.executed_at)}' > "$NOSIG"

          # HMAC-SHA256 over the canonical (sorted, no-signature) payload, with the
          # existing per-system signing key. Defense-in-depth for offline audit; the
          # gate's binding is the GitHub run+artifact cross-check. Key never logged.
          KEY=$(gcloud secrets versions access latest --secret=mcp-server-bearer-signing-key --project="$PROJECT_ID" 2>/dev/null) || true
          if [ -n "$KEY" ]; then
            echo "::add-mask::${KEY}"
            CANON=$(jq -Sc 'del(.signature)' "$NOSIG")
            SIG=$(printf '%s' "$CANON" | openssl dgst -sha256 -hmac "$KEY" -hex | awk '{print $NF}')
            jq --arg s "hmac-sha256:${SIG}" '.signature=$s' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          else
            jq '.signature="unsigned"' "$NOSIG" > "e2e-proofs/${SLUG}.json"
          fi
          echo "proof_path=e2e-proofs/${SLUG}.json" >> "$GITHUB_OUTPUT"
          echo "Proof written:"; jq . "e2e-proofs/${SLUG}.json"

      - name: Upload the proof artifact (the gate cross-checks this)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-proof
          path: ${{ steps.proof.outputs.proof_path }}
          if-no-files-found: error

      - name: Commit the proof onto the branch
        env:
          TARGET_REF: ${{ github.event.inputs.target_ref }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          git config user.name "e2e-verify[bot]"
          git config user.email "actions@github.com"
          git add "e2e-proofs/${SLUG}.json"
          if git diff --cached --quiet; then
            echo "Proof unchanged — nothing to commit."
          else
            git commit -q -m "e2e: proof for ${SLUG} (run ${GITHUB_RUN_ID})"
            git push origin "HEAD:${TARGET_REF}"
          fi
