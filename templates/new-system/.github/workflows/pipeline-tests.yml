name: Pipeline Tests

# Minimal hygiene safety-net for the clean or-agents repo: shellcheck on every
# shell script, yamllint on every workflow YAML. Catches the typo class of bugs
# (unquoted vars, undefined commands, malformed YAML) at near-zero cost.
# .yamllint silences line-length noise — the deploy workflow is full of long
# jq / GraphQL one-liners we don't want to chop.
#
# Deliberately minimal: none of or-aios's architecture / agent / manifest gates
# are carried here — or-agents starts clean and grows its own gates when its
# agent organization is designed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: shellcheck + yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint

      - name: shellcheck
        run: shellcheck --severity=error scripts/*.sh scripts/lib/*.sh

      - name: yamllint
        run: yamllint .github/workflows/
