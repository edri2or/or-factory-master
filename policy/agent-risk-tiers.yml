# Agent-repo risk-tier policy for or-factory-master. Source of truth for
# scripts/agent-classify.sh. Unlike policy/gcp-risk-tiers.yml (which matches a STRUCTURED
# gcloud command token-wise), an agent TASK is freeform text — so this is a case-insensitive
# keyword RED-FLAG scanner: RED first (a dangerous / cross-boundary request wins), then
# YELLOW (self-write class), else GREEN. It is defense-in-depth + future-proofing, NOT a
# bulletproof parser; false-positives merely route to Or's Telegram ✅ (safe), and the
# current worker is READ-ONLY anyway so it cannot act dangerously.
#
# Routing in .github/workflows/agent-action.yml (Stage 4b):
#   green  → broker dispatches the worker immediately (read-only Claude)
#   yellow → dispatch + emit an audit event (self-write class; for future write-capable workers)
#   red    → NOT dispatched; routed to the Telegram ✅ approval bridge ({MCP}/agent-action-register)
#
# NOTE on the default: the current worker is read-only (Read,Grep,Glob), so an unflagged task
# is inherently safe → default GREEN. Revisit this default when write-capable workers exist.
version: "1.0"
default_tier: green

# Worker capability map (Fix 1 — capability-aware risk cap). A READ-ONLY worker
# (Read/Grep/Glob, no write tools — see templates/agent-repo/.github/workflows/agent-main.yml)
# cannot perform ANY red action, so a task routed to it is capped at YELLOW: the RED Telegram
# gate is skipped, because it would only add false friction on a task that merely *mentions* a
# risky word (the exact false-positive that blocked Nuriel's read-only research). The RED gate
# stays fully active for write-capable workers. Fail-safe: a worker NOT listed here falls back
# to default_worker_capability (write) → still RED-gated. scripts/agent-classify.sh reads this.
default_worker_capability: write
worker_capabilities:
  nachshon: read-only
  natan-research: read-only
  sapi-docs: read-only
  # The builder-soldier — the FIRST write-capable worker. It does not hold a GitHub key:
  # it PROPOSES files (sandboxed Write/Edit into out/), and the BROKER applies them as a
  # scoped draft PR into an allowlisted target repo. write → never RED-capped to yellow.
  agent-builder: write

# Builder-soldier configuration — read by .github/workflows/agent-action.yml (the broker, the
# only writer). A cross-repo WRITE is red by construction, so EVERY builder task is forced to RED
# (Or's Telegram ✅) regardless of keyword match — see always_red_workers below. Defense-in-depth
# target allowlist (L1; L3 is the per-run token scoped to the one repo; L2 is the builder AGENTS.md).
builder_allowed_targets:
  - edri2or/personal-life
builder_limits:
  max_files: 50              # hard refuse a proposal touching more files (runaway / poisoned-task guard)
  max_total_bytes: 262144    # ~256 KB — hard refuse a larger total payload
# Workers whose EVERY task is forced to RED (Telegram ✅), overriding both the keyword verdict
# and the read-only cap. A write-capable worker that writes ACROSS a repo boundary is red always.
always_red_workers:
  - agent-builder

tiers:
  red:
    patterns:
      - "delete"
      - "deploy"
      - "provision"
      - "decommission"
      - "teardown"
      - "secret"
      - "credential"
      - "private key"
      - "api key"
      - "branch protection"
      - "force-push"
      - "force push"
      - ".github/"
      - "agents.md"
      - "claude.md"
      - "rm -rf"
      - "drop table"
      - "another repo"
      - "cross-repo"
  yellow:
    patterns:
      - "commit"
      - "pull request"
      - "open a pr"
      - "push to"
      - "refactor"
      - "create file"
      - "write to"
  # green is the default — read / analyze / summarise / plan / research / review.
